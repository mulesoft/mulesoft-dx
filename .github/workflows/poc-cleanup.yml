name: POC Cleanup

on:
  delete:

jobs:
  cleanup-poc:
    name: Remove POC from Akamai
    runs-on: ubuntu-latest
    if: github.event.ref_type == 'branch' && startsWith(github.event.ref, 'poc/')
    environment:
      name: poc

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${AKAMAI_PRIVATE_SSH_KEY}" > ~/.ssh/akamai_key
          chmod 600 ~/.ssh/akamai_key
          ssh-keygen -lf ~/.ssh/akamai_key > /dev/null && echo "key parses OK"
        env:
          AKAMAI_PRIVATE_SSH_KEY: ${{ secrets.AKAMAI_PRIVATE_SSH_KEY }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Derive POC name
        id: poc
        run: |
          raw="${DELETED_REF#poc/}"
          sanitized="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$sanitized" ]; then
            echo "Deleted branch '$DELETED_REF' produced an empty POC name after sanitization" >&2
            exit 1
          fi
          echo "name=$sanitized" >> "$GITHUB_OUTPUT"
          echo "Cleaning up POC: $sanitized"
        env:
          DELETED_REF: ${{ github.event.ref }}

      - name: Remove POC directory from Akamai
        run: |
          echo "Removing POC from TEST environment | Host=${AKAMAI_HOST} User=${AKAMAI_USERNAME} POC=${POC_NAME}"
          lftp -u "${AKAMAI_USERNAME},dummy" -e "set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -i ~/.ssh/akamai_key'; rm -rf /564243/api-portal.mulesoft.com/test/pocs/${POC_NAME}; quit" sftp://${AKAMAI_HOST} || true
        env:
          AKAMAI_HOST: 564243.ftp.upload.akamai.com
          AKAMAI_USERNAME: ${{ secrets.AKAMAI_USERNAME }}
          POC_NAME: ${{ steps.poc.outputs.name }}
