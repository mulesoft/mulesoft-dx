  /organizations/{organizationId}/identityProviders:
    get:
      description: Returns list of identity management providers for the root organization with a subset of values.
      parameters:
      - name: include_full_details
        description: If true, returns the full set of properties
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - name: provider_id
        description: One or more ids of the provider(s) to return.
        required: false
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      - name: offset
        description: The number of records to omit from the response.
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: idp_type
        description: One or more types of provider(s) to return.
        required: false
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            enum:
            - saml
            - openid
            - ldap
            type: string
      - name: ascending
        description: Whether to sort ascending or descending
        required: true
        in: query
        schema:
          type: boolean
          default: true
      - name: sort
        description: The field to sort on.
        required: false
        in: query
        schema:
          type: string
          enum:
          - provider_id
          - name
          default: provider_id
      - name: limit
        description: Maximum records to retrieve per request.
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 500
          default: 25
      - name: search
        description: A search string to use for case-insensitive partial matches on name
        required: false
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
