              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number
      security:
      - bearerAuth: []
      - clientAuth: []
      operationId: listAuthorizeClient
      description: Authorizes a client application for access to a specific resource using client credentials.
  /authorize/context:
    post:
      description: Get the set of contexts in which the caller can perform an action on resources that match a template
