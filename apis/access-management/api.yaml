openapi: 3.0.0
info:
  title: Access Management API
  version: 1.0.0
  description: Manage access control, identity, and authorization for the Anypoint Platform. Create and configure organizations, environments, role-based access control (RBAC), teams, connected applications (OAuth clients), identity providers, and client credentials.
servers:
- url: https://anypoint.mulesoft.com/accounts/api
  description: The server for the US region
- url: https://eu1.anypoint.mulesoft.com/accounts/api
  description: The server for the EU region 
- url: https://{region}.platform.mulesoft.com/accounts/api
  description: The server for a specific region
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.

tags:
  - name: Access Management
    description: APIs for managing access control, identity, and authorization within the Anypoint Platform, including organizations, environments, RBAC, teams, connected applications, identity providers, and client credentials.
  - name: Identity Providers
    description: APIs for managing identity providers, including creation, configuration, and assignment to organizations and environments.  
  - name: Organizations and Environments
    description: APIs for managing organizations and environments, including creation, configuration, and access control.
  - name: Role-Based Access Control (RBAC)
    description: APIs for managing role-based access control, including roles, permissions, and assignments to users and client applications.    
paths:
  /authorize:
    get:
      description: Authorize for a single resource
      parameters:
      - name: namespace
        required: true
        in: query
        schema:
          type: string
        description: The permission namespace to check authorization against (e.g., cloudhub, exchange).
      - name: action
        required: true
        in: query
        schema:
          type: string
        description: The action to authorize (e.g., GET, POST, PUT, DELETE).
      - name: resource
        required: true
        in: query
        schema:
          type: string
        description: The resource path to check authorization for.
      requestBody:
        content:
          application/json:
            schema:
              example:
                namespace: namespace
                action: GET
                resource: /api
        x-amf-mediaType: application/json
        description: Request payload for list authorize.
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number
      security:
      - bearerAuth: []
      - clientAuth: []
      operationId: listAuthorize
    post:
      description: Authorize for many resources
      requestBody:
        content:
          application/json:
            schema:
              example:
                namespace: namespace
                action: GET
                resources:
                - /api/users
                - /api/clients
        x-amf-mediaType: application/json
        description: Request payload for create authorize.
      responses:
        '200':
          description: ''
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example:
                - /api/users
                - /api/clients
        '400':
          description: ''
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
              description: The number of requests remaining in the current rate limit window.
              schema:
                type: number
            X-RateLimit-Reset:
              description: The time at which the current rate limit window resets in UTC epoch seconds.
              schema:
                type: number
      security:
      - bearerAuth: []
      - clientAuth: []
      operationId: createAuthorize
  /authorize/client:
    get:
      parameters:
      - name: client_id
        required: true
        in: query
        schema:
          type: string
        description: The unique identifier of the client application.
      - name: client_secret
        required: true
        in: query
        schema:
          type: string
        description: The secret credential for the client application.
      - name: namespace
        required: true
        in: query
        schema:
          type: string
        description: The permission namespace to check authorization against (e.g., cloudhub, exchange).
      - name: action
        required: true
        in: query
        schema:
          type: string
        description: The action to authorize (e.g., GET, POST, PUT, DELETE).
      - name: resource
        required: true
        in: query
        schema:
          type: string
        description: The resource path to check authorization for.
      requestBody:
        content:
          application/json:
            schema:
              example:
                client_id: cid
                client_secret: secret
                namespace: namespace
                action: GET
                resource: /api
        x-amf-mediaType: application/json
        description: Request payload for list authorize client.
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '429':
          description: Too many requests
          headers:
            X-RateLimit-Limit:
              description: The maximum number of requests you're permitted to make in the rate limit window.
              schema:
                type: number
            X-RateLimit-Remaining:
