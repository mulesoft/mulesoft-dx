    Team:
      description: 'A Team. For internal/private/shared teams, all fields except external_org_id are returned.

        For external teams, external_org_id is returned but the other optional fields are not.

        '
      example:
        team_id: f59632be-e43f-4c4f-a303-36b8b0623f29
        team_name: IT
        org_id: 6cb9cf0c-de02-4403-ace9-1857c0d0425f
        org_name: Mythical Bank
        team_type: internal
        ancestor_team_ids:
        - 6cad8143-5f3c-4258-8091-2e664819e7f3
        created_at: 2019-07-15 09:36:07.123000+00:00
        updated_at: 2019-07-15 09:36:07.123000+00:00
      type: object
      additionalProperties: false
      required:
      - team_id
      - org_id
      - org_name
      - team_name
      - team_type
      - ancestor_team_ids
      properties:
        team_id:
          description: The id of the team. Team_id is globally unique.
          type: string
          minLength: 1
          maxLength: 255
        org_id:
          description: The root organization id where the team is defined.
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        org_name:
          description: The name of the root organization that manages the team.
          type: string
        team_name:
          $ref: '#/components/schemas/TeamName'
        team_type:
          description: The type of the team.
          enum:
          - internal
          - external
          - private
          - shared
          - legacy
          type: string
        external_org_id:
          description: 'For external teams, this is the root organization id where the members of this team are members.

            For internal/private/shared teams, this field is not applicable/present.

            '
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        external_org_name:
          description: 'For external teams, this is the root organization''s name where the members of this team are members.

            For internal/private/shared teams, this field is not applicable/present.

            '
          type: string
        ancestor_team_ids:
          description: Array of ancestor teams ids starting from either the internal or external root team down to this team's parent.
          type: array
          items:
            $ref: '#/components/schemas/IdString'
        created_at:
          description: The time the team was created.
          type: string
          format: date-time
        updated_at:
          description: The time the team was last modified.
          type: string
          format: date-time
    TeamCreate:
      example:
        parent_team_id: 6cad8143-5f3c-4258-8091-2e664819e7f3
        team_name: New Team
        team_type: internal
      type: object
      additionalProperties: false
      required:
      - parent_team_id
      - team_name
      - team_type
      properties:
        parent_team_id:
          description: The team_id of the parent of this team.
          type: string
          minLength: 1
          maxLength: 255
        team_name:
          $ref: '#/components/schemas/TeamName'
        team_type:
          description: 'The type of the team.

            Internal teams are visible to all members of the organziation. All internal teams of an organization are under the root internal team.

            Private teams are internal teams but are only visible by maintainers/members of the team.

            Shared teams are internal teams that can be mapped to external teams in other organizations where a trust relationship has been formed.

            '
          enum:
          - internal
          - private
          - shared
          type: string
    TeamUpdate:
      example:
        team_name: New team name
      type: object
      additionalProperties: false
      properties:
        team_name:
          $ref: '#/components/schemas/TeamName'
        team_type:
          description: 'The type of the team.

            Internal teams are visible to all members of the organziation. All internal teams of an organization are under the root internal team.

            Private teams are internal teams but are only visible by maintainers/members of the team.

            Shared teams are internal teams that can be mapped to external teams in other organizations where a trust relationship has been formed.

            If the parent team is external, this team must be external. If the parent team is private, this team must be private. If a child team is not private, this team can not be private

            '
          enum:
          - internal
          - private
          - shared
          type: string
    TeamMove:
