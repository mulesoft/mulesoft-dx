  /connectedApplications:
    description: Access to connected applications
    get:
      description: Get all connected applications for the organization
      parameters:
      - name: includeUsage
        description: flag to indicate whether to return usage statistics
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/XOrigin_organizationId_Query'
      - name: hide_managed
        description: Hides the managed connected apps when set to true.
        in: query
        schema:
          type: boolean
          default: true
      - name: offset
        description: The number of records to omit from the response.
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        description: Maximum records to retrieve per request.
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 20
          default: 20
      - name: search
        description: A search string to use for case-insensitive partial matches on all object properties
        required: false
        in: query
        schema:
          type: string
      - name: sort
        description: The field to sort on.
        required: false
        in: query
        schema:
          type: string
          enum:
          - client_id
          - client_name
          default: client_name
      - name: ascending
        description: Whether to sort ascending or descending
        required: true
        in: query
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: ''
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example:
                  data:
                  - client_id: 0fa2aa2f0aeb4978b96796a0843f898c
                    owner_org_id: 0eb65884-4f75-48f7-a8bc-4e30b46e721d
