    patch:
      tags:
      - Deployments
      description: Updates an existing deployment with the provided details.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_deploymentTargetOrganizationId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentTargetEnvironmentId_Path'
      - $ref: '#/components/parameters/XOrigin_targetDeploymentId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDeploymentRequest'
            examples:
              Update vCores:
                description: Update vCores
                value:
                  application:
                    vCores: '0.07'
              Update replicas:
                description: Update replicas
                value:
                  target:
                    replicas: 3
              Update runtime version:
                description: Update runtime version
                value:
                  target:
                    deploymentSettings:
                      runtimeVersion: 4.3.0:20220523-3
              Update application ref:
                description: Update application ref
                value:
                  application:
                    ref:
                      groupId: 66310c16-bce5-43c4-b978-5945ed2f99c5
                      artifactId: app-with-44-schedulers
                      version: 1.0.44
                      packaging: jar
              Update JVM arguments:
                description: Update JVM arguments
                value:
                  target:
                    deploymentSettings:
                      jvm:
                        args: -XX:MaxRAMPercentage=60.0
              Start application:
                description: Start application
                value:
                  application:
                    desiredState: STARTED
              Stop application:
                description: Stop application
                value:
                  application:
                    desiredState: STOPPED
        required: true
        description: The deployments data to update.
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
