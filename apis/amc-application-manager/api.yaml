              example:
                id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                name: app-name
                creationDate: '2024-01-15T10:30:00Z'
                lastModifiedDate: '2024-01-15T10:30:00Z'
                target:
                  id: string
                  type: string
                status: FAILED
                application:
                  id: string
                  type: string
                desiredVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
                replicas:
                - id: string
                  type: string
                lastSuccessfulVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
