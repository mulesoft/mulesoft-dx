openapi: 3.0.3
info:
  title: AMC Application Manager API
  version: 2.1.3
  description: Manage alerts, deployments, diagnostics, logs, and schedulers for Runtime Fabric and CloudHub 2.0 applications.
servers:
- url: https://anypoint.mulesoft.com/amc/application-manager/api/v2
  description: AMC Application Manager API
- url: https://{region}.anypoint.mulesoft.com/amc/application-manager/api/v2
  variables:
    region:
      default: eu1
      description: Region identifier for the service endpoint.
  description: Regional AMC Application Manager API
- url: https://{region}.platform.mulesoft.com/amc/application-manager/api/v2
  description: Regional AMC Application Manager API
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
tags:
- name: Schedulers
  description: Manage RTF and Cloudhub 2.0 schedulers.
- name: Alerts
  description: Manage RTF and Cloudhub 2.0 alerts.
- name: Deployments
  description: Deploy and manage RTF and Cloudhub 2.0 Applications.
- name: TrafficSwitching
  description: Switch application traffic from Cloudhub 1.0 to Cloudhub 2.0
- name: Diagnostics
  description: Provides diagnostic capabilities for Cloudhub 2.0 applications.
- name: Logs
  description: Provides log querying capabilities Cloudhub 2.0 applications.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}/schedulers/{flowName}:
    put:
      tags:
      - Schedulers
      description: Updates the scheduler configuration for the specified flow name.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentId_Path'
      - name: flowName
        in: path
        required: true
        schema:
          type: string
        description: The flowName to identify the target resource.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulerRequest'
        required: true
        description: The schedulers data to update.
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponsePaged'
              example:
                total: 1
                items:
                - id: string
                  type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
      operationId: updateOrganizationsByOrganizationidEnvironmentsByEnvironmentidDeploymentsByDeploymentidSchedulersByFlowname
    delete:
      tags:
      - Schedulers
      description: Removes the custom scheduler configuration for the given flow name in the deployment and restores the default configuration.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentId_Path'
      - name: flowName
        in: path
        required: true
        schema:
          type: string
        description: The flowName to identify the target resource.
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponsePaged'
              example:
                total: 1
                items:
                - id: string
                  type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
      operationId: deleteOrganizationsByOrganizationidEnvironmentsByEnvironmentidDeploymentsByDeploymentidSchedulersByFlowname
  /organizations/{organizationId}/environments/{environmentId}/deployments:
    get:
      tags:
      - Deployments
      description: Retrieves a list of deployments for the specified query. If the query returns no results, then an empty list is returned.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_deploymentTargetOrganizationId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentTargetEnvironmentId_Path'
      - name: deploymentQuery
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DeploymentQuery'
        description: The deploymentQuery query parameter.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponsePaged'
              example:
                total: 1
                items:
                - id: string
                  type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
      operationId: getOrganizationsByOrganizationidEnvironmentsByEnvironmentidDeployments
    post:
      tags:
      - Deployments
      description: Deploys a new application with the provided data.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_deploymentTargetOrganizationId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentTargetEnvironmentId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDeploymentRequest'
        required: true
        description: The deployments data to create.
      responses:
        '202':
          description: Accepted
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentDetailResponse'
              example:
                id: e4899eda-22c9-4546-8ad2-ffde5a3d466d
                name: app-name
                creationDate: '2024-01-15T10:30:00Z'
                lastModifiedDate: '2024-01-15T10:30:00Z'
                target:
                  id: string
                  type: string
                status: FAILED
                application:
                  id: string
                  type: string
                desiredVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
                replicas:
                - id: string
                  type: string
                lastSuccessfulVersion: 0ef171b6-aad1-459b-8720-10c405b05ed1
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
      operationId: createOrganizationsByOrganizationidEnvironmentsByEnvironmentidDeployments
  /organizations/{organizationId}/environments/{environmentId}/deployments/{deploymentId}/schedulers/{flowName}/run:
    post:
      tags:
      - Schedulers
      description: Triggers a request to executes immediately the scheduler for the given flow name.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_deploymentId_Path'
      - name: flowName
        in: path
        required: true
        schema:
          type: string
        description: The flowName to identify the target resource.
      responses:
        '204':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '404':
          description: Deployment not found
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '409':
          description: Deployment not ready
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
      operationId: createOrganizationsByOrganizationidEnvironmentsByEnvironmentidDeploymentsByDeploymentidSchedulersByFlownameRun
  /organizations/{organizationId}/environments/{environmentId}/alerts:
    get:
      tags:
      - Alerts
      summary: Retrieves Cloudhub 2.0 alerts
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        description: Bearer token for API authentication.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          format: int32
        description: Pagination offset or page number for results.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int32
        description: Maximum number of results to return per page.
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
              example:
                data:
                - id: string
                  type: string
      operationId: getOrganizationsByOrganizationidEnvironmentsByEnvironmentidAlerts
