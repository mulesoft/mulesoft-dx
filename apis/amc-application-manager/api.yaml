        required: true
        description: The alerts data to create.
      responses:
        '200':
          description: Success
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
              example:
                id: string
                name: string
                severity: INFO
                enabled: true
                organizationId: string
                environmentId: string
                lastModified: 0
                createdAt: 0
                isSystem: true
                productName: string
        '400':
          description: Bad Request
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
        '401':
          description: Unauthorized
          headers:
            X-ANYPNT-TRX-ID:
              description: The transaction id of the request.
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
              example:
                id: string
                name: string
                severity: INFO
                enabled: true
                organizationId: string
                environmentId: string
                lastModified: 0
                createdAt: 0
                isSystem: true
                productName: string
      operationId: createOrganizationsByOrganizationidEnvironmentsByEnvironmentidAlerts
      description: Creates a Cloudhub 2.0 alert
