# Governance (reporting) path items - composed into main api.yaml
# Schema refs point to ../schemas/*.yaml (not api.yaml) so AMF does not treat the root OAS as a nested spec in the reference tree.

report-summary:
  get:
    operationId: getReportSummary
    summary: Get validation report summary
    description: |
      Returns the conformance/validation report for an API or asset. By default returns
      status for all rulesets applied to the asset; optionally filter to specific rulesets.
    parameters:
      - name: urn
        in: query
        required: true
        description: URN of the API or asset to check conformance for (URN format, e.g. urn:api:organizationId:assetId:version).
        schema:
          type: string
          format: uri
        example: "urn:api:7b976d8f-b47c-4cf7-9ca9-913a74ab81ee:my-api:v1"
      - name: ruleset
        in: query
        required: false
        description: |
          If set, only status for these rulesets is returned. Each value must be in format
          gav://groupId/assetId/version. Omit to fetch status for all rulesets.
        schema:
          type: array
          items:
            type: string
            pattern: '^gav://[^/]+/[^/]+/[^/]+$'
        style: form
        explode: true
    responses:
      '200':
        description: Validation report retrieved successfully.
        content:
          application/json:
            schema:
              $ref: '../schemas/ValidationReport.yaml'
            examples:
              default:
                $ref: '../examples/ValidationReport-example.yaml'

stats-organization:
  get:
    operationId: getOrganizationSummary
    summary: Get organization summary
    description: Obtains the global statistics for the organization.
    parameters:
      - name: organization
        in: query
        required: false
        description: Organization to use. If 'none' is sent, the organization for the user is used.
        schema:
          type: string
          format: uuid
        example: "56e6f7c7-d59d-4ab1-845d-255d008049af"
    responses:
      '200':
        description: Values returned correctly.
        content:
          application/json:
            schema:
              $ref: '../schemas/OrgSummary.yaml'
            examples:
              default:
                $ref: '../examples/OrgSummary-example.yaml'

stats-organization-profiles:
  get:
    operationId: getOrganizationProfileSummaries
    summary: Get organization summary by profile
    description: |
      Returns the organization's summary by profile (paginated). In governance you create
      profiles to validate different sets of assets; a profile matches a filter criteria
      (what APIs to validate) with a set of rulesets. Each profile summary indicates
      the status of that profile—how many APIs are conformant, how many are
      non-conformant, and how many have failed to be validated.
    parameters:
      - name: organization
        in: query
        required: false
        description: Organization to use. If 'none' is sent, the organization for the user is used.
        schema:
          type: string
          format: uuid
        example: "56e6f7c7-d59d-4ab1-845d-255d008049af"
    responses:
      '200':
        description: Values returned correctly.
        content:
          application/json:
            schema:
              $ref: '../schemas/OrgProfileSummaryPaginated.yaml'
            examples:
              default:
                $ref: '../examples/OrgProfileSummaryPaginated-example.yaml'

stats-organization-targets:
  get:
    operationId: getOrganizationTargetSummaries
    summary: Get organization summary by target
    description: |
      Returns the organization's summary by target (paginated). One summary per API
      target—each API validated against the rulesets applied by profiles (conformant,
      non-conformant, or failed to validate).
    parameters:
      - name: organization
        in: query
        required: false
        description: Organization to use. If 'none' is sent, the organization for the user is used.
        schema:
          type: string
          format: uuid
        example: "56e6f7c7-d59d-4ab1-845d-255d008049af"
    responses:
      '200':
        description: Values returned correctly.
        content:
          application/json:
            schema:
              $ref: '../schemas/OrgTargetSummaryPaginated.yaml'
            examples:
              default:
                $ref: '../examples/OrgTargetSummaryPaginated-example.yaml'

stats-profiles-profileId:
  get:
    operationId: getProfileSummary
    summary: Get profile summary
    description: Returns the summary for a single profile (conformant, non-conformant, and failed validation counts).
    parameters:
      - name: profileId
        in: path
        required: true
        description: The profile UUID.
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Values returned correctly.
        content:
          application/json:
            schema:
              $ref: '../schemas/ProfileSummary.yaml'
            examples:
              default:
                $ref: '../examples/ProfileSummary-example.yaml'

stats-profiles-profileId-targets:
  get:
    operationId: getProfileTargetSummaries
    summary: Get profile target summaries
    description: Returns the list of API targets (summaries) validated by the given profile.
    parameters:
      - name: profileId
        in: path
        required: true
        description: The profile UUID.
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Values returned correctly.
        content:
          application/json:
            schema:
              $ref: '../schemas/ProfileTargetSummary.yaml'
            examples:
              default:
                $ref: '../examples/ProfileTargetSummary-example.yaml'

stats-applied-rulesets:
  get:
    operationId: getAppliedRulesets
    summary: Get applied rulesets for asset
    description: |
      Returns all rulesets applied to a specific asset (by group, assetId, and version) across
      profiles. You can filter by API type, organizations, and whether to include only
      assets created by the user.
    parameters:
      - name: group
        in: path
        required: true
        description: The group ID (e.g. organization or group UUID) for the asset.
        schema:
          type: string
      - name: assetId
        in: path
        required: true
        description: The asset ID.
        schema:
          type: string
      - name: assetVersion
        in: path
        required: true
        description: The asset version.
        schema:
          type: string
      - name: type
        in: query
        required: false
        description: Limit to one supported API type.
        schema:
          type: string
          enum:
            - async-api
            - rest-api
            - http-api
            - mcp
            - agent
            - graphql
            - soap-api
            - grpc-api
      - name: orgs
        in: query
        required: false
        description: Filter by organization UUID(s); can check multiple organizations (e.g. comma-separated UUIDs) as long as you have access to the assets.
        schema:
          type: string
          format: uuid
      - name: myassets
        in: query
        required: false
        description: If true, only assets created by the user; otherwise all assets the user has read access to.
        schema:
          type: boolean
    responses:
      '200':
        description: Applied rulesets retrieved successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/TargetAppliedRuleset.yaml'
            examples:
              default:
                $ref: '../examples/TargetAppliedRuleset-array-example.yaml'
