#%Validation Profile 1.0
profile: machaval
description: >
  Default description for generated profile. Update this content with the
  desired documentation text. 
violation:
  - input-types-described
  - no-naked-strings
  - oas-only
  - operation-description
  - operation-examples
  - operation-id-camel-case
  - output-response-description
  - output-types-described
  - request-body-description
  - schema-property-description
  - schema-required-block
validations:
  input-types-described:
    message: Parameter '{{core.name}}' must have a description.
    documentation: >
      All endpoint input parameters (query, path, header) must be documented
      with a description.
    targetClass: apiContract.Parameter
    propertyConstraints:
      core.description:
        minCount: 1
  no-naked-strings:
    message: >
      Scalar type '{{shacl.name}}' must have an enum or format; avoid naked
      strings with no constraints.
    documentation: >
      If a field has a limited set of options, it must use an enum. Avoid
      unconstrained string types

      (naked strings) so that APIs and AI consumers have explicit allowed values.
    targetClass: shapes.ScalarShape
    or:
      - propertyConstraints:
          shacl.in:
            minCount: 1
      - propertyConstraints:
          shapes.format:
            minCount: 1
  oas-only:
    message: API specification must be OpenAPI (OAS), not RAML. Use OAS 2.0 or OAS 3.0.
    documentation: >
      This rule ensures the API specification is written in OpenAPI
      Specification (OAS) format.

      RAML specifications are not allowed. Only OAS 2.0 and OAS 3.0 are accepted.
    targetClass: doc.APIContractProcessingData
    propertyConstraints:
      doc.sourceSpec:
        in:
          - OAS 2.0
          - OAS 3.0
  operation-description:
    message: Operation '{{apiContract.method}}' must have a description.
    documentation: >
      Every endpoint operation must include a description to document its
      purpose and behavior.
    targetClass: apiContract.Operation
    propertyConstraints:
      core.description:
        minCount: 1
  operation-examples:
    message: Operation '{{apiContract.method}}' must have at least one response with
      an example.
    documentation: >
      Every endpoint must provide at least one example (in a response) so
      consumers can understand the response shape.
    targetClass: apiContract.Operation
    propertyConstraints:
      apiContract.returns:
        atLeast:
          count: 1
          validation:
            propertyConstraints:
              apiContract.payload / shapes.schema:
                nested:
                  propertyConstraints:
                    apiContract.examples:
                      minCount: 1
  operation-id-camel-case:
    message: >
      Operation '{{apiContract.method}}' must have an operationId in camelCase
      (e.g. calculateTaxRate, provisionCloudServer).

      Avoid snake_case (get_data) and generic single words (update).
    documentation: >
      Every endpoint operation must have an operationId. The value must be
      descriptive and in camelCase:

      preferred examples are calculateTaxRate, provisionCloudServer. Avoid snake_case like get_data

      and generic verbs like get_data or update.
    targetClass: apiContract.Operation
    propertyConstraints:
      apiContract.operationId:
        minCount: 1
        pattern: ^[a-z][a-z0-9]*[A-Z][a-zA-Z0-9]*$
    examples:
      valid: |
        paths:
          /tax:
            post:
              operationId: calculateTaxRate
              responses:
                '200':
                  description: OK
      invalid: |
        paths:
          /items:
            put:
              operationId: update
              responses:
                '200':
                  description: OK
  output-response-description:
    message: Response '{{apiContract.statusCode}}' must have a description.
    documentation: |
      Every endpoint response must include a description of the output.
    targetClass: apiContract.Response
    propertyConstraints:
      core.description:
        minCount: 1
  output-types-described:
    message: Response '{{apiContract.statusCode}}' must have a description.
    documentation: |
      Every endpoint response must include a description of the output.
    targetClass: apiContract.Response
    propertyConstraints:
      core.description:
        minCount: 1
  request-body-description:
    message: Request body must have a description when present.
    documentation: >
      When an operation has a request body, it must include a description of the
      input.
    targetClass: apiContract.Request
    if:
      propertyConstraints:
        apiContract.payload:
          minCount: 1
    then:
      propertyConstraints:
        core.description:
          minCount: 1
  schema-property-description:
    message: Schema property '{{shacl.name}}' must have a description.
    documentation: >
      All properties in response and request schemas must be documented with a
      description.
    targetClass: shacl.PropertyShape
    propertyConstraints:
      shapes.range / core.description:
        minCount: 1
  schema-required-block:
    message: >
      Object schema must explicitly list at least one required field (use the
      'required' array) to prevent optional parameters from being guessed.
    documentation: >
      Always explicitly list required fields in the schema. When an object has
      required properties,

      list them in the 'required' array so that API and AI consumers do not guess optional parameters.
    targetClass: shacl.NodeShape
    if:
      propertyConstraints:
        shacl.property:
          minCount: 1
    then:
      propertyConstraints:
        shacl.property:
          atLeast:
            count: 1
            validation:
              propertyConstraints:
                shacl.minCount:
                  minInclusive: 1
