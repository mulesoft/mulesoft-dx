type: object
description: A recipient who receives the notification.
additionalProperties: false
required:
  - contactType
  - notificationType
  - value
  - label
properties:
  contactType:
    type: string
    description: Contact type.
    enum:
      - Contact
      - Publisher
      - Governor
      - Others
  notificationType:
    type: string
    description: Notification type. Email is the only supported value.
    enum:
      - Email
  value:
    type: string
    format: email
    description: For "Others" contact type, email IDs should be provided; otherwise the contact identifier.
  label:
    type: string
    description: Additional metadata for the contact.
