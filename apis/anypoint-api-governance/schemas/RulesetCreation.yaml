type: object
description: Ruleset identifier (GAV). Format gav://groupId/assetId/version.
additionalProperties: false
required:
  - uri
  - version

properties:
  uri:
    type: string
    format: uri
    description: The ruleset URI, e.g. gav://groupId/assetId/version.
  version:
    type: string
    description: The specific version URI; same as uri when not using latest.
