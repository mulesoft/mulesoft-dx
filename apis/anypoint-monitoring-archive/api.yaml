      type: string
  parameters:
    XOrigin_organization_Path:
      name: organization
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
      description: The organization to identify the target resource.
    XOrigin_environment_Path:
      name: environment
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listEnvironments
        description: GET `/organizations/{organizationId}/environments`; use each `data[].id` value as an environment identifier.
        values: $.data[*].id
        labels: $.data[*].name
      description: The environment to identify the target resource.
    XOrigin_entityID_Path:
      name: entityID
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:anypoint-monitoring-archive
        operation: getOrganizationsByOrganizationEnvironmentsByEnvironmentByEntitytype
        description: GET `/organizations/{organization}/environments/{environment}/{entityType}` in this API; use `resources[].id` values as `entityID`.
        values: $.resources[*].id
        labels: $.resources[*].name
      description: The entityID to identify the target resource.
