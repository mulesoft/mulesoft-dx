openapi: 3.0.0
info:
  title: Anypoint MQ Admin API
  version: 1.0.0
  description: Manage Anypoint MQ destinations, exchanges, bindings, and client authorizations across environments.
servers:
- url: https://anypoint.mulesoft.com/mq/admin/api
- url: https://eu1.anypoint.mulesoft.com/mq/admin/api
- url: https://{region}.platform.mulesoft.com/mq/admin/api
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /v1: {}
  /v1/organizations: {}
  /v1/organizations/{organizationId}:
    delete:
      description: 'Delete organization. If you are using connected app, "Administer destinations" and "Manage clients" scope is needed.

        '
      x-optionalSecurity: true
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '204':
          description: 'The resource has been correctly removed.

            '
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationid
  /v1/organizations/{organizationId}/environments:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
  /v1/organizations/{organizationId}/environments/{environmentId}:
    delete:
      description: 'Delete environment. If you are using connected app, "Administer destinations" and "Manage clients" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '204':
          description: 'The resource has been correctly removed.

            '
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationidEnvironmentsByEnvironmentid
  /v1/organizations/{organizationId}/environments/{environmentId}/clients:
    get:
      description: 'Gets the list of messaging clients. If you are using connected app, "View clients" or "Manage clients" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                - name: CustomerSuccessToSupportClient
                  clientId: '123434645645765858'
                  clientSecret: asdfgsdfhd32456uerfgd^rtgsDFV
                - name: BillingToFinanceClient
                  clientId: '123434645231234348'
                  clientSecret: asdfgsdfhdasdfa6uerfgd^rtgsDFV
              example: *id001
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidClients
    put:
      description: 'Create a messaging client. If you are using connected app, "Manage clients" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      requestBody:
        content:
          application/json:
            schema:
              example:
                name: CustomerSuccessToSupportClient
        x-amf-mediaType: application/json
        description: The clients data to update.
      responses:
        '200':
          description: Successful operation.
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: updateV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidClients
  /v1/organizations/{organizationId}/environments/{environmentId}/clients/{clientId}:
    post:
      description: 'Regenerates the client secret. If you are using connected app, "Manage clients" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_clientId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                  name: CustomerSuccessToSupportClient
              example: *id002
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: createV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidClientsByClientid
    delete:
      description: 'Deletes a client. If you are using connected app, "Manage clients" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_clientId_Path'
      responses:
        '200':
          description: Successful operation.
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidClientsByClientid
  /v1/organizations/{organizationId}/environments/{environmentId}/regions:
    get:
      description: 'Obtains the valid regions where the service is deployed. If you are using connected app, no specific scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id003
                - regionId: us-east-1
                  serviceUrl: http://example.domain/api/v1
                  fallbackRegion: us-east-2
                - regionId: us-east-2
                  serviceUrl: http://example.domain/api/v1
                  fallbackRegion: us-west-2
              example: *id003
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegions
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}:
    get:
      description: 'Obtains the region entity. If you are using connected app, no specific scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id004
                - regionId: us-east-1
                  serviceUrl: http://example.domain/api/v1
                  fallbackRegion: us-east-2
                - regionId: us-east-2
                  serviceUrl: http://example.domain/api/v1
                  fallbackRegion: us-west-2
              example: *id004
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionid
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations:
    description: Collection of available destinations in the broker.
    get:
      description: Retrieve all the destinations. If you are using connected app, "View destinations" or "Administer destinations" scope is needed.
      parameters:
      - name: destinationType
        description: Defines what to fetch
        required: false
        in: query
        schema:
          type: string
          enum:
          - all
          - queue
          - exchange
          default: all
      - name: startsWith
        description: 'Searchs the field from the left using the passed string.

          '
        required: true
        in: query
        schema:
          type: string
      - name: offset
        description: Skip over a number of elements by specifying an offset value for the query.
        required: false
        in: query
        schema:
          type: integer
          default: 0
      - name: inclusion
        description: Defines what to fetch
        required: false
        in: query
        schema:
          type: string
          enum:
          - all
          - minimal
          default: all
      - name: limit
        description: Limit the number of elements in the response.
        required: false
        in: query
        schema:
          type: integer
          default: 20
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id005
                - exchangeId: myExchangeId
                  encrypted: true
                - queueId: myQueueId
                  defaultTtl: 120000
                  defaultLockTtl: 10000
                  defaultDeliveryDelay: 0
                  encrypted: true
                  isFallback: false
                  fallbackConfig:
                    enabled: true
                    linkedQueueName: myQueueId_fb
                    linkedQueueRegion: <fallback region>
                - queueId: myQueueId2
                  defaultTtl: 120000
                  defaultLockTtl: 10000
                  defaultDeliveryDelay: 0
                  encrypted: true
                  isFallback: false
              example: *id005
        '204':
          description: 'There are no elements to return.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinations
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/queues:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
    - $ref: '#/components/parameters/XOrigin_environmentId_Path'
    - $ref: '#/components/parameters/XOrigin_regionId_Path'
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/queues/{queueId}:
    description: Entity representing a queue
    patch:
      description: 'Updates fields specified; if "maxDeliveries" or "deadLetterQueueId" are not provided the dead letter queue configuration will be removed.

        If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/Generated'
        description: The queues data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id006
                  queueId: myQueueId
                  defaultTtl: 120000
                  defaultLockTtl: 10000
                  defaultDeliveryDelay: 0
                  encrypted: true
                  deadLetterQueueId: <existing_DLQ_name>
                  maxDeliveries: 10
                  isFallback: false
              example: *id006
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: patchV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueid
    get:
      description: 'Get the queue with queueId = {queueId}. If you are using connected app, "View destinations" or "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id007
                  queueId: myQueueId
                  defaultTtl: 120000
                  defaultLockTtl: 10000
                  defaultDeliveryDelay: 0
                  encrypted: true
                  deadLetterQueueId: <existing_DLQ_name>
                  maxDeliveries: 10
                  isFallback: false
              example: *id007
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id008
                  message: queue not found
              example: *id008
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueid
    put:
      description: 'Add new queue to the broker. This is an idempotent API. If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/Generated'
        description: The queues data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id009
                  queueId: myQueueId
                  defaultTtl: 120000
                  defaultLockTtl: 10000
                  defaultDeliveryDelay: 0
                  encrypted: true
                  deadLetterQueueId: <existing_DLQ_name>
                  maxDeliveries: 10
                  isFallback: false
              example: *id009
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: updateV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueid
    delete:
      description: 'Delete queue from the broker. If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      responses:
        '204':
          description: 'The resource has been correctly removed.

            '
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueid
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/queues/{queueId}/messages:
    delete:
      description: 'Deletes the messages contained in the queue (effectively purging it). *The deleted messages cannot be retrieved any more* Messages present in the queue prior to this call are deleted; messages sent after this call may also be deleted.

        If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      responses:
        '204':
          description: 'The resource has been correctly removed.

            '
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueidMessages
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/queues/{queueId}/fallback:
    put:
      description: 'Enables or disables cross-region failover configuration for a queue. This configuration is used to evaluate if messages published to or consumed from a queue using Anypoint MQ Connector temporarily redirect to a fallback queue in a fallback region when the primary region is unavailable.<br/><br/>If you are using a connected app, "Administer destinations" scope is required.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: queueId
        required: true
        in: path
        schema:
          type: string
        description: The queue ID to identify the target resource.
      requestBody:
        content:
          application/json:
            schema:
              example:
                fallbackEnabled: true
              type: object
              required:
              - fallbackEnabled
              properties:
                fallbackEnabled:
                  description: Property for turning on or turning off cross region fallback configuration for a queue.
                  type: boolean
        x-amf-mediaType: application/json
        description: The fallback data to update.
      responses:
        '201':
          description: Resource created successfully.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id010
                  queueId: myQueueId
                  isFallback: false
                  fallbackConfig:
                    enabled: true
                    linkedQueueName: myQueueId_fb
                    linkedQueueRegion: <fallback region>
              example: *id010
        '400':
          description: Invalid payload or feature not supported for a given destination type.
        '401':
          description: Invalid authentication token.
        '403':
          description: Not enough permissions to enable or disable fallback configuration for a queue.
        '404':
          description: Environment or queue specified in the request URI doesn't exist.
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: updateV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsQueuesByQueueidFallback
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/exchanges:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
    - $ref: '#/components/parameters/XOrigin_environmentId_Path'
    - $ref: '#/components/parameters/XOrigin_regionId_Path'
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/destinations/exchanges/{exchangeId}:
    description: Entity representing a exchange
    get:
      description: 'Get the exchange with exchangeId = {exchangeId}. If you are using connected app, "View destinations" or "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: exchangeId
        required: true
        in: path
        schema:
          type: string
        description: The exchange ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id011
                  encrypted: true
              example: *id011
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id012
                  message: exchange not found
              example: *id012
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: getV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsExchangesByExchangeid
    patch:
      description: 'Modifies the exchange of the broker. If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: exchangeId
        required: true
        in: path
        schema:
          type: string
        description: The exchange ID to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/Generated2'
        description: The exchanges data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id013
                  encrypted: true
              example: *id013
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: patchV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsExchangesByExchangeid
    put:
      description: 'Add new exchange to the broker. If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: exchangeId
        required: true
        in: path
        schema:
          type: string
        description: The exchange ID to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/Generated2'
        description: The exchanges data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id014
                  encrypted: true
              example: *id014
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: updateV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsExchangesByExchangeid
    delete:
      description: 'Delete the exchange. If you are using connected app, "Administer destinations" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: exchangeId
        required: true
        in: path
        schema:
          type: string
        description: The exchange ID to identify the target resource.
      responses:
        '204':
          description: 'The resource has been correctly removed.

            '
        '404':
          description: 'The requested resource in the form it is requested is not found on this broker.

            '
        '501':
          description: 'This kind of request in the form it is performed is not implemented by this broker.

            '
      security:
      - {}
      operationId: deleteV1OrganizationsByOrganizationidEnvironmentsByEnvironmentidRegionsByRegionidDestinationsExchangesByExchangeid
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/bindings:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
    - $ref: '#/components/parameters/XOrigin_environmentId_Path'
    - $ref: '#/components/parameters/XOrigin_regionId_Path'
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/bindings/exchanges:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
    - $ref: '#/components/parameters/XOrigin_environmentId_Path'
    - $ref: '#/components/parameters/XOrigin_regionId_Path'
  /v1/organizations/{organizationId}/environments/{environmentId}/regions/{regionId}/bindings/exchanges/{exchangeId}:
    description: Collection of available exchanges in the broker.
    get:
      description: 'Gathers all the queues bound to exchange. If you are using connected app, "View destinations" or "Administer destinations" scope is needed.

        '
      parameters:
      - name: inclusion
        description: Defines what to fetch. inclusion=all returns details like routing rules defined on the binding
        required: false
        in: query
        schema:
          type: string
          enum:
          - all
          - minimal
          default: minimal
      - name: offset
        description: Skip over a number of elements by specifying an offset value for the query.
        required: false
        in: query
        schema:
          type: integer
          default: 0
      - name: limit
        description: Limit the number of elements in the response.
        required: false
        in: query
        schema:
          type: integer
          default: 20
      - name: startsWith
        description: 'Searchs the field from the left using the passed string.

          '
        required: true
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_regionId_Path'
      - name: exchangeId
        required: true
