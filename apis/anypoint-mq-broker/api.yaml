components:
  requestBodies:
    ackNackBatch:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ackNackBatch'
      x-amf-mediaType: application/json
      description: Request payload for ackNackBatch operations.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token authentication. Login endpoint: https://anypoint.mulesoft.com/accounts/api/login

        '
    clientAuth:
      type: oauth2
      description: 'OAuth2 client credentials. Token endpoint: https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token

        '
      flows:
        clientCredentials:
          tokenUrl: https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token
          scopes: {}
  schemas:
    receiveBatchResponse:
      example: *id005
      type: array
      items:
        type: object
    sendBatch:
      example:
      - headers:
          messageId: 124312340-1234-4321-1236-1234123412344
          messageGroupId: OptionalHeaderToGroupMessagesForFIFOQueues
          deliveryDelay: 20000
        properties:
          userDefinedHeader: User defined stuff
          anotherUserDefinedHeader: Random stuff
        body: This is a message payload
      type: array
      items:
        type: object
        required:
        - headers
        - body
        properties:
          headers:
            type: object
            required:
            - messageId
            properties:
              messageId:
                type: string
              messageGroupId:
                type: string
              deliveryDelay:
                type: integer
          properties:
            type: object
          body:
            type: string
    sendBatchResponse:
      example:
      - messageId: 124312340-1234-4321-1236-1234123412344
        status: successful
        statusMessage: All went fine
      type: array
      items:
        type: object
        required:
        - messageId
        - status
        - statusMessage
        properties:
          messageId:
            type: string
          status:
            enum:
            - successful
            - failure
            type: string
          statusMessage:
            type: string
