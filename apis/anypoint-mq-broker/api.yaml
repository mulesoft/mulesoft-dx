openapi: 3.0.0
info:
  title: Courier Messaging API
  version: 1.0.0
  description: Publish, consume, and acknowledge messages on Anypoint MQ destinations. Manage message locks and delivery.
servers:
- url: http://mq-{REGION_ID}.anypoint.mulesoft.com/api/{version}
  variables:
    REGION_ID:
      default: unknown
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
- url: https://mq-{REGION_ID}.anypoint.mulesoft.com/api/{version}
  variables:
    REGION_ID:
      default: unknown
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
security:
- bearerAuth: []
- clientAuth: []
externalDocs:
  url: http://
  description: 'Introduction to the CourierREST API

    ======================================


    What Is Messaging?

    --------------------------------------


    With Messaging it is defined a kind of communication using middleware or services to communicate between components or applications....

    '
  x-amf-title: Introduction
x-amf-userDocumentation:
- url: http://
  content: "The Message\n======================================\n\nThe primary goal of the CourierREST protocol is to produce and to consume messages. Therefore the Courier message plays a central role of the CourierREST protocol.\n\nCourier messages are not very different from other messaging protocols messages. A CourierREST message has three parts: headers, properties, and a payload.\n\n    ┌────────────────┐\n    │    Headers     │\n    ├────────────────┤\n    │   Properties   │\n    ├────────────────┤\n    │                │\n    │                │\n    │    Payload     │\n    │                │\n    │                │\n    └────────────────┘\n\nA Courier message has three elements: a header, properties, and a body. The mandatory parts are the properties and the body.\n\n* Headers, courier defined metadata\n* Properties, user defined metadata\n* Body, payload of the message\n\n\nHeaders\n--------------------------------------\n\nCourier message properties can be used to add custom information that does not belong, although it is probably related, to the payload.\n\n\n\nProperties\n--------------------------------------\n\nCourier-specific properties like `lockId`, `messageId`, or `deliveryCount`.\n\n\nPayload\n--------------------------------------\n\nCourier messages can only carry one kind of payload, a stream of uninterpreted bytes. This enables with proper encoding to send and to receive data in many different forms.\n"
  title: The Message
paths:
  /organizations: {}
  /organizations/{organizationId}:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
  /organizations/{organizationId}/environments:
