      - name: pollingTime
        description: 'Maximum time in milliseconds to wait for the expected message or messages.

          '
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 20000
          default: 10000
      - name: batchSize
        description: Maximum number of messages to receive in a single call. When set as 1, the response is an array containing only one element.
        required: false
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
      - name: lockTtl
        description: 'Defines the time to live of the created locks in milliseconds.

          '
        required: false
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 86400000
          default: 120000
      - name: payloadVisibility
        description: 'Decides whether to show or hide message payload in response

          '
        required: false
        in: query
        schema:
          type: string
          enum:
          - full
          - none
          - conditional
          default: full
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - name: destinationId
        description: 'Identifier of a destination.

          '
        required: true
        in: path
        schema:
          type: string
          minLength: 1
          maxLength: 127
      responses:
        '200':
          description: 'OK, the message or messages has been fetched correctly.

            '
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/receiveBatchResponse'
              example: &id005
              - headers:
                  messageId: 124312340-1234-4321-1236-1234123412344
                  lockId: 110e8300-e32b-41d4-a716-664400445500
                  ttl: '3600000'
                  messageGroupId: OptionalHeaderWhenMessagesAreGroupedForFIFOQueues
                  deliveryDelay: '10000'
                  deliveryCount: '1'
                  created: Sat, 1 Jan 2022 02:08:22 GMT
                properties:
                  userDefinedHeader: User defined stuff
                  anotherUserDefinedHeader: Random stuff
                  Content-Type: plain/text
                body: This is a message payload
        '204':
          description: 'There are no messages ready to be fetched.

            '
        '400':
          description: 'Invalid request.

            '
        '403':
          description: 'Forbidden. Not enough permissions to access the specified destination.

            '
        '404':
          description: 'The destionation cannot be found.

            '
        '429':
          description: 'You exceeded the quota allowed to your application.

            '
        '503':
          description: 'The service is currently unavailable.

            '
      security:
      - bearerAuth: []
      - clientAuth: []
      - {}
      operationId: getOrganizationsByOrganizationidEnvironmentsByEnvironmentidDestinationsByDestinationidMessages
    put:
      description: 'Publishes a batch of messages to the destination. Batch size must be at least 1 and at most 10.

        If you are using connected app, "Destination publisher for given environment" scope is needed.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - name: destinationId
        description: 'Identifier of a destination.

          '
        required: true
        in: path
        schema:
          type: string
          minLength: 1
          maxLength: 127
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sendBatch'
        x-amf-mediaType: application/json
        description: The messages data to update.
      responses:
