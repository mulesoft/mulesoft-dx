          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    EdgeConfigMultipleVSUpdateRequest:
      type: object
      additionalProperties: false
      required:
      - advancedOption
      - tlsConfigs
      - port
      - virtualServerIds
      - logs
      properties:
        capPolicyId:
          description: The anypoint security policies are getting revamped. This field is going to be deprecated in a future release. If this policy is not used, then this element should not be included.
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        advancedOption:
          $ref: '#/components/schemas/AdvancedOption'
        wafPolicyId:
          description: The anypoint security policies are getting revamped. This field is going to be deprecated in a future release. If this policy is not used, then this element should not be included.
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        tlsConfigs:
          description: Each item in the array represents a way of creating virtual server for edge. A virtual server can be created in one of the three ways. 1 -> By refering a secret of type tls configuration from secrets manager. 2 -> uploading a PEM and key file with optional ca path file. 3 -> uploading a JKS file.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/default_2'
        port:
          $ref: '#/components/schemas/Port'
        virtualServerIds:
          $ref: '#/components/schemas/VirtualServerIds'
        aclPolicyId:
          description: The anypoint security policies are getting revamped. This field is going to be deprecated in a future release. If this policy is not used, then this element should not be included.
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        logs:
          $ref: '#/components/schemas/Logs'
        dosPolicyId:
          description: The anypoint security policies are getting revamped. This field is going to be deprecated in a future release. If this policy is not used, then this element should not be included.
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      patternProperties:
        ^(keyStores\[[0-9]\])$:
          description: File containing one or more certificate entries. The index used should match the index of 'tlsConfigs'. So if tlsConfigs[0].source = 'JKS', keyStores[0] should be used to indicate keyStore file for tlsConfigs[0]
          type: string
          format: binary
        ^(keys\[[0-9]\])$:
          description: The encrypted private key. The index used should match the index of 'tlsConfigs'. So if tlsConfigs[0].source = 'PEM', keys[0] should be used to indicate key file for tlsConfigs[0]
          type: string
          format: binary
        ^(certificates\[[0-9]\])$:
          description: The public certificate. The index used should match the index of 'tlsConfigs'. So if tlsConfigs[0].source = 'PEM', certificates[0] should be used to indicate certificate file for tlsConfigs[0]
          type: string
          format: binary
        ^(capaths\[[0-9]\])$:
          description: The concatenated chain of CA certificates, except the leaf, leading up to the root CA. The index used should match the index of 'tlsConfigs'. So if tlsConfigs[0].source = 'PEM', capaths[0] should be used to indicate ca path file for tlsConfigs[0]
          type: string
          format: binary
    AdvancedOption:
      description: Controls the gateway connection parameters for the client request
      type: object
      additionalProperties: false
      required:
      - maxConnections
      - maxRequestPerConnection
      - connectionIdleTimeout
      - requestLifetime
      - startRequestStreamingPayloadSize
      - startResponseStreamingPayloadSize
      - enableProxyProtocol
      - readRequestTimeout
      - maxPipelineDepth
      - cores
      - memory
      properties:
        mode:
          description: This field describes the way edge is configured to run. In 'shared' mode, the internal load balancer runs on the controller nodes. Make sure ports 80 and 443 are open. In 'dedicated' mode, it runs on load balancer nodes.
          default: shared
          enum:
          - shared
          - dedicated
          type: string
        maxConnections:
          default: 512
          type: integer
          minimum: 1
          maximum: 1000000
        maxRequestPerConnection:
          default: 1000
          type: integer
          minimum: 1
          maximum: 4194304
        connectionIdleTimeout:
          default: 15
          type: integer
          minimum: 1
          maximum: 2592000
        requestLifetime:
          default: 60
          type: integer
          minimum: 1
          maximum: 14400
        startRequestStreamingPayloadSize:
          default: 10240
          type: integer
          minimum: 1
          maximum: 1000000
        startResponseStreamingPayloadSize:
          default: 10240
          type: integer
          minimum: 1
          maximum: 1000000
        enableProxyProtocol:
          default: false
          type: boolean
        readRequestTimeout:
          default: 10
          type: integer
          minimum: 1
          maximum: 1200
        readResponseTimeout:
          default: 300
          type: integer
          minimum: 1
          maximum: 3600
        writeResponseTimeout:
          default: 10
          type: integer
          minimum: 1
          maximum: 3600
        maxPipelineDepth:
          default: 10
          type: integer
          minimum: 1
          maximum: 1000
        clientIpAddressFromHttpHeaderName:
          $ref: '#/components/schemas/default_3'
        cores:
          description: This field is not required for mode type 'dedicated'. If provided with type 'dedicated', this value will be ignored.
          default: 0.25
          type: number
          minimum: 0.25
        memory:
          description: This field is not required for mode type 'dedicated'. If provided with type 'dedicated', this value will be ignored.
          default: 0.5
          type: number
          minimum: 0.5
          maximum: 4
        dosAction:
          description: DOS commands to log and unblock blocked IPs, this configuration is accepeted only if DOS policy is configured for the Edge
          type: object
          additionalProperties: true
          required:
          - view
          - undo
          properties:
            view:
              description: Command info to log all the blocked IP's with this specified timestamp
              example: Thu Jan 24 14:40:25 CST 2019
              type: string
            undo:
              description: Command info to ublock blocked IP's
              type: object
              additionalProperties: true
              required:
              - ip
              - timestamp
              properties:
                ip:
                  description: IP to unblock which got affected due to DOS policy
                  example: 1.2.3.4/30, 1.2.3.4/20
                  type: string
                timestamp:
                  example: Thu Jan 24 14:40:25 CST 2019
                  type: string
        defaultBackEnd:
          description: Additional configuration to support migration to RTF-C
          type: object
          additionalProperties: true
          required:
          - serviceName
          - servicePort
          - secure
          - sniViaProxy
          properties:
            serviceName:
              description: Service name to forward
              example: lab.acme.com
              type: string
            servicePort:
              description: Port of the service
              example: 8080
              type: integer
            secure:
              description: Secure connection
              example: true
              type: boolean
            sniViaProxy:
              description: Preserve the original host header while forwarding to backend service
              example: true
              type: boolean
    Port:
      description: port configuration for deployement of edge
      type: object
      additionalProperties: false
      required:
      - securePort
      - nonSecure
      properties:
        securePort:
          default: 443
          type: integer
        nonSecure:
          type: object
          additionalProperties: false
          required:
          - port
          properties:
            port:
              default: 80
              type: integer
            type:
              enum:
              - accept
              - redirect
              type: string
    VirtualServerIds:
      description: An array of virutal server ids that are configured this agent. To remove an entry from the array skip the entires that you want to remove in update request call.
      type: array
      items:
        $ref: '#/components/schemas/UUID'
    Logs:
      description: Log level configuration used by edge for logging
      type: object
      additionalProperties: false
      properties:
        filters:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              ip:
                type: string
              level:
                $ref: '#/components/schemas/LogLevels'
        portLogLevel:
          $ref: '#/components/schemas/LogLevels'
    CAPPolicyType:
      description: Content attack prevention policy also named as HTTP Limits
      type: object
      additionalProperties: false
      required:
      - type
      - policyData
      properties:
        type:
          default: CAP
          enum:
          - CAP
          type: string
        policyData:
          $ref: '#/components/schemas/CAPPolicyData'
    DOSPolicyType:
      description: Denial of Service policy
      type: object
      additionalProperties: false
      required:
      - type
      - policyData
      properties:
        type:
          enum:
          - DOS
          type: string
        policyData:
          $ref: '#/components/schemas/DOSPolicyData'
    ACLPolicyType:
      description: Access Control List policy also named as IP Whitelist is to define White Listed IP adrress in CIDR formats
      type: object
      additionalProperties: false
      required:
      - type
      - policyData
      properties:
        type:
          description: ''
          default: ACL
          type: string
        policyData:
          $ref: '#/components/schemas/ACLPolicyData'
    WAFPolicyType:
      description: Web Application Firewall policy. See ./WafRules for RuleSet details.
      type: object
      additionalProperties: false
      required:
      - type
      - policyData
      properties:
        type:
          default: WAF
          enum:
          - WAF
          type: string
        policyData:
          $ref: '#/components/schemas/WAFPolicyData'
    UUID:
      type: string
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    default:
      x-amf-union:
      - $ref: '#/components/schemas/CAPPolicyData'
      - $ref: '#/components/schemas/ACLPolicyData'
      - $ref: '#/components/schemas/DOSPolicyData'
      - $ref: '#/components/schemas/WAFPolicyData'
    default_2:
      x-amf-union:
      - $ref: '#/components/schemas/CSM_SOURCE'
      - $ref: '#/components/schemas/PEM_SOURCE'
      - $ref: '#/components/schemas/JKS_SOURCE'
    default_3:
      x-amf-union:
      - type: string
      - type: 'null'
    LogLevels:
      description: Log levels
      enum:
      - TRACE
      - DEBUG
      - VERBOSE
      - INFO
      - WARNING
      - ERROR
      - FATAL
      type: string
    CAPPolicyData:
      type: object
      additionalProperties: false
      required:
      - name
      - maxBodyLength
      - maxRequestLineLength
      - maxHeaderLength
      - maxNumberHeadersTrailers
      - maxTrailerLength
      - allowMethods
      properties:
        name:
          $ref: '#/components/schemas/Name'
        maxBodyLength:
          default: 104857600
          type: integer
          minimum: 1
          maximum: 2147483647
        maxRequestLineLength:
          default: 4096
          type: integer
          minimum: 256
          maximum: 65535
        maxHeaderLength:
          default: 16384
          type: integer
          minimum: 256
          maximum: 65535
        maxNumberHeadersTrailers:
          default: 32
          type: integer
          minimum: 1
          maximum: 32768
        maxTrailerLength:
          default: 16384
          type: integer
          minimum: 256
          maximum: 65535
        allowMethods:
          type: array
          items:
            type: string
    DOSPolicyData:
      type: object
      additionalProperties: false
      required:
      - name
      - window1TimePeriod
      - maxSourcesToMonitor
      - summaryNotificationPeriod
      - alertPeriod
      - rejectMessageAction
      - excessiveTrafficEventTrigger
      - protocolErrors
      - routingErrors
      - authenticationErrors
      - qosErrors
      - contentErrors
      - wafErrors
      properties:
        name:
          $ref: '#/components/schemas/Name'
        window1TimePeriod:
          default: 60
          type: integer
          minimum: 60
          maximum: 3600
        maxSourcesToMonitor:
          default: 35345
          type: integer
          minimum: 5000
          maximum: 500000
        summaryNotificationPeriod:
          default: 900
          type: integer
          minimum: 60
          maximum: 3600
        alertPeriod:
          default: 60
          type: integer
          minimum: 60
          maximum: 3600
        rejectMessageAction:
          default: drop-silently
          enum:
          - send-HTTP-503
          - drop-silently
          type: string
        excessiveTrafficEventTrigger:
          default: 0
          type: integer
          minimum: 0
          maximum: 1267898754
        protocolErrors:
          $ref: '#/components/schemas/DOSError'
        routingErrors:
          $ref: '#/components/schemas/DOSError'
        authenticationErrors:
          $ref: '#/components/schemas/DOSError'
        qosErrors:
          $ref: '#/components/schemas/DOSError'
        contentErrors:
          $ref: '#/components/schemas/DOSError'
        wafErrors:
          $ref: '#/components/schemas/DOSError'
    ACLPolicyData:
      type: object
      additionalProperties: true
      required:
      - name
      - ipWhiteList
      properties:
        name:
          $ref: '#/components/schemas/Name'
        ipWhiteList:
          description: White Listed ip adress(es) in IP4 and IPv6 CIDR format
          type: array
          items:
            type: object
            additionalProperties: true
            required:
            - ip
            properties:
              ip:
                type: string
                pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(/(3[0-2]|2[0-9]|1[0-9]|[0-9]))?$
    WAFPolicyData:
      type: object
      additionalProperties: true
      required:
      - name
      - request
      - response
      properties:
        name:
          $ref: '#/components/schemas/Name'
        request:
          type: object
          additionalProperties: false
          required:
          - categories
          - performanceOptions
          properties:
            categories:
              type: object
              additionalProperties: true
              required:
              - scannerDetection
              - protocolEnforcement
              - protocolAttack
              - applicationAttackLfi
              - applicationAttackRfi
              - applicationAttackRce
              - applicationAttackPhp
              - applicationAttackXss
              - applicationAttackSqli
              - applicationAttackSessionFixation
              - reqSidPiiCore
              - reqSidPiiEnhanced
              - reqSidPci
              - reqSidPhi
              properties:
                scannerDetection:
                  $ref: '#/components/schemas/WafAction'
                protocolEnforcement:
                  $ref: '#/components/schemas/WafAction'
                protocolAttack:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackLfi:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackRfi:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackRce:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackPhp:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackXss:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackSqli:
                  $ref: '#/components/schemas/WafAction'
                applicationAttackSessionFixation:
                  $ref: '#/components/schemas/WafAction'
                reqSidPiiCore:
                  $ref: '#/components/schemas/WafAction'
                reqSidPiiEnhanced:
                  $ref: '#/components/schemas/WafAction'
                reqSidPci:
                  $ref: '#/components/schemas/WafAction'
                reqSidPhi:
                  $ref: '#/components/schemas/WafAction'
            performanceOptions:
              type: object
              additionalProperties: true
              required:
              - enableRequestBodyInspection
              properties:
                enableRequestBodyInspection:
                  type: boolean
        response:
          type: object
          additionalProperties: false
          required:
          - categories
          - performanceOptions
          properties:
            categories:
              type: object
              additionalProperties: true
              required:
              - dataLeakages
              - dataLeakagesSql
              - dataLeakagesJava
              - dataLeakagesPhp
              - dataLeakagesIis
              - rspSidPiiCore
              - rspSidPiiEnhanced
              - rspSidPci
              - rspSidPhi
              properties:
                dataLeakages:
                  $ref: '#/components/schemas/WafAction'
                dataLeakagesSql:
                  $ref: '#/components/schemas/WafAction'
                dataLeakagesJava:
                  $ref: '#/components/schemas/WafAction'
                dataLeakagesPhp:
                  $ref: '#/components/schemas/WafAction'
                dataLeakagesIis:
                  $ref: '#/components/schemas/WafAction'
                rspSidPiiCore:
                  $ref: '#/components/schemas/WafAction'
                rspSidPiiEnhanced:
                  $ref: '#/components/schemas/WafAction'
                rspSidPci:
                  $ref: '#/components/schemas/WafAction'
                rspSidPhi:
                  $ref: '#/components/schemas/WafAction'
            performanceOptions:
              type: object
              additionalProperties: true
              required:
              - enableResponseBodyInspection
              properties:
                enableResponseBodyInspection:
                  type: boolean
        disabledRuleIds:
          description: Rules which should be disabled
          type: array
          items:
            type: integer
    CSM_SOURCE:
      description: Defines the SSL security policy which is configured at CSM sever
      type: object
      additionalProperties: false
      required:
      - securityNSID
      - tlsContextID
      - environment
      properties:
        securityNSID:
          description: The secret group id, generated during creation of the secret group from CSM sever
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        tlsContextID:
          description: The TLS context id, which is selected from the secret group
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        environment:
          $ref: '#/components/schemas/UUID'
        source:
          default: SECRETS-MANAGER
          enum:
          - SECRETS-MANAGER
          type: string
    PEM_SOURCE:
      description: ''
      type: object
      additionalProperties: true
      required:
      - source
      - keyPassphrase
      properties:
        source:
          default: PEM
          enum:
          - PEM
          type: string
        keyPassphrase:
          description: Passphrase with which private key for a particular alias is protected
          type: string
    JKS_SOURCE:
      description: ''
      type: object
      additionalProperties: true
      required:
      - source
      - keyPassphrase
      - storePassphrase
      - alias
      properties:
        source:
          default: JKS
          enum:
          - JKS
          type: string
        keyPassphrase:
          description: Passphrase with which private key for a particular alias is protected
          type: string
          maxLength: 64
        storePassphrase:
          description: Passphrase with which keystore is protected
          type: string
          maxLength: 64
        alias:
          description: The alias name of the entry that contains the certificate
          type: string
          maxLength: 64
    Name:
      type: string
      pattern: ^[a-zA-Z][-a-zA-Z0-9]*$
      minLength: 3
      maxLength: 35
    DOSError:
      type: object
      additionalProperties: false
      required:
      - window1
      - window2
      - window3
      properties:
        window1:
          $ref: '#/components/schemas/Window1'
        window2:
          $ref: '#/components/schemas/Window2'
        window3:
          $ref: '#/components/schemas/Window3'
    WafAction:
      description: Action to take when WAF rule is triggered
      enum:
      - Disable
      - DetectAndReject
      - DetectAndAllow
      type: string
    Window1:
      description: Lowest escalation level DoS window where an administrator defined period of time in which Edge determines that a DoS attack is occurring and automatically applies a DoS action to the DoS attacker’s message requests.
      type: object
      additionalProperties: false
      required:
      - action
      - threshold
      - rate
      properties:
        action:
          $ref: '#/components/schemas/Actions'
        threshold:
          $ref: '#/components/schemas/Threshold'
        rate:
          $ref: '#/components/schemas/Rate'
    Window2:
      description: Supersede escalation level DoS window where an administrator defined period of time in which Edge determines that a DoS attack is occurring and automatically applies a DoS action to the DoS attacker’s message requests.
      type: object
      additionalProperties: false
      required:
      - action
      - threshold
      - rate
      - numberOfPrecedingWindows
      properties:
        action:
          $ref: '#/components/schemas/Actions'
        threshold:
          $ref: '#/components/schemas/Threshold'
        rate:
          $ref: '#/components/schemas/Rate'
        numberOfPrecedingWindows:
          $ref: '#/components/schemas/NumberOfPrecedingWindows'
    Window3:
      description: Highest escalation level DoS window where an administrator defined period of time in which Edge determines that a DoS attack is occurring and automatically applies a DoS action to the DoS attacker’s message requests.
      type: object
      additionalProperties: false
      required:
      - action
      - threshold
      - rate
      - numberOfPrecedingWindows
      properties:
        action:
          $ref: '#/components/schemas/Actions'
        threshold:
          $ref: '#/components/schemas/Threshold'
        rate:
          $ref: '#/components/schemas/Rate'
        numberOfPrecedingWindows:
          $ref: '#/components/schemas/NumberOfPrecedingWindows'
    Actions:
      description: A Runtime activity to take upon a client
      enum:
      - none
      - shape-interval
      - shape-forever
      - block-interval
      - block-forever
      type: string
    Threshold:
      description: Number to trigger the action within a window.
      default: 1
      type: integer
      minimum: 1
      maximum: 65535
    Rate:
      default: 1
      type: integer
      minimum: 0
      maximum: 2000
    NumberOfPrecedingWindows:
      default: 1
      type: integer
      minimum: 1
      maximum: 32
  parameters:
    XOrigin_organizationId_Path:
      name: organizationId
      description: The organization id
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
    XOrigin_envId_Path:
      name: envId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listEnvironments
        description: GET `/organizations/{organizationId}/environments`; use each `data[].id` value as an environment identifier.
        values: $.data[*].id
        labels: $.data[*].name
      description: The env ID to identify the target resource.
    XOrigin_edgeConfigId_Path:
      name: edgeConfigId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:anypoint-security-policies
        operation: getByOrganizationidAgentsByAgentidEdge
        description: GET `/{organizationId}/agents/{agentId}/edge` in this API; use `id` values as `edgeConfigId`.
        values: $.id
        labels: $.name
      description: The edgeConfig ID to identify the target resource.
    XOrigin_policyId_Path:
      name: policyId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:anypoint-security-policies
        operation: getByOrganizationidPolicies
        description: GET `/{organizationId}/policies` in this API; use `[].id` values as `policyId`.
        values: $[*].id
        labels: $[*].name
      description: The policy ID to identify the target resource.
