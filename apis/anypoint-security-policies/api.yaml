openapi: 3.0.0
info:
  title: Anypoint Security Policies API
  version: 2.0.0
  description: Manage edge security policies, TLS contexts, virtual servers, and deployments for Anypoint Security.
servers:
- url: https://anypoint.mulesoft.com/securityfabric/api/{version}/organizations
  variables:
    version:
      default: unknown
      description: API version identifier.
- url: https://{region}.anypoint.mulesoft.com/securityfabric/api/{version}/organizations
  variables:
    region:
      default: eu1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
- url: https://{region}.platform.mulesoft.com/securityfabric/api/{version}/organizations
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /{organizationId}:
    delete:
      description: Deletes all the data belonging to an organization, sub-organization from Security Fabric Edge and Anypoint Security Policies
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '204':
          description: Successful. Returns zero length body.
      operationId: deleteByOrganizationid
  /{organizationId}/environments/{envId}:
    delete:
      description: Deletes all the data belonging to an environments from Security Fabric Edge
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_envId_Path'
      responses:
        '204':
          description: Successful. Returns zero length body.
      operationId: deleteByOrganizationidEnvironmentsByEnvid
  /{organizationId}/environments/{envId}/agents/{agentId}/domains:
    get:
      description: Get all CN (common name) and SANs (Subject Alternate Name) list
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_envId_Path'
      - name: agentId
        required: true
        in: path
        schema:
          type: string
        description: The agent ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id001
                  type: https
                  domains:
                  - acme.com
                  - medical.acme.com
                  - foo.com
                type: object
                additionalProperties: true
                required:
                - type
                - domains
                properties:
                  type:
                    enum:
                    - https
                    - http
                    type: string
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/Domains'
              example: *id001
        '404':
          description: Not found. The requested resource does not exist.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id002
                  name: NotFoundError
                  status: 404
                  message: Edge Config for the given Runtime Fabric id does not exist
                  details: {}
              example: *id002
      operationId: getByOrganizationidEnvironmentsByEnvidAgentsByAgentidDomains
