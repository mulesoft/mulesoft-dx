    PublishExchange:
      type: object
      required:
      - name
      - apiVersion
      - version
      - tags
      - main
      - assetId
      - groupId
      - classifier
      - isVisual
      - status
      properties:
        name:
          description: Project name
          example: new-raml-specification
          type: string
        apiVersion:
          description: Version of the API, which corresponds to the specification's version property
          example: v1
          type: string
        version:
          description: Version of the Exchange Asset to be published (must follow Semver syntax)
          example: 1.0.0
          type: string
        tags:
          description: An array of strings to be saved as asset's tags
          example:
          - raml
          - specification
          type: array
          items: {}
        main:
          description: Main file of the project to be published
          example: api.raml
          type: string
        assetId:
          description: Exchange Asset ID
          example: new-raml-specification
          type: string
        groupId:
          description: Business group ID to which the project is going to be published
          example: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
        classifier:
          description: Classifier of the project being published which is related to the asset's language
          enum:
          - oas
          - raml
          - raml-fragment
          example: raml
          type: string
        isVisual:
          description: True when the project is visual mode
          example: false
          type: boolean
        metadata:
          description: A design center object describing asset projectId and branchId
          type: object
          required:
          - projectId
          - branchId
          properties:
            projectId:
              description: Unique ID that identifies the project
              example: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
              type: string
              pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
            branchId:
              description: Name of the branch
              example: master
              type: string
        publishList:
          description: Project files that are not being referenced from the root file to include in the asset
          example:
          - api.raml
          - exchange.json
          type: array
          items: {}
        originalFormatVersion:
          description: The version of the format of the API specification
          example: '1.0'
          type: string
        status:
          description: Exchange asset lifecycle state
          enum:
          - development
          - published
          example: published
          type: string
    PublishResponse:
