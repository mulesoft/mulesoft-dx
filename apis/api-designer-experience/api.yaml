          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
        assetId:
          description: AssetID of the published asset
          example: new-raml-specification
          type: string
        version:
          description: Asset version of the published asset
