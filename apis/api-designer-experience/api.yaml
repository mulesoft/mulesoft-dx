openapi: 3.0.0
info:
  title: API Designer Experience API
  description: Design and manage API specifications and fragments in Design Center. Create projects, manage branches, modify files, and publish to Exchange.
  version: 1.0.0
servers:
- url: https://anypoint.mulesoft.com/designcenter/api-designer
- url: https://{region}.anypoint.mulesoft.com/designcenter/api-designer
  variables:
    region:
      default: eu1
      description: Region identifier for the service endpoint.
- url: https://{region}.platform.mulesoft.com/designcenter/api-designer
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /ping:
    get:
      description: to check if service is up
      responses:
        '200':
          description: Successful operation.
      operationId: getPing
  /status:
    get:
      description: to check if service is up
      responses:
        '200':
          description: Successful operation.
      operationId: getStatus
  /projects:
    post:
      description: Creates a new project
      parameters:
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
        x-amf-mediaType: application/json
        description: The projects data to create.
      responses:
        '201':
          description: Resource created successfully.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                organizationId: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                id: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                name: string
                description: string
                type: string
                vcsType: string
                createdBy: string
                createdDate: 0
        '401':
          description: Authorization failed
        '409':
          description: Project {type}-{name} already exists
      operationId: createProjects
    get:
      description: Gets all the projects that the user has access
      parameters:
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
              example:
              - id: string
                type: string
        '401':
          description: Authorization failed
      operationId: getProjects
  /projects/import:
    post:
      description: Creates a project from a zip file containing files
      parameters:
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectImport'
        x-amf-mediaType: application/json
        description: The import data to create.
      responses:
        '201':
          description: Resource created successfully.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                organizationId: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                id: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                name: string
                description: string
                type: string
                vcsType: string
                createdBy: string
                createdDate: 0
        '400':
          description: Bad Request
        '401':
          description: Authorization failed
        '409':
          description: Project {type}-{name} already exists
      operationId: createProjectsImport
  /projects/{projectId}:
    get:
      description: Get project data
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                organizationId: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                id: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                name: string
                description: string
                type: string
                vcsType: string
                createdBy: string
                createdDate: 0
        '401':
          description: Authorization failed
      operationId: getProjectsByProjectid
    patch:
      description: 'Patches project metadata.

        CreatedBy is only editable by the Project Owner or Organization Admins

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatch'
        x-amf-mediaType: application/json
        description: The projects data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                organizationId: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                id: 6a2f41a3-c54c-fce8-32d2-0324e1c32e22
                name: string
                description: string
                type: string
                vcsType: string
                createdBy: string
                createdDate: 0
        '401':
          description: Authorization failed
      operationId: patchProjectsByProjectid
    delete:
      description: Deletes the given project
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '204':
          description: Operation completed successfully with no content returned.
        '401':
          description: Authorization failed
      operationId: deleteProjectsByProjectid
  /projects/{projectId}/branches:
    post:
      description: Creates new branch
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              description: Data of the branch to create
              type: object
              required:
              - name
              - commitId
              properties:
                name:
                  description: Name of the branch
                  example: master
                  type: string
                commitId:
                  description: Commit ID
                  example: 734713bc0
                  type: string
        x-amf-mediaType: application/json
        description: The branches data to create.
      responses:
        '201':
          description: Resource created successfully.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                description: Returns created branch
                type: object
                required:
                - name
                - commitId
                properties:
                  name:
                    description: Name of the branch
                    example: master
                    type: string
                  commitId:
                    description: Commit ID
                    example: 734713bc0
                    type: string
              example:
                name: master
                commitId: 734713bc0
        '401':
          description: Authorization failed
      operationId: createProjectsByProjectidBranches
    get:
      description: List branches
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: List of existing branches
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Branch'
              example:
              - id: string
                type: string
        '401':
          description: Authorization failed
      operationId: getProjectsByProjectidBranches
  /projects/{projectId}/branches/{branch}:
    delete:
      description: Deletes a branch
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '204':
          description: Operation completed successfully with no content returned.
        '401':
          description: Authorization failed
      operationId: deleteProjectsByProjectidBranchesByBranch
  /projects/{projectId}/branches/{branch}/open:
    post:
      description: List project files. If user's workingDir does not exists, it creates one.
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Files'
              example: &id001
              - path: api.raml
                type: FILE
              - path: types
                type: FOLDER
              - path: types/customer.raml
                type: FILE
              - path: types/person.raml
                type: FILE
              - path: types/address.raml
                type: FILE
        '401':
          description: Authorization failed
      operationId: createProjectsByProjectidBranchesByBranchOpen
  /projects/{projectId}/branches/{branch}/clean:
    post:
      description: cleans uncommited files from users workingDir
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '401':
          description: Authorization failed
      operationId: createProjectsByProjectidBranchesByBranchClean
  /projects/{projectId}/branches/{branch}/status:
    get:
      description: list WorkingDir status
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '401':
          description: Authorization failed
      operationId: getProjectsByProjectidBranchesByBranchStatus
  /projects/{projectId}/branches/{branch}/save:
    post:
      description: save listed files (save and save All)
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileContents'
        x-amf-mediaType: application/json
        description: The save data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Files'
              example: *id001
        '401':
          description: Authorization failed
        '409':
          description: Could not save changes
      operationId: createProjectsByProjectidBranchesByBranchSave
  /projects/{projectId}/branches/{branch}/save/v2:
    post:
      description: 'Save listed files (save and save All).

        Accepts any file as body''s content-type can be multipart/form-data

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_projectId_Path'
      - name: branch
        description: Branch name to which apply a given operation
        required: true
        in: path
        schema:
          type: string
      - name: x-owner-id
        description: "User's ownerId, which identifies the user performing the operation. \nThis is NOT the username, but an UUID that can be found in the users page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: x-organization-id
        description: "OrganizationId, which identifies the organization to which perform the operation. \nThis can be found in the organizations page by the organization administrator.\n"
        required: true
        in: header
        schema:
          type: string
          pattern: ^[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}$
      - name: authorization
        description: Bearer Access Token
        required: true
        in: header
        schema:
          type: string
      requestBody:
        content:
