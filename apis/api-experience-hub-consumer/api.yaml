components:
  schemas:
    ErrorDetail:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          description: Detailed error message
        code:
          type: string
          description: Machine-readable error code
        arguments:
          type: array
          description: Additional context for the error
          items:
            type: object
    ErrorResponseDTO:
      type: object
      required:
      - name
      - status
      - message
      properties:
        name:
          type: string
          description: Error name
        status:
          type: integer
          description: HTTP status code
          format: int32
        message:
          type: string
          description: Human-readable error message
        details:
          type: array
          description: List of error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ApplicationUpsertDTO:
      required:
      - name
      type: object
      properties:
        apiEndpoints:
          type: boolean
          description: Whether to use API endpoint URIs as redirect URIs
        description:
          maxLength: 4096
          minLength: 0
          type: string
          description: Application description
        grantTypes:
          type: array
          description: OAuth grant types for the application
          example:
          - client_credentials
          items:
            type: string
            description: OAuth grant types for the application
            example: "[\"client_credentials\"]"
        name:
          maxLength: 151
          minLength: 0
          type: string
          description: Application name
          example: My API Client
        redirectUri:
          type: array
          description: OAuth redirect URIs for the application
          items:
            type: string
            description: OAuth redirect URIs for the application
        url:
          type: string
          description: Application URL
          format: uri
      description: Application creation or update request
    ApiManagerApplicationDTO:
      required:
      - clientId
      - id
      - name
      type: object
      properties:
        clientId:
          type: string
          description: OAuth client ID for the application
          format: uuid
        clientProvider:
          $ref: "#/components/schemas/ApiManagerClientProviderDTO"
        clientSecret:
          type: string
          description: OAuth client secret for the application
        description:
          type: string
          description: Human-readable description of the application
        grantTypes:
          type: array
          description: OAuth grant types enabled for the application
          items:
            type: string
            description: OAuth grant types enabled for the application
        id:
          type: string
          description: Unique application identifier
        lastUpdateDate:
          type: string
          description: Timestamp of the last update to the application
          format: date-time
        name:
          type: string
          description: Application name
        redirectUri:
          type: array
          description: OAuth redirect URIs registered for the application
          items:
            type: string
            description: OAuth redirect URIs registered for the application
        url:
          type: string
          description: Application URL
          format: uri
    ApiManagerClientProviderDTO:
      type: object
      required:
      - providerId
      properties:
        name:
          type: string
          description: Client provider name
        providerId:
          type: string
          description: Unique identifier of the client provider
          format: uuid
        type:
          type: string
          description: Client provider type
      description: Client identity provider associated with this application
    SelectedShapeDTO:
      required:
      - selectedShapeType
      type: object
      properties:
        selectedShape:
          type: string
          description: Name or identifier of the selected API shape
        selectedShapeType:
          type: string
          description: Type of the selected shape
          enum:
          - SUMMARY
          - TYPE
          - ENDPOINT
          - OPERATION
          - DOCUMENTATION
          - SECURITY
          - METHOD
    ConsumerAssetsSearchRequest:
      type: object
      properties:
        assetTypes:
          type: array
          description: Filter by asset types
          example:
          - rest-api
          - http-api
          items:
            type: string
            description: Filter by asset types
            example: "[\"rest-api\",\"http-api\"]"
        categories:
          type: array
          description: Filter by categories in key:value format
          example:
          - Department:Finance
          items:
            type: string
            description: Filter by categories in key:value format
            example: "[\"Department:Finance\"]"
        searchTerm:
          type: string
          description: Text to search for in asset names and descriptions
        sort:
          $ref: "#/components/schemas/SearchSort"
      description: Search criteria for portal assets
    SearchSort:
      type: object
      required:
      - criteria
      - direction
      properties:
        direction:
          type: string
          description: Sort direction
          enum:
          - ASC
          - DESC
        criteria:
          type: string
          description: Sort criteria field
          enum:
          - LAST_UPDATED
          - NAME
          - CREATED_AT
      description: Sort configuration for search results
    ConsumerAssetSearchResult:
      required:
      - assets
      type: object
      properties:
        assets:
          type: array
          description: List of assets matching the search criteria
          items:
            $ref: "#/components/schemas/ConsumerCommunityAsset"
        facets:
          type: array
          description: Available facets for filtering search results
          items:
            type: string
            description: Available facets for filtering search results
    ConsumerCommunityAsset:
      required:
      - assetId
      - groupId
      - name
      - type
      type: object
      properties:
        major:
          type: integer
          description: Major version number
          format: int32
        minor:
          type: integer
          description: Minor version number
          format: int32
        mayorComponent:
          type: integer
          description: "Major version component (legacy field name)"
          format: int32
        minorComponent:
          type: integer
          description: Minor version component
          format: int32
        minorVersionComponents:
          type: array
          description: List of minor version component strings
          items:
            type: string
        assetId:
          type: string
          description: Asset identifier within the organization
        description:
          type: string
          description: Human-readable description of the asset
        groupId:
          type: string
          description: Organization group ID that owns the asset
        icon:
          type: string
          description: URL or encoded content of the asset icon
          format: uri
        tags:
          uniqueItems: true
          type: array
          description: Tags associated with the asset
          items:
            type: string
            description: Tags associated with the asset
        categories:
          uniqueItems: true
          type: array
          description: Categories assigned to the asset in key:value format
          items:
            type: string
            description: Categories assigned to the asset in key:value format
        latestPatchVersion:
          type: string
          description: Latest patch version string
          example: "1.0.1"
        minorVersion:
          type: string
          description: Current minor version
          example: "v1"
          pattern: ^v?\d+$
        minorVersions:
          type: array
          description: All available minor versions for this asset
          items:
            type: string
            description: All available minor versions for this asset
        name:
          type: string
          description: Display name of the asset
        type:
          type: string
          description: Asset type classifier
          example: rest-api
        updatedDate:
          type: string
          description: Timestamp of the last update to the asset
          format: date-time
      description: List of assets matching the search criteria
    ApplicationCreateDTO:
      required:
      - instanceId
      - name
      type: object
      properties:
        apiEndpoints:
          type: boolean
          description: Whether to use API endpoint URIs as redirect URIs
        description:
          maxLength: 4096
          minLength: 0
          type: string
          description: Application description
        grantTypes:
          type: array
          description: OAuth grant types for the application
          example:
          - client_credentials
          items:
            type: string
            description: OAuth grant types for the application
            example: "[\"client_credentials\"]"
        name:
          maxLength: 151
          minLength: 0
          type: string
          description: Application name
          example: My API Client
        redirectUri:
          type: array
          description: OAuth redirect URIs for the application
          items:
            type: string
            description: OAuth redirect URIs for the application
        url:
          type: string
          description: Application URL
          format: uri
        instanceId:
          type: string
          description: API instance ID to associate the application with
          format: uuid
      description: Request body for creating a new client application
    ApplicationCreatedResponseDTO:
      required:
      - id
      - name
      type: object
      properties:
        clientId:
          type: string
          description: OAuth client ID assigned to the application
          format: uuid
        clientSecret:
          type: string
          description: OAuth client secret assigned to the application
        description:
          type: string
          description: Application description
        id:
          type: string
          description: Unique application identifier
        name:
          type: string
          description: Application name
    ContractCreateDTO:
      required:
      - acceptedTerms
      - applicationId
      - instanceId
      type: object
      properties:
        acceptedTerms:
          type: boolean
          description: Whether the user has accepted the API terms and conditions
        applicationId:
          type: string
          description: ID of the application requesting access
          format: uuid
        instanceId:
          type: string
          description: ID of the API instance to create a contract with
          format: uuid
        tierId:
          type: integer
          description: ID of the SLA tier to request
          format: int32
          nullable: true
      description: Request body for creating an API access contract
    ContractCreatedResponseDTO:
      type: object
      required:
      - id
      - status
      properties:
        clientId:
          type: string
          description: OAuth client ID of the application
          format: uuid
        clientSecret:
          type: string
          description: OAuth client secret of the application
        id:
          type: string
          description: Unique contract identifier
        requestedTier:
          $ref: "#/components/schemas/TierDTO"
        status:
          type: string
          description: Contract status
          example: APPROVED
    TierDTO:
      type: object
      required:
      - id
      - name
      - status
      properties:
        active:
          type: boolean
          description: Whether the tier is currently active (derived from status == ACTIVE)
        autoApprove:
          type: boolean
          description: Whether contracts with this tier are automatically approved
        description:
          type: string
          description: Human-readable description of the tier
        id:
          type: string
          description: Unique tier identifier
        limits:
          type: array
          description: Rate limit definitions for this tier
