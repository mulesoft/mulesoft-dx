openapi: 3.0.0
info:
  title: API Platform API
  version: 2.0.0
  description: Manage APIs, applications, alerts, and classifications in the Anypoint API Platform repository.
servers:
- url: https://anypoint.mulesoft.com/apiplatform/repository/{version}
  variables:
    version:
      default: unknown
      description: API version identifier.
- url: https://{region}.anypoint.mulesoft.com/apiplatform/repository/{version}
  variables:
    region:
      default: eu1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
- url: https://{region}.platform.mulesoft.com/apiplatform/repository/{version}
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /public: {}
  /public/apis:
    get:
      description: Retrieves a list of APIs.
      parameters:
      - name: requireRaml
        description: Search only those APIs which have a publicly accesible RAML specification.
        required: true
        in: query
        schema:
          type: boolean
      - name: offset
        description: Skip over a number of elements by specifying an offset value for the query.
        required: true
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 2147483647
          default: 0
      - name: limit
        description: Limit the number of elements on the response.
        required: true
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 100
      - name: sort
        description: Property to sort by.
        required: true
        in: query
        schema:
          type: string
      - name: ascending
        description: Order for sorting.
        required: true
        in: query
        schema:
          type: boolean
      - name: query
        description: Search criteria.
        required: true
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
      operationId: getPublicApis
  /organizations:
    description: Organizations are the container entity for all API Portal-related resources.
  /organizations/active:
    get:
      description: Get the active organization.
      responses:
        '200':
          description: Successful operation.
      operationId: getOrganizationsActive
  /organizations/{organizationId}:
    description: The organization's data.
    get:
      description: Get the organization.
      parameters:
      - name: extended
        description: Obtain extended information from the organization.
        required: true
        in: query
        schema:
          type: boolean
      - name: resolveTheme
        description: Resolves the theme inheritance.
        required: true
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful.
        '400':
          description: Bad Request.
        '500':
          description: An unknown error occurred.
      operationId: getOrganizationsByOrganizationid
    put:
      description: Update the organization.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      requestBody:
        $ref: '#/components/requestBodies/Generated3'
        description: The organizations data to update.
      responses:
        '200':
          description: Successful.
        '400':
          description: Bad Request.
        '500':
          description: An unknown error occurred.
      operationId: updateOrganizationsByOrganizationid
    delete:
      description: Delete the organization.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '204':
          description: Organization deleted.
      operationId: deleteOrganizationsByOrganizationid
  /organizations/{organizationId}/migration-mapping:
    get:
      description: Get all api version migration mappings in CSV format. This is for setting up the Crowd upgrade.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: getOrganizationsByOrganizationidMigrationMapping
  /organizations/{organizationId}/permissions:
