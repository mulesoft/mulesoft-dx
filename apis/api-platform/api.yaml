      responses:
        '200':
          description: Successfully retrieved alert definition.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                allOf:
                - anyOf:
                  - type: object
                    required:
                    - type
                    - policyId
                    - policyTemplate
                    properties:
                      type:
                        enum:
                        - api-policy-violation
                      policyId:
                        type: integer
                      policyTemplate:
                        type: object
                        required:
                        - id
                        - name
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                            maxLength: 150
                  - type: object
                    required:
                    - type
                    properties:
                      type:
                        enum:
                        - api-request-count
                  - type: object
                    required:
                    - type
                    properties:
                      type:
                        enum:
                        - api-response-code
                  - type: object
                    required:
                    - type
                    properties:
                      type:
                        enum:
                        - api-response-time
                - type: object
                  required:
                  - apiAlertsVersion
                  - name
                  - api
                  - apiVersion
                  - enabled
                  - severity
                  - recipients
                  - period
                  - condition
                  properties:
                    apiAlertsVersion:
                      enum:
