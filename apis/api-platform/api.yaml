        description: The apiVersion ID query parameter.
      - name: tierId
        required: true
        in: query
        schema:
          type: string
        description: The tier ID query parameter.
      - name: lastModifiedSince
        description: 'Return items which have been modified since the specified timestamp

          '
        required: true
        in: query
        schema:
          type: integer
          minimum: 0
      - name: alertId
        required: true
        in: query
        schema:
          type: string
        description: The alert ID query parameter.
      - name: query
        description: Search criteria.
        required: true
        in: query
        schema:
          type: string
      - name: policyId
        required: true
        in: query
        schema:
          type: string
        description: The policy ID query parameter.
      - name: offset
        description: Skip over a number of elements by specifying an offset value for the query.
        required: true
        in: query
        schema:
          type: integer
          minimum: 0
          maximum: 2147483647
          default: 0
      - name: apiId
        required: true
        in: query
        schema:
          type: string
        description: The api ID query parameter.
      - name: ascending
        description: Order for sorting.
        required: true
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/XOrigin_environmentId_Query'
      - name: severity
        required: true
        in: query
        schema:
          type: string
        description: The severity query parameter.
      - name: sort
        description: Property to sort by.
        required: true
        in: query
        schema:
          type: string
      - name: type
        required: true
        in: query
        schema:
          type: string
        description: The type query parameter.
      - name: limit
        description: Limit the number of elements on the response.
        required: true
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 100
      - name: active
        required: true
        in: query
        schema:
          type: boolean
        description: The active query parameter.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successfully retrieved alert definitions.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                  value:
                    total: 1234
                    data:
                    - apiVersion:
                        name: My First API
                        id: 12345
                        apiId: 67890
                      name: My First API's Request Count Alert
                      severity: warning
                      recipients:
                      - role: Api Version Owner
                      - userId: abcde-fghij-klmno
                        name: Jane Doe
                        email: jane.doe@example.com
                      period:
                        duration:
                          count: 1
                          weight: HOURS
                        repeat: 4
                      type: requestCount
                      condition:
                        aggregate: count
                        operator: GREATER_THAN
                        value: 1000
                    - apiVersion:
                        name: My First API
                        id: 12345
                        apiId: 67890
                      name: My First API's Request Count Alert
                      severity: warning
                      recipients:
                      - role: Api Version Owner
                      - userId: abcde-fghij-klmno
                        name: Jane Doe
                        email: jane.doe@example.com
                      period:
                        duration:
                          count: 1
                          weight: HOURS
                        repeat: 4
                      type: requestCount
                      condition:
                        aggregate: count
                        operator: GREATER_THAN
                        value: 1000
              example: *id001
      operationId: getOrganizationsByOrganizationidAlerts
    post:
      description: Creates a new element.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      requestBody:
        $ref: '#/components/requestBodies/Generated3'
        description: The alerts data to create.
      responses:
        '201':
          description: The new element has been successfully created.
      operationId: createOrganizationsByOrganizationidAlerts
  /organizations/{organizationId}/environments:
    description: A list of available environments to deploy to.
    get:
      description: Returns a list of elements.
      parameters:
      - name: withCloudhubPermissions
        description: Add to each environment the user's permissions in CloudHub
        required: true
        in: query
        schema:
          type: boolean
          default: true
      - name: all
        description: Retrieve all environments, without filtering by the user's permissions.
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: getOrganizationsByOrganizationidEnvironments
  /organizations/{organizationId}/environments/default:
    description: The default environment. This is defined in core services per organization.
    get:
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                  id: 80139f69-2845-46fa-9217-d9fe0171030f
                  name: QA
                  organizationId: f0c9b011-980e-4928-9430-e60e3a97c043
                  isProduction: false
              example: *id002
      operationId: getOrganizationsByOrganizationidEnvironmentsDefault
      description: Retrieves a default.
  /organizations/{organizationId}/environments/{environmentId}/apis/{apiId}/versions/{apiVersionId}/alerts:
    post:
      description: Creates a new element.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - name: apiId
        required: true
        in: path
        schema:
          type: string
        description: The api ID to identify the target resource.
      - name: apiVersionId
        required: true
        in: path
        schema:
          type: string
        description: The apiVersion ID to identify the target resource.
      requestBody:
        content:
          application/json:
            schema:
              allOf:
              - anyOf:
                - type: object
                  required:
                  - type
                  - policyId
                  - policyTemplate
                  properties:
                    type:
                      enum:
                      - api-policy-violation
                    policyId:
                      type: integer
                    policyTemplate:
                      type: object
                      required:
                      - id
                      - name
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                          maxLength: 150
                - type: object
                  required:
                  - type
                  properties:
                    type:
                      enum:
                      - api-request-count
                - type: object
                  required:
                  - type
                  properties:
                    type:
                      enum:
                      - api-response-code
                - type: object
                  required:
                  - type
                  properties:
                    type:
                      enum:
                      - api-response-time
              - type: object
                required:
                - apiAlertsVersion
                - name
                - api
                - apiVersion
                - enabled
                - severity
                - recipients
                - period
                - condition
                properties:
                  apiAlertsVersion:
                    enum:
                    - 1.0.0
                  name:
                    type: string
                    minLength: 1
                    maxLength: 255
                  api:
                    type: object
                    required:
                    - id
                    - name
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                        minLength: 1
                        maxLength: 64
                  apiVersion:
                    type: object
                    required:
                    - id
                    - name
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                        minLength: 1
                        maxLength: 150
                  enabled:
                    type: boolean
                  severity:
                    enum:
                    - INFO
                    - WARNING
                    - CRITICAL
                  recipients:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      required:
                      - type
                      - value
                      properties:
                        firstName:
                          type: string
                        lastName:
                          type: string
                        type:
                          enum:
                          - email
                          - role
                          - user
                        value:
                          type: string
                          maxLength: 254
                  period:
                    type: object
                    required:
                    - duration
                    - repeat
                    properties:
                      duration:
                        type: object
                        required:
                        - count
                        - weight
                        properties:
                          count:
                            type: integer
                            minimum: 1
                          weight:
                            enum:
                            - DAYS
                            - HOURS
                            - MINUTES
                      repeat:
                        type: integer
                        minimum: 1
                  condition:
                    type: object
                    required:
                    - aggregate
                    - operator
                    - value
                    properties:
                      aggregate:
                        enum:
                        - COUNT
                        - AVG
                        - SUM
                        - MIN
                        - MAX
                      operator:
                        enum:
                        - GREATER_THAN
                        - LESS_THAN
                        - EQUAL
                      value:
                        type: integer
                        minimum: 0
                      resourceType:
                        enum:
                        - api-version
                      filter:
                        type: array
                        items:
                          type: object
                          properties:
                            property:
                              type: string
                            operator:
                              enum:
                              - GREATER_THAN
                              - LESS_THAN
                              - EQUAL
                              - MATCHES
                              - IN
                              - BETWEEN
                              - EXIST
                            values:
                              anyOf:
                              - type: array
                                items: {}
                              - type: string
                              - type: integer
                              - nullable: true
              type: object
        x-amf-mediaType: application/json
        description: The alerts data to create.
      responses:
        '200':
          description: Successfully created alert definition.
        '201':
          description: The new element has been successfully created.
      operationId: createOrganizationsByOrganizationidEnvironmentsByEnvironmentidApisByApiidVersionsByApiversionidAlerts
    get:
      description: Returns a list of elements.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - name: apiId
        required: true
        in: path
        schema:
          type: string
        description: The api ID to identify the target resource.
      - name: apiVersionId
        required: true
        in: path
        schema:
          type: string
        description: The apiVersion ID to identify the target resource.
      responses:
        '200':
          description: Successfully retrieved an API Version's alert definitions.
      operationId: getOrganizationsByOrganizationidEnvironmentsByEnvironmentidApisByApiidVersionsByApiversionidAlerts
  /organizations/{organizationId}/environments/{environmentId}/apis/{apiId}/versions/{apiVersionId}/alerts/{alertId}:
    description: An alert Item
    get:
      description: Gets an alert.
      parameters:
      - name: apiVersionId
        required: true
        in: path
        schema:
          type: string
        description: The apiVersion ID to identify the target resource.
      - name: alertId
        required: true
        in: path
        schema:
          type: string
        description: The alert ID to identify the target resource.
      - name: apiId
