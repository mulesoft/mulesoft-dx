      operationId: getOrganizationsByOrganizationidEnvironmentsByEnvironmentidApisByApiidVersionsByApiversionidAlertsByAlertid
    patch:
      description: Updates a alert.
      parameters:
      - name: apiVersionId
        required: true
        in: path
        schema:
          type: string
        description: The apiVersion ID to identify the target resource.
      - name: alertId
        required: true
        in: path
        schema:
          type: string
        description: The alert ID to identify the target resource.
      - name: apiId
        required: true
