                          type: string
                          minLength: 1
                          maxLength: 150
                    enabled:
                      type: boolean
                    severity:
                      enum:
                      - INFO
                      - WARNING
                      - CRITICAL
                    recipients:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required:
                        - type
                        - value
                        properties:
                          firstName:
                            type: string
                          lastName:
                            type: string
                          type:
                            enum:
                            - email
                            - role
                            - user
                          value:
                            type: string
                            maxLength: 254
                    period:
                      type: object
                      required:
                      - duration
                      - repeat
                      properties:
                        duration:
                          type: object
                          required:
                          - count
                          - weight
                          properties:
                            count:
                              type: integer
                              minimum: 1
                            weight:
                              enum:
                              - DAYS
                              - HOURS
                              - MINUTES
                        repeat:
                          type: integer
                          minimum: 1
                    condition:
                      type: object
                      required:
                      - aggregate
                      - operator
                      - value
                      properties:
                        aggregate:
                          enum:
                          - COUNT
                          - AVG
                          - SUM
                          - MIN
                          - MAX
                        operator:
                          enum:
                          - GREATER_THAN
                          - LESS_THAN
                          - EQUAL
                        value:
                          type: integer
                          minimum: 0
                        resourceType:
                          enum:
                          - api-version
                        filter:
                          type: array
                          items:
                            type: object
                            properties:
                              property:
                                type: string
                              operator:
                                enum:
                                - GREATER_THAN
                                - LESS_THAN
                                - EQUAL
                                - MATCHES
                                - IN
                                - BETWEEN
                                - EXIST
                              values:
                                anyOf:
                                - type: array
                                  items: {}
                                - type: string
                                - type: integer
                                - nullable: true
                type: object
              example: {}
        '401':
