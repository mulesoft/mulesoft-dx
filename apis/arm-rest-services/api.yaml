        values: $.id
        labels: $.name
      description: The serverGroup ID to identify the target resource.
    XOrigin_componentId_Path:
      name: componentId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:arm-rest-services
        operation: getTargetsByTargetidComponents
        description: GET `/targets/{targetId}/components` in this API; use `id` values as `componentId`.
        values: $.id
      description: The component ID to identify the target resource.
    XOrigin_applicationId_Path:
      name: applicationId
      required: true
      in: path
