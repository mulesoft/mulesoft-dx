openapi: 3.0.0
info:
  title: ARM REST Services API
  version: 1.23.0
  description: Manage applications, clusters, server groups, alerts, and deployment actions in Anypoint Runtime Manager.
servers:
- url: https://anypoint.mulesoft.com/hybrid/api/v1
- url: https://eu1.anypoint.mulesoft.com/hybrid/api/v1
- url: https://{region}.platform.mulesoft.com/hybrid/api/v1
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /servers:
    description: 'A server refers to an instance of Mule Runtime or to the Gateway runtime on older versions. A server is registered in Runtime Manager and can itself be a target, or can be a part of a target that forms part of a server group or cluster.


      Servers managed by Runtime Manager must first be registered into a platform. Each server is identified with a signed certificate, which is unique across all registered servers. Runtime Manager acts as a certificate authority and accepts connections from servers that have a signed certificate. Registered runtimes have more restrictive access in that they can only accept connections from the certificate authority in Runtime Manager.

      '
    post:
      description: 'Registers a server. Uses a token to retrieve the client ID and client secret. Returns: 1- Signed certificate. 2- ClientId and ClientSecret. 3- Set of URLs used by Mule.

        '
      parameters:
      - name: Accept
        description: The return type accepted to separate from a legacy registration.
        in: header
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      requestBody:
        content:
          application/json:
            schema:
              example:
                gatewayVersion: 1.4.0
                signatureRequest: '-----BEGIN CERTIFICATE REQUEST-----MIIByjCCATMCAQAwgYkxCzAJBgNVBAYTAlVTMRMwEQYDVQQIEwpDYWxpZm9ybmlh

                  MRYwFAYDVQQHEw1Nb3VudGFpbiBWaWV3MRMwEQYDVQQKEwpHb29nbGUgSW5jMR8w


                  HQYDVQQLExZJbmZvcm1hdGlvbiBUZWNobm9sb2d5MRcwFQYDVQQDEw53d3cuZ29vZ2xlLmNvbTCBnzANBgkqhkiG9w0BAQEFAAOBjQAwgYkCgYEApZtYJCHJ4VpVXHfV

                  IlstQTlO4qC03hjX+ZkPyvdYd1Q4+qbAeTwXmCUKYHThVRd5aXSqlPzyIBwieMZr

                  WFlRQddZ1IzXAlVRDWwAo60KecqeAXnnUK+5fXoTI/UgWshre8tJ+x/TMHaQKR/J

                  cIWPhqaQhsJuzZbvAdGA80BLxdMCAwEAAaAAMA0GCSqGSIb3DQEBBQUAA4GBAIhl

                  4PvFq+e7ipARgI5ZM+GZx6mpCz44DTo0JkwfRDf+BtrsaC0q68eTf2XhYOsq4fkH

                  Q0uA0aVog3f5iJxCa3Hp5gxbJQ6zV6kJ0TEsuaaOhEko9sdpCoPOnRBm2i/XRD2D

                  6iNh8f8z0ShGsFqjDgFHyF3o+lUyj+UC6H1QW7bn

                  -----END CERTIFICATE REQUEST-----'
                muleLabel: mule-gw-testing
              type: object
              required:
              - signatureRequest
              - muleLabel
              properties:
                gatewayVersion:
                  type: string
                signatureRequest:
                  type: string
                muleLabel:
                  type: string
                muleVersion:
                  type: string
        x-amf-mediaType: application/json
        description: The servers data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                  clientId: 24a635ed2b1d44aa88b5e31397335b9e
                  clientSecret: 57b598683dbc4b8b93d0935bcaa66892
                  certificate: '-----BEGIN CERTIFICATE REQUEST-----MIIByjCCATMCAQAwgYkxCzAJBgNVBAYTAlVTMRMwEQYDVQQIEwpDYWxpZm9ybmlh

                    MRYwFAYDVQQHEw1Nb3VudGFpbiBWaWV3MRMwEQYDVQQKEwpHb29nbGUgSW5jMR8w


                    HQYDVQQLExZJbmZvcm1hdGlvbiBUZWNobm9sb2d5MRcwFQYDVQQDEw53d3cuZ29vZ2xlLmNvbTCBnzANBgkqhkiG9w0BAQEFAAOBjQAwgYkCgYEApZtYJCHJ4VpVXHfV

                    IlstQTlO4qC03hjX+ZkPyvdYd1Q4+qbAeTwXmCUKYHThVRd5aXSqlPzyIBwieMZr

                    WFlRQddZ1IzXAlVRDWwAo60KecqeAXnnUK+5fXoTI/UgWshre8tJ+x/TMHaQKR/J

                    cIWPhqaQhsJuzZbvAdGA80BLxdMCAwEAAaAAMA0GCSqGSIb3DQEBBQUAA4GBAIhl

                    4PvFq+e7ipARgI5ZM+GZx6mpCz44DTo0JkwfRDf+BtrsaC0q68eTf2XhYOsq4fkH

                    Q0uA0aVog3f5iJxCa3Hp5gxbJQ6zV6kJ0TEsuaaOhEko9sdpCoPOnRBm2i/XRD2D

                    6iNh8f8z0ShGsFqjDgFHyF3o+lUyj+UC6H1QW7bn

                    -----END CERTIFICATE REQUEST-----'
                  environmentUrls:
                    anypointPlatformBaseUrl: http://anypoint.platform.base.url:8080/path
                    analyticsUrl: http://analytics:8083/path
                    authProxyUrl: http://auth.proxy:8085/path
                    contractCachingServiceUrl: http://contract.caching.service:8082/path
                    mcmWebsocketUrl: wss://mcm.websocket:8084/path
                    coreServicesUrl: http://core.services.url:8081/path
              example: *id001
        '400':
          description: Bad Request.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                  value:
                    message: Your request does not have the correct values
              example: *id002
        '403':
          description: Forbidden. The authenticated user lacks the required permissions.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id003
                  message: You don't have enough permissions to read the organization client_id.
              example: *id003
        '404':
          description: Resource not found
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id004
                  message: Invalid Resource
              example: *id004
        '409':
          description: Conflict. The request conflicts with the current state of the resource.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id005
                  message: 'Unable to process Core Services response. Returned status code: 409'
              example: *id005
      operationId: createServers
    get:
      description: Get the registered servers information.
      parameters:
      - name: belongsTo
        description: List servers on a target.
        in: query
        schema:
          type: string
          enum:
          - SERVER_GROUP
          - CLUSTER
          - NO_GROUP
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id006
                  data:
                  - data:
                      id: 2194
                      timeCreated: 1437495853061
                      timeUpdated: 1437512467554
                      name: clustering-server
                      serverType: MULE
                      type: SERVER
                      muleVersion: 3.6.1
                      agentVersion: 1.1.1
                      status: DISCONNECTED
                      addresses:
                      - ip: 172.16.12.169
                        networkInterface: en0
                      currentClusteringIp:
                      clusterId: 2195
                      clusterName: Cluster-1
              example: *id006
      operationId: getServers
  /servers/{serverId}:
    description: Operate on a server.
    get:
      description: Get information about a server.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id007
                  data:
                    id: 2194
                    timeCreated: 1437495853061
                    timeUpdated: 1437512467554
                    name: clustering-server
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.1
                    agentVersion: 1.1.1
                    status: DISCONNECTED
                    addresses:
                    - ip: 172.16.12.169
                      networkInterface: en0
                    - ip: 172.16.12.169
                      networkInterface: en0
                    currentClusteringIp:
                    clusterId: 2195
                    clusterName: Cluster-1
                type: object
                properties:
                  id:
                    type: integer
                  timeCreated:
                    type: number
                  timeUpdated:
                    type: number
                  name:
                    type: string
                  gatewayVersion:
                    type: string
                  agentVersion:
                    type: string
                  status:
                    enum:
                    - CREATED
                    - RUNNING
                    - CONNECTED
                    - DISCONNECTED
                  currentClusteringIP:
                    type: string
                  memberUUID:
                    type: string
                  serverType:
                    enum:
                    - MULE
                    - GATEWAY
                  addresses:
                    type: array
                    items:
                      type: object
                      properties:
                        ip:
                          type: string
                        networkInterface:
                          type: string
                  runtimeInformation:
                    type: object
              example: *id007
        '404':
          description: Not found. The requested resource does not exist.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id008
                  message: server not found
              example: *id008
      operationId: getServersByServerid
    patch:
      description: Modify a server name.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      requestBody:
        content:
          application/json:
            schema:
              example:
                name: newName
        x-amf-mediaType: application/json
        description: The servers data to update.
      responses:
        '202':
          description: Request accepted for processing.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id009
                  data:
                    id: 2194
                    timeCreated: 1437495853061
                    timeUpdated: 1437512467554
                    name: clustering-server
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.1
                    agentVersion: 1.1.1
                    status: DISCONNECTED
                    addresses:
                    - ip: 172.16.12.169
                      networkInterface: en0
                    currentClusteringIp:
                    clusterId: 2195
                    clusterName: Cluster-1
                type: object
                properties:
                  id:
                    type: integer
                  timeCreated:
                    type: number
                  timeUpdated:
                    type: number
                  name:
                    type: string
                  gatewayVersion:
                    type: string
                  agentVersion:
                    type: string
                  status:
                    enum:
                    - CREATED
                    - RUNNING
                    - CONNECTED
                    - DISCONNECTED
                  currentClusteringIP:
                    type: string
                  memberUUID:
                    type: string
                  serverType:
                    enum:
                    - MULE
                    - GATEWAY
                  addresses:
                    type: array
                    items:
                      type: object
                      properties:
                        ip:
                          type: string
                        networkInterface:
                          type: string
                  runtimeInformation:
                    type: object
              example: *id009
      operationId: patchServersByServerid
    delete:
      description: "remove the server from Runtime Manager: \n\nDeletes related server artifacts from all deployments. Does not attempt to undeploy the server artifacts from the server. Records are simply deleted.\n\nIf the server is connected, the connection is terminated and cannot be accepted in future.\n\nTo cleanly delete a server, first:\n\nRemove the server from its group/cluster.\n\nDelete all deployments whose deployment target is this server.\n\nWait until all applications are undeployed.\n"
      parameters:
      - name: isForce
        description: 'variable enable/disables the function to force delete a server.


          This will make a deletion without notifications to the Mule Runtime, this is more recommended in the case that server can''t be deleted in a normal way

          '
        required: false
        in: query
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/XOrigin_serverId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '204':
          description: Operation completed successfully with no content returned.
      operationId: deleteServersByServerid
  /servers/{serverId}/actions:
    description: "Performs stateless synchronic actions immediately. \nPossible options are:\n- RESTART\n- DELETE\n- RENEW_CERTIFICATE\n- SHUTDOWN\n"
    post:
      description: Actually performs the action on the specified runtime
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      requestBody:
        content:
          application/json:
            schema:
              example:
                actionType: RESTART
        x-amf-mediaType: application/json
        description: The actions data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id010
                  data:
                    id: 2380
                    timeCreated: 1541022133978
                    timeUpdated: 1541022133978
                    timeExecuted: 1541022133978
                    actionType: RENEW_CERTIFICATE
                    status: PENDING
                    reason: ''
                    description: ''
              example: *id010
      operationId: createServersByServeridActions
  /servers/registrationToken:
    description: Get a registration token. This token needs to be used to register a new server.
    get:
      description: 'Get the registrationToken

        with id =

        {registrationTokenId}

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id011
                  data: d8fb6e7b-8dd7-4438-99e6-572c5af92dd0---1
                type: object
                required:
                - data
                properties:
                  data:
                    type: string
              example: *id011
        '404':
          description: Not found. The requested resource does not exist.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id012
                  message: registrationToken not found
              example: *id012
      operationId: getServersRegistrationtoken
    patch:
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '202':
          description: Request accepted for processing.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id013
                  data: d8fb6e7b-8dd7-4438-99e6-572c5af92dd0---1
                type: object
                required:
                - data
                properties:
                  data:
                    type: string
              example: *id013
      operationId: patchServersRegistrationtoken
      description: Updates registrationToken.
  /serverGroups:
    description: A server group is group of servers that are considered a unique target. The servers in a server group do not cooperate as a cluster topology. However, they are treated as a unit by Runtime Manager's deployment, and configuration tasks are performed along all the servers in a server group.
    get:
      description: Get a list of all registered server groups.
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id014
                  data:
                  - id: 73
                    timeCreated: 1432247776992
                    timeUpdated: 1432247776992
                    name: Group2
                    servers:
                    - id: 71
                      timeCreated: 1432247665613
                      timeUpdated: 1432301095608
                      name: Server71
                      serverType: MULE
                      type: SERVER
                      muleVersion: 3.6.2
                      agentVersion: 1.0.1-SNAPSHOT
                      status: DISCONNECTED
                      serverGroupId: 73
                      serverGroupName: Group2
                      addresses:
                      - ip: 172.16.12.169
                        networkInterface: en0
                    - id: 72
                      timeCreated: 1432247685261
                      timeUpdated: 1432303178444
                      name: Server73
                      serverType: MULE
                      type: SERVER
                      muleVersion: 3.6.2
                      agentVersion: 1.0.1-SNAPSHOT
                      status: DISCONNECTED
                      serverGroupId: 73
                      serverGroupName: Group2
                      addresses:
                      - ip: 172.16.12.168
                        networkInterface: en0
                    type: SERVER_GROUP
                    status: DISCONNECTED
              example: *id014
      operationId: getServergroups
    post:
      description: Create a server group from a list of servers. The servers must not belong to any other server group or cluster.
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      requestBody:
        content:
          application/json:
            schema:
              example:
                name: Group2
                serverIds:
                - 71
                - 72
        x-amf-mediaType: application/json
        description: The serverGroups data to create.
      responses:
        '201':
          description: Resource created successfully.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id015
                  data:
                    id: 73
                    timeCreated: 1432247776992
                    timeUpdated: 1432247776992
                    name: Group2
                    servers:
                    - id: 71
                      timeCreated: 1432247665613
                      timeUpdated: 1432301095608
                      name: Server71
                      serverType: MULE
                      type: SERVER
                      muleVersion: 3.6.2
                      agentVersion: 1.0.1-SNAPSHOT
                      status: DISCONNECTED
                      serverGroupId: 73
                      serverGroupName: Group2
                      addresses:
                      - ip: 172.16.12.169
                        networkInterface: en0
                    - id: 72
                      timeCreated: 1432247685261
                      timeUpdated: 1432303178444
                      name: Server73
                      serverType: MULE
                      type: SERVER
                      muleVersion: 3.6.2
                      agentVersion: 1.0.1-SNAPSHOT
                      status: DISCONNECTED
                      serverGroupId: 73
                      serverGroupName: Group2
                      addresses:
                      - ip: 172.16.12.168
                        networkInterface: en0
                    type: SERVER_GROUP
                    status: DISCONNECTED
              example: *id015
      operationId: createServergroups
  /serverGroups/{serverGroupId}:
    description: Performs operations on a server group.
    get:
      description: Get information about a server group.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverGroupId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id016
                  data: ''
                  id: 73
                  timeCreated: 1432247776992
                  timeUpdated: 1432247776992
                  name: Group2
                  servers:
                  - id: 71
                    timeCreated: 1432247665613
                    timeUpdated: 1432301095608
                    name: Server71
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.2
                    agentVersion: 1.0.1-SNAPSHOT
                    status: DISCONNECTED
                    serverGroupId: 73
                    serverGroupName: Group2
                    addresses:
                    - ip: 172.16.12.169
                      networkInterface: en0
                  - id: 72
                    timeCreated: 1432247685261
                    timeUpdated: 1432303178444
                    name: Server73
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.2
                    agentVersion: 1.0.1-SNAPSHOT
                    status: DISCONNECTED
                    serverGroupId: 73
                    serverGroupName: Group2
                    addresses:
                    - ip: 172.16.12.168
                      networkInterface: en0
                  type: SERVER_GROUP
                  status: DISCONNECTED
              example: *id016
        '404':
          description: Not found. The requested resource does not exist.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id017
                  message: serverGroup not found
              example: *id017
      operationId: getServergroupsByServergroupid
    patch:
      description: Modify a server group. The only field that can be modified is the name of the server group.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverGroupId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '200':
          description: Successful operation.
        '202':
          description: Request accepted for processing.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id018
                  id: 73
                  timeCreated: 1432247776992
                  timeUpdated: 1432247776992
                  name: Group2
                  servers:
                  - id: 71
                    timeCreated: 1432247665613
                    timeUpdated: 1432301095608
                    name: Server71
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.2
                    agentVersion: 1.0.1-SNAPSHOT
                    status: DISCONNECTED
                    serverGroupId: 73
                    serverGroupName: Group2
                    addresses:
                    - ip: 172.16.12.169
                      networkInterface: en0
                  - id: 72
                    timeCreated: 1432247685261
                    timeUpdated: 1432303178444
                    name: Server73
                    serverType: MULE
                    type: SERVER
                    muleVersion: 3.6.2
                    agentVersion: 1.0.1-SNAPSHOT
                    status: DISCONNECTED
                    serverGroupId: 73
                    serverGroupName: Group2
                    addresses:
                    - ip: 172.16.12.168
                      networkInterface: en0
                  type: SERVER_GROUP
                  status: DISCONNECTED
                type: object
                required:
                - id
                - timeCreated
                - timeUpdated
                - name
                - servers
                - type
                - status
                properties:
                  id:
                    type: integer
                  timeCreated:
                    type: number
                  timeUpdated:
                    type: number
                  name:
                    type: string
                  servers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        timeCreated:
                          type: number
                        timeUpdated:
                          type: integer
                        name:
                          type: string
                        serverType:
                          type: string
                        type:
                          type: string
                        muleVersion:
                          type: string
                        agentVersion:
                          type: string
                        status:
                          type: string
                        serverGroupId:
                          type: integer
                        serverGroupName:
                          type: string
                        addresses:
                          type: array
                          items: {}
                  type:
                    enum:
                    - SERVER_GROUP
                    type: string
                  status:
                    enum:
                    - CREATED
                    - RUNNING
                    - EMPTY
                    - CONNECTED
                    - DISCONNECTED
                    - PARTIAL
                    type: string
              example: *id018
      operationId: patchServergroupsByServergroupid
    delete:
      description: Delete a server group.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverGroupId_Path'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ORG_ID_Header'
      responses:
        '202':
          description: Request accepted for processing.
      operationId: deleteServergroupsByServergroupid
  /serverGroups/{serverGroupId}/servers/{serverId}:
    description: Perform operations on a server that is part of a server group.
    post:
      description: Add a server to a server group. Any artifacts that have been deployed to this server group also deploy to the new server. Returns the updated server.
      parameters:
      - $ref: '#/components/parameters/XOrigin_serverGroupId_Path'
      - name: serverId
        required: true
        in: path
        schema:
          type: string
