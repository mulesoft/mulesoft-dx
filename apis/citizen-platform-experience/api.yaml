openapi: 3.0.0
info:
  title: Citizen Platform Experience API
  version: 0.1.0
  description: Manage flows, connections, connectors, and metadata for Anypoint Composer.
servers:
- url: http://composer.mulesoft.com/citizen-xapi/api/v1
- url: https://composer.mulesoft.com/citizen-xapi/api/v1
externalDocs:
  url: http://
  description: 'Welcome to the Citizen Platform xAPI API_ Documentation.

    '
  x-amf-title: Citizen Platform xAPI
security:
- bearerAuth: []
- clientAuth: []
paths:
  /organizations:
    description: Core Services User
  /organizations/{organizationId}:
    parameters:
    - $ref: '#/components/parameters/XOrigin_organizationId_Path'
  /organizations/{organizationId}/flows:
    description: Gets the authenticated user Flows.
    get:
      description: Gets the authenticated user Flows.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      responses:
        '200':
          description: User flows with pagination.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default'
              example: &id019
                pagination:
                  page: 1
                  size: 10
                results:
                - id: 1f0e83c8-f2e3-43a4-864f-64a41882ec92
                  name: Citizen Integration
                  owner:
                    id:
                    name: meli
                    organizationId: d1428a95-c05d-4c18-9010-c699db28af50
                  description:
                  status: running
                  createdDate: 2020-04-10 03:15:46
                  lastUpdatedDate: 2020-04-10 03:15:46
                - id: d9284c62-f20b-4bca-91e9-30d25415623d
                  name: Flow example
                  owner:
                    id:
                    name: meli
                    organizationId: d1428a95-c05d-4c18-9010-c699db28af50
                  description: Testing Citizen
                  status: running
                  createdDate: 2020-04-10 03:15:46
                  lastUpdatedDate: 2020-04-09 03:19:14
        '401':
          description: Unauthorized user.
      operationId: getOrganizationsByOrganizationidFlows
    post:
      description: Creates a new flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      responses:
        '201':
          description: User flow was successfully created.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_1'
              example: &id020
                flowId: 476db727-a3ac-44bb-9d18-1720c72cb566
        '400':
          description: Please insert valid values.
        '401':
          description: Unauthorized user.
        '409':
          description: Duplicated flow name.
      operationId: createOrganizationsByOrganizationidFlows
  /organizations/{organizationId}/flows/{flowId}:
    description: Retrieves a flow.
    get:
      description: Retrieves a flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      responses:
        '200':
          description: User flow was successfully retrieved.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_2'
              example: &id021
                value:
                  id: 787f43a8-18ee-4ede-a048-0bb2c74db285
                  name: Citizen Integration Test
                  description: Listen new salesforce connections and create a new one.
                  type: citizenbuilder
                  connectors:
                  - salesforce
                  trigger:
                    index: 0
                    id: fc7f54f8-11de-4789-93dd-ab5b2bbc25e7
                    name: onNewRecord
                    type: TRIGGER
                    connector: Salesforce
                    connectionId: 0e5aaf64-5143-4e46-a5c3-3f06c59d71c5
                    fieldValues:
                      fields: LastName,FirstName,AccountId
                      objectType: Contact
                    dynamicResults:
                    - name: LastName
                      label: Last Name
                      type: STRING
                      componentType: TEXT
                    - name: FirstName
                      label: First Name
                      type: STRING
                      componentType: TEXT
                    - name: AccountId
                      label: Account Id
                      type: STRING
                      componentType: TEXT
                  steps:
                  - index: 1
                    id: 1578712e-f1ef-4b13-ab80-d0368dee78ca
                    name: createRecord
                    type: ACTION
                    connector: Salesforce
                    connectionId: 99372ea9-17dc-49c3-8a88-d76cb275719f
                    fieldValues:
                      LastName: '#[dataPill(salesforce.0.LastName)]'
                      FirstName: '#[dataPill(salesforce.0.FirstName)]'
                      AccountId: '#[dataPill(salesforce.0.AccountId)]'
                      objectType: Contact
                    dynamicFields:
                      AccountId:
                        name: AccountId
                        label: Account Id
                        type: STRING
                        required: false
                        visible: false
                        componentType: TEXT
                        supportsExpression: true
                        changesDynamicInput: false
                        changesDynamicOutput: false
                      LastName:
                        name: LastName
                        label: Last Name
                        type: STRING
                        required: true
                        visible: true
                        componentType: TEXT
                        supportsExpression: true
                        changesDynamicInput: false
                        changesDynamicOutput: false
                      FirstName:
                        name: FirstName
                        label: Last Name
                        type: STRING
                        required: false
                        visible: false
                        componentType: TEXT
                        supportsExpression: true
                        changesDynamicInput: false
                        changesDynamicOutput: false
                      Salutation:
                        name: Salutation
                        label: Salutation
                        type: STRING
                        required: false
                        visible: true
                        componentType: SELECT
                        supportsExpression: true
                        changesDynamicInput: false
                        changesDynamicOutput: false
                        dataProvider:
                          options:
                          - value: Mr.
                            label: Mr.
                          - value: Ms
                            label: Ms.
                          - value: Mrs.
                            label: Mrs.
                          - value: Dr.
                            label: Dr.
                          - value: Prof.
                            label: Prof.
                    dynamicResults:
                    - name: LastName
                      label: Last Name
                      type: STRING
                      componentType: TEXT
                    - name: FirstName
                      label: First Name
                      type: STRING
                      componentType: TEXT
                    - name: AccountId
                      label: Account Id
                      type: STRING
                      componentType: TEXT
                  createdDate: 2020-05-18 09:22:19.297000+00:00
                  lastUpdatedDate: 2020-05-18 09:22:19.297000+00:00
      operationId: getOrganizationsByOrganizationidFlowsByFlowid
    put:
      description: Save changes in a flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/default_3'
        x-amf-mediaType: application/json
        description: The flows data to update.
      responses:
        '200':
          description: User flow was successfully saved.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_4'
              example: &id022
                value:
                  changeDetail:
                    message: a message
                  flow:
                    id: 787f43a8-18ee-4ede-a048-0bb2c74db285
                    name: Citizen Integration Test
                    description: Listen new salesforce connections and create a new one.
                    type: citizenbuilder
                    connectors:
                    - salesforce
                    trigger:
                      index: 0
                      id: fc7f54f8-11de-4789-93dd-ab5b2bbc25e7
                      name: onNewRecord
                      type: TRIGGER
                      connector: Salesforce
                      connectionId: 0e5aaf64-5143-4e46-a5c3-3f06c59d71c5
                      fieldValues:
                        fields: LastName,FirstName,AccountId
                        objectType: Contact
                      dynamicResults:
                      - name: LastName
                        label: Last Name
                        type: STRING
                        componentType: TEXT
                      - name: FirstName
                        label: First Name
                        type: STRING
                        componentType: TEXT
                      - name: AccountId
                        label: Account Id
                        type: STRING
                        componentType: TEXT
                    steps:
                    - index: 1
                      id: 1578712e-f1ef-4b13-ab80-d0368dee78ca
                      name: createRecord
                      type: ACTION
                      connector: Salesforce
                      connectionId: 99372ea9-17dc-49c3-8a88-d76cb275719f
                      fieldValues:
                        LastName: '#[dataPill(salesforce.0.LastName)]'
                        FirstName: '#[dataPill(salesforce.0.FirstName)]'
                        AccountId: '#[dataPill(salesforce.0.AccountId)]'
                        objectType: Contact
                      dynamicFields:
                        AccountId:
                          name: AccountId
                          label: Account Id
                          type: STRING
                          required: false
                          visible: false
                          componentType: TEXT
                          supportsExpression: true
                          changesDynamicInput: false
                          changesDynamicOutput: false
                        LastName:
                          name: LastName
                          label: Last Name
                          type: STRING
                          required: true
                          visible: true
                          componentType: TEXT
                          supportsExpression: true
                          changesDynamicInput: false
                          changesDynamicOutput: false
                        FirstName:
                          name: FirstName
                          label: Last Name
                          type: STRING
                          required: false
                          visible: false
                          componentType: TEXT
                          supportsExpression: true
                          changesDynamicInput: false
                          changesDynamicOutput: false
                        Salutation:
                          name: Salutation
                          label: Salutation
                          type: STRING
                          required: false
                          visible: true
                          componentType: SELECT
                          supportsExpression: true
                          changesDynamicInput: false
                          changesDynamicOutput: false
                          dataProvider:
                            options:
                            - value: Mr.
                              label: Mr.
                            - value: Ms
                              label: Ms.
                            - value: Mrs.
                              label: Mrs.
                            - value: Dr.
                              label: Dr.
                            - value: Prof.
                              label: Prof.
                      dynamicResults:
                      - name: LastName
                        label: Last Name
                        type: STRING
                        componentType: TEXT
                      - name: FirstName
                        label: First Name
                        type: STRING
                        componentType: TEXT
                      - name: AccountId
                        label: Account Id
                        type: STRING
                        componentType: TEXT
                    createdDate: 2020-05-18 09:22:19.297000+00:00
                    lastUpdatedDate: 2020-05-18 09:22:19.297000+00:00
        '400':
          description: Please input a valid flow ID.
        '403':
          description: You are not the owner of this flow.
        '404':
          description: Flow not found.
      operationId: updateOrganizationsByOrganizationidFlowsByFlowid
    delete:
      description: Deletes a flow
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      responses:
        '204':
          description: User flow was successfully deleted.
      operationId: deleteOrganizationsByOrganizationidFlowsByFlowid
  /organizations/{organizationId}/flows/{flowId}/clone:
    description: Clones a Flow
    post:
      description: Clones a Flow with the same content as the previous flow
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      requestBody:
        content:
          application/json:
            schema:
              example: ''
        x-amf-mediaType: application/json
        description: The clone data to create.
      responses:
        '201':
          description: Flow was cloned successfully
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_5'
              example: &id023
                flowId: 476db727-a3ac-44bb-9d18-1720c72cb566
        '409':
          description: The name is already in use
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema: {}
      operationId: createOrganizationsByOrganizationidFlowsByFlowidClone
  /organizations/{organizationId}/flows/{flowId}/execute:
    description: ''
    post:
      description: Leaves a flow running.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      requestBody:
        $ref: '#/components/requestBodies/Generated'
        description: The execute data to create.
      responses:
        '202':
          description: Flow execution is being started.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id001
                  timestamp: 2020-10-15 04:14:26.702000+00:00
                  path: /api/v1/organizations/5fd5e1b9-02cf-44ec-9fb2-3cc17974df9f/flows/845100d0-eac0-4746-8da3-709f12d0b6b6/execute
                  method: POST
                  response: 202
                  description: Flow execution started
              example: *id001
        '404':
          description: Flow not found.
        '409':
          description: Flow already running or it is being started/stopped.
      operationId: createOrganizationsByOrganizationidFlowsByFlowidExecute
  /organizations/{organizationId}/flows/{flowId}/stop:
    description: ''
    post:
      description: Stops the execution of a given flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      requestBody:
        $ref: '#/components/requestBodies/Generated'
        description: The stop data to create.
      responses:
        '202':
          description: Flow is being stopped.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id002
                  timestamp: 2020-10-15 04:14:26.702000+00:00
                  path: /api/v1/organizations/5fd5e1b9-02cf-44ec-9fb2-3cc17974df9f/flows/845100d0-eac0-4746-8da3-709f12d0b6b6/stop
                  method: POST
                  response: 202
                  description: Flow being stopped
              example: *id002
        '404':
          description: Flow not found.
        '409':
          description: Flow is not running or it is being stopped.
      operationId: createOrganizationsByOrganizationidFlowsByFlowidStop
  /organizations/{organizationId}/flows/{flowId}/status:
    description: ''
    get:
      description: Returns the status of a given flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      responses:
        '200':
          description: Flow's status was successfully obtained.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_6'
              example: &id024
                status: STOPPED
                timestamp: 2020-10-15 04:24:30.732000+00:00
                path: /api/v1/organizations/5fd5e1b9-02cf-44ec-9fb2-3cc17974df9f/flows/845100d0-eac0-4746-8da3-709f12d0b6b6/status
                method: GET
                response: 200
                description: Status available
        '404':
          description: Flow not found.
      operationId: getOrganizationsByOrganizationidFlowsByFlowidStatus
  /organizations/{organizationId}/flows/{flowId}/test:
    post:
      description: Starts a test for a flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      - name: X-Session-Id
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The X Session  ID header value.
      requestBody:
        content:
          application/json:
            schema:
              example:
                value:
                  id: 787f43a8-18ee-4ede-a048-0bb2c74db285
                  name: Citizen Integration Test
                  description: Listen new salesforce connections and create a new one.
                  type: Mule Application
                  connectors:
                  - salesforce
                  trigger:
                    index: 0
                    id: fc7f54f8-11de-4789-93dd-ab5b2bbc25e7
                    name: onNewRecord
                    type: TRIGGER
                    connector: org.mule.connectors:salesforce-connector:1.5.4
                    connectionId: 0e5aaf64-5143-4e46-a5c3-3f06c59d71c5
                    fieldValues:
                      fields: LastName,FirstName,AccountId
                      objectType: Contact
                    dynamicResults:
                    - name: LastName
                      label: Last Name
                      type: STRING
                      componentType: TEXT
                    - name: FirstName
                      label: First Name
                      type: STRING
                      componentType: TEXT
                    - name: AccountId
                      label: Account Id
                      type: STRING
                      componentType: TEXT
                  steps:
                  - index: 1
                    id: 1578712e-f1ef-4b13-ab80-d0368dee78ca
                    name: createRecord
                    type: ACTION
                    connector: org.mule.connectors:salesforce-connector:1.5.4
                    connectionId: 99372ea9-17dc-49c3-8a88-d76cb275719f
                    fieldValues:
                      LastName: '#[dataPill(salesforce.0.LastName)]'
                      FirstName: '#[dataPill(salesforce.0.FirstName)]'
                      AccountId: '#[dataPill(salesforce.0.AccountId)]'
                      objectType: Contact
                    dynamicFields:
                    - name: AccountId
                      label: Account Id
                      type: STRING
                      required: false
                      visible: false
                      componentType: TEXT
                      supportsExpression: true
                      changesDynamicInput: false
                      changesDynamicOutput: false
                    - name: LastName
                      label: Last Name
                      type: STRING
                      required: true
                      visible: true
                      componentType: TEXT
                      supportsExpression: true
                      changesDynamicInput: false
                      changesDynamicOutput: false
                    - name: FirstName
                      label: Last Name
                      type: STRING
                      required: false
                      visible: false
                      componentType: TEXT
                      supportsExpression: true
                      changesDynamicInput: false
                      changesDynamicOutput: false
                    - name: Salutation
                      label: Salutation
                      type: STRING
                      required: false
                      visible: true
                      componentType: SELECT
                      supportsExpression: true
                      changesDynamicInput: false
                      changesDynamicOutput: false
                      dataProvider:
                        options:
                        - value: Mr.
                          label: Mr.
                        - value: Ms
                          label: Ms.
                        - value: Mrs.
                          label: Mrs.
                        - value: Dr.
                          label: Dr.
                        - value: Prof.
                          label: Prof.
                    dynamicResults:
                    - name: LastName
                      label: Last Name
                      type: STRING
                      componentType: TEXT
                    - name: FirstName
                      label: First Name
                      type: STRING
                      componentType: TEXT
                    - name: AccountId
                      label: Account Id
                      type: STRING
                      componentType: TEXT
        x-amf-mediaType: application/json
        description: The test data to create.
      responses:
        '200':
          description: Test successfully started.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id003
                  timestamp: 2020-08-10 12:51:17.789000+00:00
                  path: /api/v1/organizations/10eb6323-4267-45bf-a1c2-ac745f73cf9a/design/test
                  method: POST
                  description: Flow test started
              example: *id003
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '404':
          description: Flow does not exists.
        '409':
          description: Flow already running.
      operationId: createOrganizationsByOrganizationidFlowsByFlowidTest
    delete:
      description: Stops a test for a flow.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      - name: X-Session-Id
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The X Session  ID header value.
      responses:
        '200':
          description: Test successfully stopped.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '404':
          description: Flow does not exists.
        '409':
          description: Flow not running.
      operationId: deleteOrganizationsByOrganizationidFlowsByFlowidTest
  /organizations/{organizationId}/flows/{flowId}/test-status:
    get:
      description: Returns the status of a flow test.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      - name: X-Session-Id
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The X Session  ID header value.
      responses:
        '200':
          description: Flow test status successfully retrieved.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id004
                  testStatus: PENDING
                  creationTime: 1598457303376
                  message: Why it is working, or failed
              example: *id004
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '404':
          description: Flow does not exist.
        '429':
          description: Quota Limit reached for concurrent Design Operations.
      operationId: getOrganizationsByOrganizationidFlowsByFlowidTestStatus
  /organizations/{organizationId}/flows/{flowId}/test-messages:
    get:
      description: Returns the messages of a flow test.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_flowId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      - name: X-Session-Id
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The X Session  ID header value.
      responses:
        '200':
          description: Flow test messages successfully retrieved.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                example: &id005
                  messages:
                  - cardId: 13123-123123-123123
                    inputMessage:
                      message: Input message for cardId 13123-123123-123123
                      createdDate: 1598457303376
                      error: false
                    outputMessage: {}
                  - cardId: 456567-6567567-567555
                    inputMessage:
                      message: Input message for cardId 456567-6567567-567555
                      createdDate: 1598457303376
                      error: false
                    outputMessage:
                      message: Error message for cardID 456567-6567567-567555
                      createdDate: 1598457303376
                      error: true
              example: *id005
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '404':
          description: Flow does not exist.
        '429':
          description: Quota Limit reached for concurrent Design Operations.
      operationId: getOrganizationsByOrganizationidFlowsByFlowidTestMessages
  /organizations/{organizationId}/connectors:
    description: List the available systems that the user can choose from.
    get:
      description: Returns all the connectors available for the current user.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - name: Access-Control-Allow-Origin
        required: true
        in: header
        schema:
          type: string
          default: '*'
        description: The Access Control Allow Origin header value.
      responses:
        '200':
          description: Connectors were successfully obtained.
          x-amf-mediaType: application/json
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/default_7'
              example: &id025
              - name: salesforce
                label: Salesforce
                description: Provides integration with Salesforce
                iconUrl: https://exchange2-asset-manager-kprod.s3.amazonaws.com/com.mulesoft.connectors/2bbb4ef0b7bde3f559df8c885833c4dcc0c53c5de7d6712853d77afc586f67d0.svg
                hasConnection: 'true'
                hasTrigger: 'true'
                hasAction: 'true'
      operationId: getOrganizationsByOrganizationidConnectors
  /organizations/{organizationId}/connectors/{connectorName}:
    description: Returns the citizen model for a given connector.
    get:
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - name: connectorName
        description: Name of the connectors whose citizen model will be returned
        required: true
        in: path
        schema:
          type: string
