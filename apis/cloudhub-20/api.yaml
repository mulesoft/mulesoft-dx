openapi: 3.0.0
info:
  title: CH2 Management API
  version: 1.0.0
  description: Manage Private Spaces, connections, egress and ingress configurations, IAM roles, and logs for CloudHub 2.0.
servers:
- url: https://anypoint.mulesoft.com/runtimefabric/api
- url: https://eu1.anypoint.mulesoft.com/runtimefabric/api
- url: https://{region}.platform.mulesoft.com/runtimefabric/api
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /organizations/{organizationId}/privatespaces:
    description: The collection of privatespaces
    get:
      description: get the list of Private Spaces in the organization.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
          headers:
            ETag:
              x-amf-required: false
              description: The current value of the entity tag for the requested variant
              schema:
                type: string
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                x-amf-examples:
                  private-space-list:
                  - id: b72b876d-f63d-11e7-a06c-080027adee7c
                    name: my-private-space-1
                    organizationId: b72b876d-f63d-11e7-a06c-080027adee7e
                    rootOrganizationId: b72b876d-f63d-11e7-a06c-080027adee7e
                    status: Active
                    network:
                      region: us-east-1
                      cidrBlock: 10.0.0.0/18
                    firewallRules:
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8081
                      toPort: 8081
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8082
                      toPort: 8082
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 0
                      toPort: 65535
                      type: outbound
                    environments:
                      type: all
                      businessGroups:
                      - all
                    logForwarding:
                      anypointMonitoring: true
                    ingressConfiguration:
                      maxReadTimeout: 5000
                  - id: b72b876d-f63d-11e7-a06c-080027adee7d
                    name: my-private-space-2
                    organizationId: b72b876d-f63d-11e7-a06c-080027adee7e
                    rootOrganizationId: b72b876d-f63d-11e7-a06c-080027adee7e
                    status: Active
                    network:
                      region: us-east-1
                      cidrBlock: 10.0.0.0/18
                    firewallRules: []
                    environments:
                      type: sandbox
                      businessGroups:
                      - all
                    logForwarding:
                      anypointMonitoring: true
                    ingressConfiguration:
                      maxReadTimeout: 5000
              example: {}
        '415':
          description: Unsupported media type.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
                errors:
                - code: string
                  message: string
        '429':
          description: Too many requests. Rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: string
              description: Number of seconds to wait before retrying the request.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
                errors:
                - code: string
                  message: string
      operationId: getOrganizationsByOrganizationidPrivatespaces
    post:
      description: create a Private Space
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateSpacePost'
        x-amf-mediaType: application/json
        description: The privatespaces data to create.
      responses:
        '201':
          description: Resource created successfully.
          headers:
            Location:
              description: URL where the new privatespace can be found
              schema:
                type: string
            ETag:
              description: The current value of the entity tag for the requested variant
              schema:
                type: string
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                x-amf-examples:
                  create-response:
                    id: b72b876d-f63d-11e7-a06c-080027adee7c
                    name: my-private-space
                    organizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    rootOrganizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    status: Active
                    network:
                      region: us-east-1
                      cidrBlock: 10.0.0.0/18
                    firewallRules:
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8081
                      toPort: 8081
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8082
                      toPort: 8082
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 0
                      toPort: 65535
                      type: outbound
                    environments:
                      type: all
                      businessGroups:
                      - all
                    logForwarding:
                      anypointMonitoring: true
                    ingressConfiguration:
                      readResponseTimeout: 300
                      logs:
                        portLogLevel: ERROR
                        filters: []
                      protocol: https-redirect
              example: {}
        '400':
          description: Bad Request.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
                errors:
                - code: string
                  message: string
        '409':
          description: Conflict. The request conflicts with the current state of the resource.
        '415':
          description: Unsupported media type.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
                errors:
                - code: string
                  message: string
        '429':
          description: Too many requests. Rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: string
              description: Number of seconds to wait before retrying the request.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
                errors:
                - code: string
                  message: string
      operationId: createOrganizationsByOrganizationidPrivatespaces
  /organizations/{organizationId}/privatespaces/supportedVpnConfigs:
    get:
      description: get supported vpn configs
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: getOrganizationsByOrganizationidPrivatespacesSupportedvpnconfigs
  /organizations/{organizationId}/privatespaces/monthlypatchwindow:
    get:
      description: get the latest upcoming monthly patch window schedule
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfraPatchWindowInfo'
              example:
                releaseYear: 2024
                releaseMonth: MARCH
                sandboxStartDate: &id005 2024-03-18 00:00:00+00:00
                sandboxEndDate: &id006 2024-03-22 23:59:59.999000+00:00
                productionStartDate: &id007 2024-03-23 00:00:00+00:00
                productionEndDate: &id008 2024-03-24 23:59:59.999000+00:00
      operationId: getOrganizationsByOrganizationidPrivatespacesMonthlypatchwindow
  /organizations/{organizationId}/privatespaces/{privateSpaceId}:
    description: Get an entity representing a privatespace
    delete:
      description: delete the Private Space
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: deleteOrganizationsByOrganizationidPrivatespacesByPrivatespaceid
    get:
      description: get the Private Space
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                x-amf-examples:
                  response:
                    id: b72b876d-f63d-11e7-a06c-080027adee7c
                    name: my-private-space
                    organizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    rootOrganizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    status: Active
                    network:
                      region: us-east-1
                      cidrBlock: 10.0.0.0/18
                    firewallRules:
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8081
                      toPort: 8081
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8082
                      toPort: 8082
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 0
                      toPort: 65535
                      type: outbound
                    environments:
                      type: all
                      businessGroups:
                      - all
                    logForwarding:
                      anypointMonitoring: true
                    ingressConfiguration:
                      readResponseTimeout: 300
                      logs:
                        portLogLevel: ERROR
                        filters: []
                      protocol: https-redirect
              example: {}
        '404':
          description: Not found. The requested resource does not exist.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema: {}
              example:
                message: Operation completed successfully.
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceid
    patch:
      description: Update existing Private Space
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateSpacePatch'
        x-amf-mediaType: application/json
        description: The privatespaces data to update.
      responses:
        '200':
          description: Successful operation.
        '202':
          description: Request accepted for processing.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                x-amf-examples:
                  response:
                    id: b72b876d-f63d-11e7-a06c-080027adee7c
                    name: my-private-space
                    organizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    rootOrganizationId: b72b876d-f63d-11e7-a06c-080027adee7d
                    status: Active
                    network:
                      region: us-east-1
                      cidrBlock: 10.0.0.0/18
                    firewallRules:
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8081
                      toPort: 8081
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 8082
                      toPort: 8082
                      type: inbound
                    - cidrBlock: 0.0.0.0/0
                      protocol: tcp
                      fromPort: 0
                      toPort: 65535
                      type: outbound
                    environments:
                      type: all
                      businessGroups:
                      - all
                    logForwarding:
                      anypointMonitoring: true
                    ingressConfiguration:
                      readResponseTimeout: 300
                      logs:
                        portLogLevel: ERROR
                        filters: []
                      protocol: https-redirect
              example: {}
      operationId: patchOrganizationsByOrganizationidPrivatespacesByPrivatespaceid
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/associations:
    post:
      description: create associations for Private space with business groups and environments
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociationPostPayload'
        x-amf-mediaType: application/json
        description: The associations data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                - id: d282e462-07af-4146-b7d8-8bd7e6b18d83
                  environmentId: 2ea3eff9-569a-4495-b7b6-1e28c6440aeb
                  organizationId: 1ffdaa42-4702-4747-aeb9-aecab0f5ac1b
                - id: 79810eb2-c999-4104-b650-31ea2962a200
                  environmentId: 3e9d5bde-6ef7-4947-9f98-0f7c32d48909
                  organizationId: 1ffdaa42-4702-4747-aeb9-aecab0f5ac1b
                type: array
                items:
                  $ref: '#/components/schemas/Association'
              example: *id001
      operationId: createOrganizationsByOrganizationidPrivatespacesByPrivatespaceidAssociations
    get:
      description: get all associations of a private space.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                - id: d282e462-07af-4146-b7d8-8bd7e6b18d83
                  environmentId: 2ea3eff9-569a-4495-b7b6-1e28c6440aeb
                  organizationId: 1ffdaa42-4702-4747-aeb9-aecab0f5ac1b
                - id: 79810eb2-c999-4104-b650-31ea2962a200
                  environmentId: 3e9d5bde-6ef7-4947-9f98-0f7c32d48909
                  organizationId: 1ffdaa42-4702-4747-aeb9-aecab0f5ac1b
                type: array
                items:
                  $ref: '#/components/schemas/Association'
              example: *id002
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidAssociations
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/associations/{associationId}:
    get:
      description: get a specific associations of a private space.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      - name: associationId
        required: true
        in: path
        schema:
          type: string
        description: The association ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Association'
              example: &id009
                id: d282e462-07af-4146-b7d8-8bd7e6b18d83
                environmentId: 2ea3eff9-569a-4495-b7b6-1e28c6440aeb
                organizationId: 1ffdaa42-4702-4747-aeb9-aecab0f5ac1b
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidAssociationsByAssociationid
    delete:
      description: delete an association
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      - name: associationId
        required: true
        in: path
        schema:
          type: string
        description: The association ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
      operationId: deleteOrganizationsByOrganizationidPrivatespacesByPrivatespaceidAssociationsByAssociationid
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/ports:
    get:
      description: Get the next set of available ports.
      parameters:
      - name: available
        description: Return next free/available ports
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - name: count
        description: Size of the available port list between 1 to 10
        required: true
        in: query
        schema:
          type: integer
          maximum: 10
          default: 1
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ports'
              example:
                ports:
                - 0
        '409':
          description: All the available ports for the space are in use.
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidPorts
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/iamroles:
    get:
      description: get the IAM roles associated with the space.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IAMRole'
              example:
                roles:
                - string
                organizationId: string
                spaceId: string
                message: string
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidIamroles
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/accounts:
    get:
      description: get the AWS account Id a string value.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidAccounts
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/upgrade:
    patch:
      description: Either upgrade now or (re)schedule an upgrade later
      parameters:
      - name: date
        required: false
        in: query
        schema:
          type: string
        description: The date query parameter.
      - name: optIn
        required: true
        in: query
        schema:
          type: boolean
        description: The optIn query parameter.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfraUpdateInfo'
              example:
                scheduledUpdateTime: &id003 2024-02-28 17:57:36+00:00
                status: QUEUED
      operationId: patchOrganizationsByOrganizationidPrivatespacesByPrivatespaceidUpgrade
    delete:
      description: cancel a scheduled upgrade
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
      operationId: deleteOrganizationsByOrganizationidPrivatespacesByPrivatespaceidUpgrade
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/upgradestatus:
    get:
      description: get the upgrade status of the space
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfraUpdateInfo'
              example:
                scheduledUpdateTime: *id003
                status: QUEUED
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidUpgradestatus
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/egress:
    post:
      description: create an egress rule group
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      requestBody:
        $ref: '#/components/requestBodies/EgressRuleGroupPayload'
        description: The egress data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressRuleGroup'
              example:
                id: string
                name: string
                rules:
                - id: string
                  type: string
                isDefault: true
      operationId: createOrganizationsByOrganizationidPrivatespacesByPrivatespaceidEgress
    get:
      description: get all egress rule groups of a private space.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id004
                - id: 65f106d7-5e39-474d-8224-28d92d00b210
                  name: example-rule-group
                  rules:
                  - domains:
                    - example.com
                    protocol: tcp
                    fromPort: 1
                    toPort: 65535
                    description: ''
                type: array
                items:
                  $ref: '#/components/schemas/EgressRuleGroup'
              example: *id004
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidEgress
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/egress/{ruleGroupId}:
    delete:
      description: delete egress rule group
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      - name: ruleGroupId
        required: true
        in: path
        schema:
          type: string
        description: The ruleGroup ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
      operationId: deleteOrganizationsByOrganizationidPrivatespacesByPrivatespaceidEgressByRulegroupid
    get:
      description: get a specific egress rule group
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      - name: ruleGroupId
        required: true
        in: path
        schema:
          type: string
        description: The ruleGroup ID to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressRuleGroup'
              example:
                id: string
                name: string
                rules:
                - id: string
                  type: string
                isDefault: true
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidEgressByRulegroupid
    patch:
      description: Update egress rule group.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      - name: ruleGroupId
        required: true
        in: path
        schema:
          type: string
        description: The ruleGroup ID to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/EgressRuleGroupPayload'
        description: The egress data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressRuleGroup'
              example:
                id: string
                name: string
                rules:
                - id: string
                  type: string
                isDefault: true
      operationId: patchOrganizationsByOrganizationidPrivatespacesByPrivatespaceidEgressByRulegroupid
  /organizations/{organizationId}/privatespaces/{privateSpaceId}/routes:
    get:
      description: get the list of CIDR's in the private space.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrivateSpaceRoute'
              example:
              - id: string
                type: string
      operationId: getOrganizationsByOrganizationidPrivatespacesByPrivatespaceidRoutes
    patch:
      description: Update the CIDRs that the Cloudhub VPC will send traffic to via the IGW.
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_privateSpaceId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateSpaceNetworkRoutesPatch'
        x-amf-mediaType: application/json
        description: The routes data to update.
      responses:
        '202':
          description: Request accepted for processing.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrivateSpaceRoute'
              example:
              - id: string
