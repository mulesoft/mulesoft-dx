        isAvailableForDeployments:
          type: boolean
        availability:
          description: If set to "AVAILABLE" the cluster will accept deployments
          type: string
    ResourceShare:
      type: object
      required:
      - id
      - account
      properties:
        id:
          type: string
        account:
          type: string
    KeyStoreJks:
      type: object
      required:
      - source
      - keystoreBase64
      - alias
      - keyPassphrase
      - storePassphrase
      properties:
        source:
          type: string
        keystoreBase64:
          description: base64 encoded file contents
          type: string
          maxLength: 40960
        alias:
          type: string
          maxLength: 64
        keyPassphrase:
          type: string
          maxLength: 64
        storePassphrase:
          type: string
          maxLength: 64
        keystoreFileName:
          type: string
          maxLength: 64
    KeyStorePem:
      type: object
      required:
      - source
      - certificate
      - key
      - keyPassphrase
      properties:
        source:
          type: string
        certificate:
          type: string
          maxLength: 4096
        key:
          type: string
          maxLength: 6144
        capath:
          type: string
          maxLength: 28672
        certificateFileName:
          type: string
          maxLength: 64
        keyFileName:
          type: string
          maxLength: 64
        capathFileName:
          type: string
          maxLength: 64
        keyPassphrase:
          type: string
          maxLength: 64
    items_3:
      description: Details of certificate.
      type: object
      required:
      - issuer
      - subject
      - version
      - serialNumber
      - signatureAlgorithm
      - publicKeyAlgorithm
      - validity
      - certificateType
      properties:
        issuer:
          description: Details about the entity that issued the certificate.
          type: object
          required:
          - commonName
          - countryName
          - localityName
          - organizationName
          - organizationUnit
          - state
          properties:
            commonName:
              type: string
            countryName:
              type: string
            localityName:
              type: string
            organizationName:
              type: string
            organizationUnit:
              type: string
            state:
              type: string
        subject:
          description: Details about the entity to which the certificate is issued.
          type: object
          required:
          - commonName
          - countryName
          - localityName
          - organizationName
          - organizationUnit
          - state
          properties:
            commonName:
              type: string
            countryName:
              type: string
            localityName:
              type: string
            organizationName:
              type: string
            organizationUnit:
              type: string
            state:
              type: string
        subjectAlternativeName:
          description: Collection of subject alternative names from the SubjectAltName x509 extension
          type: array
          items:
            type: string
        version:
          type: string
        serialNumber:
          description: Serial number assigned by the CA to this certificate, in hex format
          type: string
        signatureAlgorithm:
          description: Name of the signature algorithm
          type: string
        publicKeyAlgorithm:
          description: The standard algorithm name for the public key of this certificate
          type: string
        basicConstraints:
          description: This identifies if the subject of the certificate is a CA
          type: object
          required:
          - certificateAuthority
          properties:
            certificateAuthority:
              description: If set to true, indicates that this is a CA certificate.
              type: boolean
        validity:
          description: Details about validity period of this certificate
          type: object
          required:
          - notBefore
          - notAfter
          properties:
            notBefore:
              type: string
            notAfter:
              type: string
        keyUsage:
          description: A list of values defining the purpose of the public key i.e. the key usage extensions from this certificate
          type: array
          maxItems: 9
          minItems: 1
          items:
            enum:
            - Digital Signature
            - Non Repudiation
            - Key Encipherment
            - Data Encipherment
            - Key Agreement
            - Key CertSign
            - CRL Sign
            - Encipher Only
            - Decipher Only
            type: string
        extendedKeyUsage:
          description: A list of values providing details about the extended key usage extensions from this certificate.
          type: array
          maxItems: 9
          minItems: 1
          items:
            enum:
            - TLS Web server authentication
            - TLS Web client authentication
            - Code signing
            - E-mail protection
            - Timestamping
            - OCSPstamping
            - IP security end system
            - IP security tunnel termination
            - IP security user
            type: string
        certificateType:
          description: The type of this certificate
          type: string
    SupportedRuntimeVersion:
      type: object
      required:
      - baseVersion
      - tag
      - releaseDate
      - minimumTag
      - minimumTagReleaseDate
      - endOfStandardSupportDate
      - endOfExtendedSupportDate
      - endOfLifeSupportDate
      - channel
      properties:
        baseVersion:
          description: Identifier of the Base Version of the Runtime. For example, in the case of a patched 3.8.0 Mule Runtime, the base version is 3.8.0. This is the version that is used in order to get feature validations by the Anypoint Management Center. This is the information shown to customers and the one that has to be used in order to make deployments.
          type: string
        tag:
          description: Identifier of the actual version of the runtime that is used for deployments.
          type: string
        releaseDate:
          description: Release date of the runtime tag that is used for deployments.
          type: number
        minimumTag:
          description: Identifier of the oldest version of the runtime that can be used for deployments.
          type: string
        minimumTagReleaseDate:
          description: Release date of the oldest version of the runtime tag that can be used for deployments.
          type: number
        endOfStandardSupportDate:
          description: Date that marks the end of standard support for this version.
          type: number
        endOfExtendedSupportDate:
          description: Date that marks the end of extended support for this version.
          type: number
        endOfLifeSupportDate:
          description: Date that marks the end of life support for this version.
          type: number
        channel:
          description: Identifies which release channel this version belongs to.
          type: string
        builds:
          description: List of builds under this runtime version. Only set under the /targets/{id}/runtimes/mule/versions response.
          type: array
          items:
            $ref: '#/components/schemas/RuntimeVersionBuild'
        href:
          description: Href to get information about the particular asset. Only if supported.
          type: string
    RuntimeVersionBuild:
      type: object
      required:
      - name
      - jdkVersion
      - releaseDate
      - fromException
      properties:
        name:
          description: Identifies the build number.
          type: string
        jdkVersion:
          description: Identifies the JDK version
          type: string
        releaseDate:
          description: Release date of this runtime build, formatted in milliseconds since January 1, 1970, 00:00:00 GMT.
          type: number
        fromException:
          description: Whether or not the build is available due to a granted exception.
          type: boolean
  parameters:
    XOrigin_organizationId_Path:
      name: organizationId
      description: The Organization id where the Private Space lives.
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
    XOrigin_privateSpaceId_Path:
      name: privateSpaceId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:cloudhub-20
        operation: getOrganizationsByOrganizationidPrivatespaces
        description: GET `/organizations/{organizationId}/privatespaces` in this API; use `id` values as `privateSpaceId`.
        values: $.id
        labels: $.name
      description: The privateSpace ID to identify the target resource.
    XOrigin_connectionId_Path:
