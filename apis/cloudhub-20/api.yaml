      - aes256GcmSha384
      - aes256Sha256
      - dheRsaAes128Sha256
      - dheRsaAes256GcmSha384
      - dheRsaAes256Sha256
      - ecdheEcdsaAes128GcmSha256
      - ecdheEcdsaAes256GcmSha384
      - ecdheRsaAes128GcmSha256
      - ecdheRsaAes256GcmSha384
      - ecdheEcdsaChacha20Poly1305
      - ecdheRsaChacha20Poly1305
      - dheRsaChacha20Poly1305
      - tlsAes256GcmSha384
      - tlsChacha20Poly1305Sha256
      - tlsAes128GcmSha256
      properties:
        aes128GcmSha256:
          default: false
          type: boolean
        aes128Sha256:
          default: false
          type: boolean
        aes256GcmSha384:
          default: false
          type: boolean
        aes256Sha256:
          default: false
          type: boolean
        dheRsaAes128Sha256:
          default: false
          type: boolean
        dheRsaAes256GcmSha384:
          default: false
          type: boolean
        dheRsaAes256Sha256:
          default: false
          type: boolean
        ecdheEcdsaAes128GcmSha256:
          default: true
          type: boolean
        ecdheEcdsaAes256GcmSha384:
          default: true
          type: boolean
        ecdheRsaAes128GcmSha256:
          default: true
          type: boolean
        ecdheRsaAes256GcmSha384:
          default: true
          type: boolean
        ecdheEcdsaChacha20Poly1305:
          default: false
          type: boolean
        ecdheRsaChacha20Poly1305:
          default: false
          type: boolean
        dheRsaChacha20Poly1305:
          default: false
          type: boolean
        tlsAes256GcmSha384:
          default: true
          type: boolean
        tlsChacha20Poly1305Sha256:
          default: true
          type: boolean
        tlsAes128GcmSha256:
          default: true
          type: boolean
    TlsConfigPem:
      type: object
      required:
      - keyStore
      properties:
        keyStore:
          $ref: '#/components/schemas/KeyStorePem'
        trustStore:
          type: object
    TrustStore:
      type: object
      required:
      - type
      - dnList
      - fileName
      properties:
        type:
          type: string
        dnList:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/items_3'
        fileName:
          description: name of the trust store file
          type: string
        expirationDate:
          type: string
    KeyStoreResponse:
      type: object
      required:
      - type
      - cn
      - san
      - fileName
      properties:
        type:
          type: string
        cn:
          type: string
        san:
          type: array
          minItems: 0
          items:
            type: string
        alias:
          type: string
        fileName:
          description: name of the key store file
          type: string
        keyFileName:
          type: string
          maxLength: 64
        capathFileName:
          type: string
          maxLength: 64
        expirationDate:
          type: string
    SupportedRuntime:
      type: object
      required:
      - type
      properties:
        type:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SupportedRuntimeVersion'
    NodeInfo:
      type: object
      required:
