                  propertiesOptions: {}
                  status: STARTED
                  workers:
                    type:
                      name: Medium
                      weight: 1
                      cpu: 1 vCore
                      memory: 1.5 GB memory
                    amount: 1
                    remainingOrgWorkers: 1
                    totalOrgWorkers: 1
                    recentStatistics:
                      transactions: 0
                      cpu: 0.95
                  lastUpdateTime: 1425571830350
                  fileName: example-app.zip
                  muleVersion:
                    version: 4.4.0
