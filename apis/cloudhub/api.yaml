                  userName: fred-smith
                  vpnConfig:
                    network: 203.0.113.0
                    mask: 27
                  deploymentGroup:
                    id: 5aff4d75ea4580594b7405d6
                    name: US West and East 1
                  persistentQueues: false
                  persistentQueuesEncryptionEnabled: false
                  persistentQueuesEncrypted: false
                  monitoringEnabled: true
                  monitoringAutoRestart: true
                  staticIPsEnabled: false
                  multitenanted: false
                  hasFile: true
                  secureDataGatewayEnabled: false
                  vpnEnabled: false
                  trackingSettings:
                    trackingLevel: DISABLED
                  logLevels: []
                  ipAddresses: []
              example: *id004
      operationId: getV2ApplicationsByDomain
    delete:
      description: 'Delete a single application

        '
      parameters:
      - name: domain
        description: Application domain name
        required: true
        in: path
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      responses:
        '204':
          description: Operation completed successfully with no content returned.
      operationId: deleteV2ApplicationsByDomain
    put:
      description: 'Update a single application.

        Requires ''Manage Settings'' role.

        '
      parameters:
      - name: domain
        description: Application domain name
        required: true
        in: path
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      requestBody:
        content:
          multipart/form-data:
            schema:
              description: CloudHub Application from Exchange or Sandbox
              x-amf-examples:
                sandbox:
                  applicationSource:
                    fileSource: 5a0251232f6ce02c9b813bd4
                    fileChecksum: 1ac0a8293da1d327558707662c4fe567
                    source: SANDBOX
                  applicationInfo:
                    workers:
                      amount: 2
                      type:
                        name: Micro
                  autoStart: true
                exchange:
                  applicationSource:
                    groupId: org.mule.examples
                    artifactId: hello-world
                    version: 1.4.0
                    source: EXCHANGE
                  applicationInfo:
                    workers:
                      type:
                        name: Micro
                      amount: 2
                  autoStart: true
              type: object
              properties:
                autoStart:
                  description: Should the application start deploying
                  type: boolean
                applicationInfo:
                  description: Application deployment information
                  type: object
                  properties:
                    domain:
                      description: Desired unique CloudHub application domain, required for new applications
                      type: string
                    fileName:
                      description: Display name for the application file, without extension
                      type: string
                    loggingCustomLog4JEnabled:
                      description: Whether custom Log4J logging is enabled
                      type: boolean
                    loggingNgEnabled:
                      type: boolean
                    logLevels:
                      description: Log levels configuration
                      type: array
                      items:
                        type: object
                        required:
                        - level
                        - packageName
                        properties:
                          level:
                            description: Log level to be set for the specified package
                            enum:
                            - TRACE
                            - DEBUG
                            - INFO
                            - WARN
                            - ERROR
                            type: string
                          packageName:
                            description: Name of the package for which the log level is being set
                            type: string
                    monitoringAutoRestart:
                      description: Whether application should be restarted when not responding
                      type: boolean
                    monitoringEnabled:
                      description: Whether Anypoint Monitoring is enabled for the application
                      type: boolean
                    muleVersion:
                      description: CloudHub Mule runtime version to use. For new deployments obtainer this information from the mule-versions endpoint
                      type: object
                      properties:
                        updateId:
                          description: Update ID identifying the specific patch for the main version. Corresponds to latestUpdate.id from mule-versions endpoint
                          type: string
                        version:
                          description: Main version to use
                          type: string
                    objectStoreV1:
                      description: Whether Object Store V1 should be used, otherwise Object Store V2 will apply
                      type: boolean
                    persistentQueues:
                      description: Whether persistent queues are enabled
                      type: boolean
                    persistentQueuesEncrypted:
                      description: Whether persistent queues are to be encrypted
                      type: boolean
                    properties:
                      description: System property overrides
                      type: object
                      additionalProperties: true
                    region:
                      description: Region where the application is deployed
                      type: string
                    staticIPsEnabled:
                      description: Whether static IPs are enabled
                      type: boolean
                    trackingSettings:
                      description: Insight level
                      type: object
                      required:
                      - trackingLevel
                      properties:
                        trackingLevel:
                          enum:
                          - DISABLED
                          - METADATA
                          - METADATA_AND_REPLAY
                          type: string
                    workers:
                      description: Replicas configuration
                      type: object
                      required:
                      - amount
                      - type
                      properties:
                        amount:
                          description: Number of workers
                          type: integer
                        type:
                          description: Worker vCore size, specifying the right name is enough, the other properties are infromative
                          type: object
                          required:
                          - name
                          properties:
                            cpu:
                              description: CPU allocation for the worker
                              type: string
                            memory:
                              description: Memory allocation for the worker
                              type: string
                            name:
                              description: Name of the worker type
                              type: string
                            weight:
                              description: vCore allocation
                              type: number
                applicationSource:
                  description: Information about application source
                  type: object
                  properties:
                    artifactId:
                      description: artifactId for exchange source
                      type: string
                    fileChecksum:
                      description: fileChecksum for sandbox source
                      type: string
                    fileSource:
                      description: fileSource for sandbox source
                      type: string
                    groupId:
                      description: groupId for exchange source
                      type: string
                    source:
                      description: Source type
                      enum:
                      - EXCHANGE
                      - SANDBOX
                      type: string
                    version:
                      description: version for exchange source
                      type: string
          application/json:
            schema:
              description: CloudHub Application from Exchange or Sandbox
              x-amf-examples:
                sandbox:
                  applicationSource:
                    fileSource: 5a0251232f6ce02c9b813bd4
                    fileChecksum: 1ac0a8293da1d327558707662c4fe567
                    source: SANDBOX
                  applicationInfo:
                    workers:
                      amount: 2
                      type:
                        name: Micro
                  autoStart: true
                exchange:
                  applicationSource:
                    groupId: org.mule.examples
                    artifactId: hello-world
                    version: 1.4.0
                    source: EXCHANGE
                  applicationInfo:
                    workers:
                      type:
                        name: Micro
                      amount: 2
                  autoStart: true
              type: object
              properties:
                autoStart:
                  description: Should the application start deploying
                  type: boolean
                applicationInfo:
                  description: Application deployment information
                  type: object
                  properties:
                    domain:
                      description: Desired unique CloudHub application domain, required for new applications
                      type: string
                    fileName:
                      description: Display name for the application file, without extension
                      type: string
                    loggingCustomLog4JEnabled:
                      description: Whether custom Log4J logging is enabled
                      type: boolean
                    loggingNgEnabled:
                      type: boolean
                    logLevels:
                      description: Log levels configuration
                      type: array
                      items:
                        type: object
                        required:
                        - level
                        - packageName
                        properties:
                          level:
                            description: Log level to be set for the specified package
                            enum:
                            - TRACE
                            - DEBUG
                            - INFO
                            - WARN
                            - ERROR
                            type: string
                          packageName:
                            description: Name of the package for which the log level is being set
                            type: string
                    monitoringAutoRestart:
                      description: Whether application should be restarted when not responding
                      type: boolean
                    monitoringEnabled:
                      description: Whether Anypoint Monitoring is enabled for the application
                      type: boolean
                    muleVersion:
                      description: CloudHub Mule runtime version to use. For new deployments obtainer this information from the mule-versions endpoint
                      type: object
                      properties:
                        updateId:
                          description: Update ID identifying the specific patch for the main version. Corresponds to latestUpdate.id from mule-versions endpoint
                          type: string
                        version:
                          description: Main version to use
                          type: string
                    objectStoreV1:
                      description: Whether Object Store V1 should be used, otherwise Object Store V2 will apply
                      type: boolean
                    persistentQueues:
                      description: Whether persistent queues are enabled
                      type: boolean
                    persistentQueuesEncrypted:
                      description: Whether persistent queues are to be encrypted
                      type: boolean
                    properties:
                      description: System property overrides
                      type: object
                      additionalProperties: true
                    region:
                      description: Region where the application is deployed
                      type: string
                    staticIPsEnabled:
                      description: Whether static IPs are enabled
                      type: boolean
                    trackingSettings:
                      description: Insight level
                      type: object
                      required:
                      - trackingLevel
                      properties:
                        trackingLevel:
                          enum:
                          - DISABLED
                          - METADATA
                          - METADATA_AND_REPLAY
                          type: string
                    workers:
                      description: Replicas configuration
                      type: object
                      required:
                      - amount
                      - type
                      properties:
                        amount:
                          description: Number of workers
                          type: integer
                        type:
                          description: Worker vCore size, specifying the right name is enough, the other properties are infromative
                          type: object
                          required:
                          - name
                          properties:
                            cpu:
                              description: CPU allocation for the worker
                              type: string
                            memory:
                              description: Memory allocation for the worker
                              type: string
                            name:
                              description: Name of the worker type
                              type: string
                            weight:
                              description: vCore allocation
                              type: number
                applicationSource:
                  description: Information about application source
                  type: object
                  properties:
                    artifactId:
                      description: artifactId for exchange source
