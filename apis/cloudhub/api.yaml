openapi: 3.0.0
info:
  title: CloudHub API
  version: 1.0.0
  description: Manage CloudHub applications, domains, deployments, alerts, and autoscale policies. Monitor dashboard statistics and diagnostics.
servers:
- url: https://anypoint.mulesoft.com/cloudhub/api
- url: https://{region}.anypoint.mulesoft.com/cloudhub/api
  variables:
    region:
      default: eu1
      description: Region identifier for the service endpoint.
- url: https://{region}.platform.mulesoft.com/cloudhub/api
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
  /v2: {}
  /v2/alerts:
    description: 'Alerts resource

      '
    get:
      description: 'Retrieve all alerts in the specified environment.

        Requires ''Read Alerts'' role.

        '
      parameters:
      - name: offset
        description: Offset to return alerts from
        required: true
        in: query
        schema:
          type: integer
          default: 0
      - name: limit
        description: Maximum number of alerts to return
        required: true
        in: query
        schema:
          type: integer
          default: 10
      - name: resource
        description: Only return alerts which are connected to this resource (application name)
        required: true
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAlertsResponse'
              example: &id067
              - name: failure
                severity: INFO
                condition:
                  type: deployment-failed
                  resources:
                  - my-app-name
                  resourceType: application
                organizationId: 2105a52e-6bd7-4c86-92bd-119ba216f96d
                environmentId: 8606e617-21de-4d46-84fb-0e44036ac08b
                id: 1555fd61-3cfb-4662-afdc-298c1676beb0
                productName: cloudhub
                actions:
                - type: email
                  emails:
                  - me@example.com
                  subject: subject line
                  content: deployment failed for ${resource}
                enabled: true
                lastModified: 1458115909470
                isSystem: false
                createdAt: 1458115909470
              - name: failure
                severity: INFO
                condition:
                  type: deployment-success
                  resources:
                  - my-app-name
                  resourceType: application
                organizationId: 2105a52e-6bd7-4c86-92bd-119ba216f96d
                environmentId: 8606e617-21de-4d46-84fb-0e44036ac08b
                id: 1555fd61-3cfb-4662-afdc-298c1676beb2
                productName: cloudhub
                actions:
                - type: email
                  emails:
                  - me@example.com
                  subject: subject line
                  content: deployment failed for ${resource}
                enabled: true
                lastModified: 1458115909470
                isSystem: false
                createdAt: 1458115909470
      operationId: getV2Alerts
    post:
      description: 'Create an alert

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      requestBody:
        $ref: '#/components/requestBodies/PostPutAlert'
        description: The alerts data to create.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAlertResponse'
              example: &id001
                name: failure
                severity: INFO
                condition:
                  type: deployment-failed
                  resources:
                  - my-app-name
                  resourceType: cloudhub-application
                organizationId: 2105a52e-6bd7-4c86-92bd-119ba216f96d
                environmentId: 8606e617-21de-4d46-84fb-0e44036ac08b
                id: 1555fd61-3cfb-4662-afdc-298c1676beb0
                productName: cloudhub
                actions:
                - type: email
                  emails:
                  - me@example.com
                  subject: subject line
                  content: deployment failed for ${resource}
                enabled: true
                lastModified: 1458115909470
                isSystem: false
                createdAt: 1458115909470
      operationId: createV2Alerts
  /v2/alerts/{id}:
    put:
      description: 'Update an existing alert

        '
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
        description: The id to identify the target resource.
      requestBody:
        $ref: '#/components/requestBodies/PostPutAlert'
        description: The alerts data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAlertResponse'
              example: *id001
      operationId: updateV2AlertsById
    get:
      description: 'Retrieve a single alert

        '
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
        description: The id to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAlertResponse'
              example: *id001
      operationId: getV2AlertsById
    delete:
      description: 'Delete a single alert

        '
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
        description: The id to identify the target resource.
      responses:
        '204':
          description: 'Alert deleted

            '
      operationId: deleteV2AlertsById
  /v2/alerts/{id}/history:
    get:
      description: 'Retrieve the history describing when this alert was triggered

        '
      parameters:
      - name: id
        required: true
        in: path
        schema:
          type: string
        description: The id to identify the target resource.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsHistory'
              example: &id068
                data:
                - triggeredAt: 1458117301985
                  context:
                    user: jeffh
                    resource: testapi-jeffdasd2
                  severity: INFO
                  condition:
                    type: deployment-success
                  actions:
                  - state: failed
                    type: email
                - triggeredAt: 1458116181786
                  context:
                    user: jeffh
                    resource: testapi-jeffdasd2
                  severity: INFO
                  condition:
                    type: deployment-success
                  actions:
                  - state: failed
                    type: email
                total: 2
      operationId: getV2AlertsByIdHistory
  /v2/applications:
    description: 'Applications resource

      '
    get:
      description: 'Retrieve all applications in the specified environment.

        Requires ''Read Applications'' role.

        '
      parameters:
      - name: retrieveStatistics
        description: Include statistics for each application in the response
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - name: period
        description: Number of milliseconds of statistics to gather
        required: true
        in: query
        schema:
          type: number
          default: 3600000
      - name: retrieveLogLevels
        description: Include log levels for each application in the response
        required: true
        in: query
        schema:
          type: boolean
          default: true
      - name: retrieveTrackingSettings
        description: Include tracking settings for each application in the response
        required: true
        in: query
        schema:
          type: boolean
          default: true
      - name: retrieveIpAddresses
        description: Include ip address allocations for each application in the response
        required: true
        in: query
        schema:
          type: boolean
          default: true
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                - domain: example-app
                  fullDomain: example-app.cloudhub.io
                  description: ''
                  properties: {}
                  propertiesOptions: {}
                  status: STARTED
                  workers:
                    type:
                      name: Medium
                      weight: 1
                      cpu: 1 vCore
                      memory: 1.5 GB memory
                    amount: 1
                    remainingOrgWorkers: 1
                    totalOrgWorkers: 1
                    recentStatistics:
                      transactions: 0
                      cpu: 0.95
                  lastUpdateTime: 1425571830350
                  fileName: example-app.jar
                  muleVersion:
                    version: 4.4.0
                    updateId: 651c112af26039320eef384f
                    latestUpdateId: 6527fb5109623963cc1d425e
                    endOfSupportDate: 1703991600000
                    endOfLifeDate: 1704078000000
                    updateVersion: 10-03-2023
                    releaseChannel: NONE
                    javaVersion: '8'
                  previousMuleVersion:
                    version: 4.4.0
                    updateId: 64f20477036da5595236faaf
                    endOfSupportDate: 1703991600000
                    endOfLifeDate: 1704078000000
                    updateVersion: 09-01-2023
                    releaseChannel: NONE
                    javaVersion: '8'
                  tenants: 0
                  userId: 54f7ed7ae4b0d48f31a3099e
                  userName: fred-smith
                  vpnConfig:
                    network: 203.0.113.0
                    mask: 27
                  persistentQueues: false
                  persistentQueuesEncryptionEnabled: false
                  persistentQueuesEncrypted: false
                  monitoringEnabled: true
                  monitoringAutoRestart: true
                  staticIPsEnabled: false
                  multitenanted: false
                  hasFile: true
                  secureDataGatewayEnabled: false
                  vpnEnabled: false
                  trackingSettings:
                    trackingLevel: DISABLED
                  logLevels: []
                  ipAddresses: []
              example: *id002
      operationId: getV2Applications
    post:
      description: 'Create a new application.

        Requires ''Create Applications'' role.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostApplication'
          application/json:
            schema:
              $ref: '#/components/schemas/PostApplication'
        x-amf-mediaType: application/json
        description: The applications data to create.
      x-amf-requestPayloads:
      - mediaType: multipart/form-data
        schema:
          type: object
          required:
          - file
          - appInfoJson
          properties:
            file:
              description: 'Contents of a Mule application file

                '
              type: file
            autoStart:
              description: 'boolean flag to autostart the application after it is deployed

                '
              example: true
              type: boolean
            appInfoJson:
              description: 'application attributes in json format


                Set "objectStoreV1": false to use Object Store V2

                '
              example: "{\n    \"domain\": \"test-test\",\n    \"muleVersion\": {\n        \"version\": \"4.4.0\"\n    },\n    \"region\": \"us-east-1\",\n    \"monitoringEnabled\": true,\n    \"monitoringAutoRestart\": true,\n    \"workers\": {\n        \"amount\": 1,\n        \"type\": {\n            \"name\": \"Medium\",\n            \"weight\": 1,\n            \"cpu\": \"1 vCore\",\n            \"memory\": \"1.5 GB memory\"\n        }\n    },\n    \"loggingNgEnabled\": true,\n    \"persistentQueues\": true,\n    \"objectStoreV1\": true\n}"
              type: string
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id003
                  domain: example-app
                  fullDomain: example-app.cloudhub.io
                  description: ''
                  properties: {}
                  propertiesOptions: {}
                  status: STARTED
                  workers:
                    type:
                      name: Medium
                      weight: 1
                      cpu: 1 vCore
                      memory: 1.5 GB memory
                    amount: 1
                    remainingOrgWorkers: 1
                    totalOrgWorkers: 1
                    recentStatistics:
                      transactions: 0
                      cpu: 0.95
                  lastUpdateTime: 1425571830350
                  fileName: example-app.zip
                  muleVersion:
                    version: 4.4.0
                    updateId: 651c112af26039320eef384f
                    latestUpdateId: 6527fb5109623963cc1d425e
                    endOfSupportDate: 1703991600000
                    endOfLifeDate: 1704078000000
                    updateVersion: 10-03-2023
                    releaseChannel: NONE
                    javaVersion: '8'
                  previousMuleVersion:
                    version: 4.4.0
                    updateId: 64f20477036da5595236faaf
                    endOfSupportDate: 1703991600000
                    endOfLifeDate: 1704078000000
                    updateVersion: 09-01-2023
                    releaseChannel: NONE
                    javaVersion: '8'
                  tenants: 0
                  userId: 54f7ed7ae4b0d48f31a3099e
                  userName: fred-smith
                  vpnConfig:
                    network: 203.0.113.0
                    mask: 27
                  deploymentGroup:
                    id: 5aff4d75ea4580594b7405d6
                    name: US West and East 1
                  persistentQueues: false
                  persistentQueuesEncryptionEnabled: false
                  persistentQueuesEncrypted: false
                  monitoringEnabled: true
                  monitoringAutoRestart: true
                  staticIPsEnabled: false
                  multitenanted: false
                  hasFile: true
                  secureDataGatewayEnabled: false
                  vpnEnabled: false
                  trackingSettings:
                    trackingLevel: DISABLED
                  logLevels: []
                  ipAddresses: []
              example: *id003
      operationId: createV2Applications
    put:
      description: 'Bulk Action (UPDATE, START, STOP, RESTART, DELETE) for Applications.


        **UPDATE**: Update all applications in the provided list to the latest

        update of the Mule Version that the application is currently using


        **START**: Start all applications in the provided list if they are stopped


        **STOP**: Stop all applications in the provided list if they are started


        **RESTART**: Restart all applications in the provided list with zero downtime


        **DELETE**: Delete all applications in the provided list


        The threshold for number of domains in the bulk actions is 100.


        These actions cannot be stopped. Requires ''Manage Settings'' role.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      requestBody:
        content:
          application/json:
            schema:
              example:
                action: UPDATE
                domains:
                - domain1
                - domain2
        x-amf-mediaType: application/json
        description: The applications data to update.
      responses:
        '200':
          description: Successful operation.
      operationId: updateV2Applications
  /v2/applications/{domain}:
    description: 'A single application

      '
    get:
      description: 'Retrieve a single application by name.

        Requires ''Read Applications'' role.

        '
      parameters:
      - name: domain
        description: Application domain name
        required: true
        in: path
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id004
                  domain: example-app
                  fullDomain: example-app.cloudhub.io
                  description: ''
