  /v2/applications/{domain}/dashboardStats:
    description: 'Dashboard statistics


      Dashboard stats contains various metrics as requested, each includes multiple <timestamp, value> pairs referred to as statistic points.

      The number of statistic points depends on the time range and the interval for the statistics.


      The statistics available are:


      | Metric Name              | Description                                                                                |

      | ------------------       |:-------------------------------------------------------------------------------------------|

      | **events**               | Total number of mule events occur within the specific interval. Note: Due to the 60-second collection cycle, events occurring in one calendar minute may appear in an adjacent minute window. This is expected behavior based on when events are collected by the Mule agent statistics system. |

      | **diskReadBytes**        | Average disk read in bytes per minute within the specific interval                         |

      | **diskWriteBytes**       | Average disk write in bytes per minute within the specific interval                        |

      | **networkIn**            | Average networkIn in bytes per minute within the specific interval                         |

      | **networkOut**           | Average networkOut in bytes per minute within the specific interval                        |

      | **memoryTotalUsed**      | Average memory used in bytes within the specific interval                                  |

      | **memoryPercentageUsed** | Average percentage of memory used within the specific interval                             |

      | **memoryTotalMax**       | Total memory in bytes of the worker. memoryTotalUsed/memoryTotalMax = memoryPercentageUsed |

      | **cpu**                  | Average percentage of cpu used within the specific interval                                |


      **Important notes:**


      - **Statistics Events cap:** When the requested duration exceeds 250 intervals, the API preserves the full time range but automatically recalculates the interval to fit within 250 data points.


      - **WorkerStatistics behaviour:** Worker metrics are limited to a maximum of 1440 data points and do not auto-adjust intervals when within limits.


      - **Retention limit:** Metrics requested at 1-minute resolution are only available for the last 15 days.


      - **Disk metrics (-1 values):** diskReadBytes and diskWriteBytes may return -1 when instance store volumes are not present. These metrics can be safely ignored in such cases.

      '
    get:
      description: 'Retrieve statistics for an application or specific application workers.

        Requires ''Read Applications'' role.


        (Note: The maximum number of statistic points returned for each metric from a single call is 1440.)

        '
      parameters:
      - name: endDate
        description: 'ISO format date string representing the last date to retrieve statistics. If not specified, defaults to now.

          '
        required: true
        in: query
        schema:
          type: string
      - name: statistics
        description: 'Specify which statistics to retrieve. If not specified, retrieve all statistics

          '
        required: true
        in: query
        schema:
          type: string
      - name: interval
        description: Amount of time between samples in milliseconds. Worker statistics can be retrieved for period as short as 1 minute.
        required: true
        in: query
        schema:
          type: integer
          default: 900000
      - name: workerIds
        description: 'Specify which worker to retrieve statistics for. Can be specified multiple times to retrieve statistics for multiple workers. If not specified, statistics for all workers are retrieved.

          '
        required: true
        in: query
        schema:
          type: string
      - name: startDate
        description: 'ISO format date string representing the first date to retrieve statistics. If not specified, defaults to endDate - 24 hours.

          '
        required: true
        in: query
        schema:
          type: string
      - name: domain
        description: Application domain name
        required: true
        in: path
        schema:
          type: string
      - $ref: '#/components/parameters/XOrigin_X_ANYPNT_ENV_ID_Header'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id006
                  events:
                    '1431145723547': 0
                    '1431229423547': 0
                    '1431230323547': 0
                    '1431231223547': 0
                  workerStatistics:
                  - id: i-0331cdfc
                    ipAddress: 52.6.239.113
                    statistics:
                      memoryTotalUsed:
                        '1431231180000': 1000
                        '1431232080000': 1000
                      diskWriteBytes:
                        '1431145680000': -1
                        '1431146580000': -1
                      cpu:
                        '1431145680000': 3
                        '1431146580000': 5
                      networkOut:
                        '1431146580000': 34234
                        '1431231180000': 73779.5
                      diskReadBytes:
                        '1431145680000': 3434
