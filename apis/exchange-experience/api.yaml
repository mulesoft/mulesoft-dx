        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
  headers:
    PagesOrderRevision:
      description: Hash which represents the most recent pages order revision. This hash should be sent back to the server when attempting to store a new pages order.
      schema:
        type: string
  schemas:
    NullableInteger:
      description: An empty value is allowed and transformed to `0`
      allOf:
      - x-force-coercion-to: integer
      - type: integer
    NullableBoolean:
      description: An empty value is allowed and transformed to `false`
      allOf:
      - x-force-coercion-to: boolean
      - type: boolean
    ServiceDependency:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
          - ok
          - error
