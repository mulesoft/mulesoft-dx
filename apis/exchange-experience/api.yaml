components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token authentication. Login endpoint: https://anypoint.mulesoft.com/accounts/api/login

        '
    clientAuth:
      type: oauth2
      description: 'OAuth2 client credentials. Token endpoint: https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token

        '
      flows:
        clientCredentials:
          tokenUrl: https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token
          scopes: {}
  parameters:
    OrganizationId:
      in: path
      name: organizationId
      description: Id of the organization
      required: true
      schema:
        type: string
        example: 434b78c3-bcd9-412d-9428-dec2f8c72cb2
        format: uuid
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
    MasterOrganizationId:
      name: masterOrganizationId
      required: true
      in: path
      schema:
        description: The Id of the root organization
        example: 434b78c3-bcd9-412d-9428-dec2f8c72cb2
        type: string
        format: uuid
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the root organization GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      description: The masterOrganization ID to identify the target resource.
    GroupId:
      in: path
      name: groupId
      description: groupId of the asset
      required: true
      schema:
        type: string
        example: group-id
      x-origin:
      - api: urn:api:exchange-experience
        operation: getAssetsSearch
        description: GET `/assets/search`; use the asset search results from Exchange and extract `groupId` values.
        values: $[*].groupId
        labels: $[*].name
    AssetId:
      name: assetId
      required: true
      description: assetId of the asset
      in: path
      schema:
        type: string
        example: asset-id
      x-origin:
      - api: urn:api:exchange-experience
        operation: getAssetsSearch
        description: GET `/assets/search`; use the asset search results from Exchange and extract`assetId` values.
        values: $[*].assetId
        labels: $[*].name
    OrganizationDomain:
      name: organizationDomain
      required: true
      description: Domain of the root organization
      in: path
      schema:
        example: some-domain
        type: string
        maxLength: 255
    MinorVersion:
      name: minorVersion
      required: true
      description: Minor version
      in: path
      schema:
        example: '2.22'
        type: string
        pattern: ^[0-9]+\.[0-9]+$
    Version:
      name: version
      required: true
      description: version of the asset
      in: path
      schema:
        example: 2.22.45
        type: string
        pattern: ^v{0,1}(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
      x-origin:
      - api: urn:api:exchange-experience
        operation: getAssetsSearch
        description: GET `/assets/search`; use the asset search results from Exchange and extract `version` values.
        values: $.versions
        labels: $.name
    APIInstanceIdQuery:
      name: apiInstanceId
      required: false
      description: id of the api instance
      in: query
      schema:
        $ref: '#/components/schemas/NullableInteger'
    APIInstanceId:
      name: apiInstanceId
      required: true
      in: path
      schema:
        description: id of the api instance
        type: string
      description: The apiInstance ID to identify the target resource.
    APIId:
      name: apiId
      required: true
      in: path
      schema:
        description: id of the api instance
        type: string
      description: The api ID to identify the target resource.
    Search:
      name: search
      required: false
      description: Search parameter used to filter facets
      in: query
      schema:
        title: Search
        example: my name
        type: string
    Limit:
      name: limit
      description: Amount of objects retrieved in the response
      in: query
      schema:
        title: Limit
        example: 10
        allOf:
        - x-force-coercion-to: number
        - type: number
          minimum: 0
          maximum: 250
    LimitNotValidated:
      name: limit
      description: Amount of objects retrieved in the response
      in: query
      schema:
        title: Limit
        example: 10
        allOf:
        - x-force-coercion-to: number
        - type: number
    Offset:
      name: offset
      description: The offset specifies the offset of the first row to return
      in: query
      schema:
        $ref: '#/components/schemas/NullableInteger'
    Sort:
      name: sort
      description: Property to sort by
      required: false
      in: query
      schema:
        title: Sort
        example: name
        type: string
    Status:
      name: status
      in: query
      description: Filter versions that matches the status indicated. Should be one of deprecated, development or published
      schema:
        title: Status
        type: array
        items:
          type: string
    VersionGroup:
      name: versionGroup
      description: Version group of the asset
      required: true
      in: path
      schema:
        type: string
    ApplicationId:
      name: applicationId
      required: true
      in: path
      schema:
        description: The Id of an application
        example: '273463'
        type: string
      description: The application ID to identify the target resource.
    EnvironmentId:
      name: environmentId
      required: true
      in: path
      schema:
        description: The id of the environment for this API Group instance
        type: string
        minLength: 36
        maxLength: 36
      x-origin:
      - api: urn:api:access-management
        operation: listEnvironments
        description: GET `/organizations/{organizationId}/environments`; use each `data[].id` value as an environment identifier.
        values: $.data[*].id
        labels: $.data[*].name
      description: The environment ID to identify the target resource.
    APIGroupInstanceIdQuery:
      name: apiGroupInstanceId
      required: false
      in: query
      schema:
        description: Id of the API Group instance
        allOf:
        - x-force-coercion-to: integer
        - type: integer
          minimum: 0
      description: The apiGroupInstance ID query parameter.
    APIGroupInstanceId:
      name: apiGroupInstanceId
      required: true
      in: path
      schema:
        description: Id of the API Group instance
        allOf:
        - x-force-coercion-to: integer
        - type: integer
          minimum: 0
      description: The apiGroupInstance ID to identify the target resource.
    InstanceId:
      name: instanceId
      required: true
      in: path
      schema:
        description: Id of the API instance
        allOf:
        - x-force-coercion-to: integer
        - type: integer
          minimum: 1
      description: The instance ID to identify the target resource.
    ReviewId:
      name: reviewId
      required: true
      in: path
      schema:
        description: Id of the review. It is a UUID.
        example: 7a7190da-29f3-451a-b2b2-ebd6f7e1f8ea
        type: string
        format: uuid
      description: The review ID to identify the target resource.
    ExternalInstanceId:
      name: id
      required: true
      in: path
      schema:
        description: Id of the external instance
        example: 7a7190da-29f3-451a-b2b2-ebd6f7e1f8ea
        type: string
        format: uuid
      description: The id to identify the target resource.
    ManagedInstanceId:
      name: id
      required: true
      in: path
      schema:
        description: Id of the managed instance
        example: '9897'
        type: string
      description: The id to identify the target resource.
    PagePath:
      name: pagePath
      required: true
      in: path
      schema:
        type: string
      description: The pagePath to identify the target resource.
    QueryId:
      in: path
      name: queryId
      required: true
      schema:
        type: string
      description: The query ID to identify the target resource.
    ResourceId:
      name: resourceId
      required: true
      in: path
      schema:
        type: string
      description: The resource ID to identify the target resource.
    TagKey:
      name: tagKey
      required: true
      in: path
      schema:
        type: string
      description: The tagKey to identify the target resource.
    AllowedAPISpecFormats:
      name: x-allowed-api-spec-formats
      required: false
      in: header
      schema:
        description: Specify API Spec formats that assets are allowed to use
        example:
        - application/raml
        - application/vnd.oai.openapi;version=2.0
        type: string
      description: The x allowed api spec formats header value.
    FileValidation:
      name: x-file-validation
      in: header
      required: false
      schema:
        default: true
        allOf:
        - x-force-coercion-to: boolean
        - type: boolean
      description: The x file validation header value.
    StrictPackage:
      name: x-strict-package
      description: Indicates if file is immutable.
      in: header
      schema:
        default: false
        allOf:
        - x-force-coercion-to: boolean
        - type: boolean
    SnapshotsAllowed:
      name: x-snapshots-allowed
