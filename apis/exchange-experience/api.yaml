      description: The periodType query parameter.
    ForceUpdate:
      name: X-Force-Update
      required: false
      in: header
      description: Enforce update operation (possibly affecting many resources) to avoid Conflict response (409)
      schema:
        $ref: '#/components/schemas/NullableBoolean'
    Format:
      name: format
      required: false
      in: query
      schema:
