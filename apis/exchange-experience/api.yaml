      required: false
      in: header
      schema:
        description: UserId.
        type: string
      description: The x user id header value.
    AssignRoles:
      name: x-assign-roles
      required: false
      in: header
      schema:
        type: boolean
      description: The x assign roles header value.
    Accept:
      name: accept
      required: false
      in: header
      schema:
        description: Data can be exported as a CSV. The allowed content-type to be requested for is 'text/csv' or 'application/json'
