      required: false
      in: header
      schema:
        description: Enforce delete operation (possibly affecting many resources) to avoid Conflict response (409)
        $ref: '#/components/schemas/NullableBoolean'
      description: The X Force Delete header value.
    DeleteType:
      name: X-Delete-Type
