      in: query
      description: 'Asset related versions populated into `otherVersions` property will also have the filters for this query applied, e.g.: if status filter is applied, then related versions will have the status filter also applied, otherwise all possible status will be returned. Defaults to `true`'
      schema:
        $ref: '#/components/schemas/NullableBoolean'
    XOrigin_organizationId_Path:
      name: organizationId
