openapi: 3.0.0
info:
  title: Exchange Experience API
  description: Manage assets, reviews, ratings, and portal customizations in Anypoint Exchange. Search, publish, and consume reusable API and integration assets.
  version: 2.0.1
servers:
- url: https://anypoint.mulesoft.com/exchange/api/v2
  description: Anypoint URL
- url: https://eu1.anypoint.mulesoft.com/exchange/api/v2
  description: Regional Anypoint URL
- url: https://{region}.platform.mulesoft.com/exchange/api/v2
  description: Regional Anypoint URL
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
- url: /api/v2
  description: Base URI
security:
- bearerAuth: []
- clientAuth: []
paths:
  /assets:
    summary: Asset
    description: Represents all the resources under the assets path
    post:
      description: Uploads an asset
      parameters:
      - name: Content-Type
        in: header
        schema:
          description: Use "multipart/form-data"
          example: multipart/form-data
          type: string
        description: The Content Type header value.
      - $ref: '#/components/parameters/AllowedAPISpecFormats'
      - $ref: '#/components/parameters/FileValidation'
      - $ref: '#/components/parameters/StrictPackage'
      - $ref: '#/components/parameters/UserId'
      - $ref: '#/components/parameters/SnapshotsAllowed'
      responses:
        '201':
          description: Asset created
      operationId: createAssets
  /assets/search:
    summary: Assets Search
    description: Assets Search
    get:
      description: Gets a paginated set of assets
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      - $ref: '#/components/parameters/Sort'
      - $ref: '#/components/parameters/Ascending'
      - name: sharedWithMe
        description: Filter assets that are shared with me
        in: query
        schema:
          $ref: '#/components/schemas/NullableBoolean'
      - name: types
        description: Filter assets by type
        in: query
        schema:
          type: string
          example: rest-api
          enum:
            - rest-api
            - soap-api
            - http-api
            - raml-fragment
            - connector
            - template
            - example
            - custom
            - mcp
      - name: rootOrganizationId
        description: Root organization ID to scope the asset search
        in: query
        schema:
          type: string
          format: uuid
          example: 434b78c3-bcd9-412d-9428-dec2f8c72cb2
        x-origin:
        - api: urn:api:access-management
          operation: getOrganizations
          description: GET `/organizations/{organizationId}`; use the `id` of the organization where the user is logged in.
          values: $.id
          labels: $.name
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                SearchResult:
                  $ref: examples/assets.yaml#/SearchResult
              schema:
                type: array
                items:
                  type: object
      operationId: getAssetsSearch
  /assets/{groupId}/{assetId}:
    summary: Assets
    description: Asset by groupId and assetId
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    delete:
      parameters:
      - $ref: '#/components/parameters/DeleteType'
      description: Deletes an asset
      responses:
        '204':
          description: Asset deleted
        '409':
          description: There were conflicts while deleting
      operationId: deleteAssetsByGroupidByAssetid
    patch:
      operationId: patchAssetsByGroupidByAssetid
      description: Updates asset metadata (name and description)
      requestBody:
        content:
          application/json:
            example:
              name: new asset name
              description: new asset description
            schema:
              $ref: schemas/assets.yaml#/PatchAsset
        description: The assets data to update.
      responses:
        '204':
          description: asset modified successfully
  /assets/{groupId}/{assetId}/metrics:
    summary: Asset metrics
    description: Asset metrics
    get:
      description: Gets metrics given a groupId and assetId
      parameters:
      - $ref: '#/components/parameters/PeriodType'
      - $ref: '#/components/parameters/Format'
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: success
          headers:
            content-type:
              schema:
                description: Response content can be of type 'text/csv' or 'application/json'
                type: string
              description: Media type of the response body.
          content:
            application/json:
              examples:
                Metrics:
                  $ref: examples/metrics.yaml#/Metrics
            text/csv:
              examples:
                MetricsCSV:
                  $ref: examples/metrics.yaml#/MetricsCSV
      operationId: getAssetsByGroupidByAssetidMetrics
  /assets/{groupId}/{assetId}/metrics/versions:
    summary: Asset metrics
    description: Asset metrics
    get:
      description: Gets metrics by version given a groupId and assetId
      parameters:
      - $ref: '#/components/parameters/Format'
      - $ref: '#/components/parameters/PeriodType'
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/Accept'
      responses:
        '200':
          description: success
          headers:
            content-type:
              schema:
                description: Response content can be of type 'text/csv' or 'application/json'
                type: string
              description: Media type of the response body.
          content:
            application/json:
              examples:
                MetricVersions:
                  $ref: examples/metrics.yaml#/MetricVersions
              schema:
                type: object
            text/csv:
              examples:
                MetricVersionsCSV:
                  $ref: examples/metrics.yaml#/MetricVersionsCSV
              schema:
                type: string
      operationId: getAssetsByGroupidByAssetidMetricsVersions
  /assets/{groupId}/{assetId}/icon:
    summary: Icon
    description: Asset icon
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    put:
      operationId: updateAssetsByGroupidByAssetidIcon
      description: Uploads an icon as a binary file
      requestBody:
        content:
          '*/*':
            examples:
              IconSVG:
                $ref: examples/icon.yaml#/IconSVG
        description: The icon data to update.
      responses:
        '201':
          description: Resource created successfully.
          content:
            application/json:
              schema:
                example: &id001
                  assetId: api-test
                  groupId: 59291b3f-c12a-4c84-be4b-19cf19de0475
                  classifier: icon
                  packaging: png
                  externalKey: 59291b3f-c12a-4c84-be4b-19cf19de0475/41470514d754ff6ae8906b93540742c8dbaeb44deb88d565f677c47641452870.png
                  externalLink: http://localhost/api-test-1.0.0-icon.png
              example: *id001
    delete:
      description: Delete an icon for the whole ga
      responses:
        '204':
          description: Icon deleted
      operationId: deleteAssetsByGroupidByAssetidIcon
  /assets/{groupId}/{assetId}/public:
    summary: Public Versions
    description: Public asset versions
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    put:
      operationId: updateAssetsByGroupidByAssetidPublic
      description: Sets the public versions for the asset
      requestBody:
        content:
          application/json:
            schema:
              example:
              - versionGroup: v1
              - versionGroup: v2
              type: array
              items:
                type: object
        description: The public data to update.
      responses:
        '204':
          description: success
  /assets/{groupId}/{assetId}/asset:
    summary: Asset
    description: Asset
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    get:
      description: Gets an asset
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                Asset:
                  $ref: examples/assets.yaml#/AssetWithFiles
      operationId: getAssetsByGroupidByAssetidAsset
  /assets/{groupId}/{assetId}/minorVersions/{minorVersion}/portal/search:
    summary: Asset portal search
    description: Search for a term within an asset portal
    get:
      parameters:
      - name: term
        in: query
        required: true
        schema:
          title: Search term
          description: The term to search for in the asset portal
          type: string
        description: The term query parameter.
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/MinorVersion'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                description: The list of documentation pages with matches
                example: &id002
                  pages:
                  - title: home
                  - title: authentication
                type: array
                items:
                  type: object
              example: *id002
      operationId: getAssetsByGroupidByAssetidMinorversionsByMinorversionPortalSearch
      description: Retrieves a search.
  /assets/{groupId}/{assetId}/versionGroups:
    summary: Version Groups
    description: Version groups of an asset
    parameters:
    - $ref: '#/components/parameters/Status'
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    get:
      description: Gets asset version groups
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                VersionGroups:
                  $ref: examples/assets.yaml#/VersionGroups
              schema:
                type: array
                items:
                  type: object
      operationId: getAssetsByGroupidByAssetidVersiongroups
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/apiGroupInstances:
    summary: API Groups Instances
    description: API Groups instances
    get:
      description: Gets API Group Instance
      parameters:
      - $ref: '#/components/parameters/LimitNotValidated'
      - $ref: '#/components/parameters/Offset'
      - $ref: '#/components/parameters/Sort'
      - $ref: '#/components/parameters/Ascending'
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                APIGroupInstances:
                  $ref: examples/instances.yaml#/APIGroupInstances
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupApigroupinstances
  ? /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/environments/{environmentId}/apiGroupInstances/{apiGroupInstanceId}
  : summary: Instance
    description: A single API Group instance identified by a "apiGroupInstanceId"
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/VersionGroup'
    - $ref: '#/components/parameters/EnvironmentId'
    - $ref: '#/components/parameters/APIGroupInstanceId'
    patch:
      operationId: patchAssetsByGroupidByAssetidVersiongroupsByVersiongroupEnvironmentsByEnvironmentidApigroupinstancesByApigroupinstanceid
      description: Updates API Group visibility
      requestBody:
        content:
          application/json:
            schema:
              example:
                isPublic: true
              type: object
        description: The apiGroupInstances data to update.
      responses:
        '204':
          description: API Group visibility successfully updated
  ? /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/environments/{environmentId}/apiGroupInstances/{apiGroupInstanceId}/tiers
  : summary: Instance Tiers
    description: Retrieves a list of tiers for an API Group instance
    get:
      description: Gets a list of tiers
      parameters:
      - $ref: '#/components/parameters/VersionGroup'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/APIGroupInstanceId'
      - $ref: '#/components/parameters/EnvironmentId'
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                Tiers:
                  $ref: examples/tiers.yaml#/Tiers
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupEnvironmentsByEnvironmentidApigroupinstancesByApigroupinstanceidTiers
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/terms:
    summary: Terms and Conditions
    description: Gets underlying API terms and conditions for an asset version group
    get:
      description: Gets Terms and Conditions associated to the API
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                Terms:
                  $ref: examples/instances.yaml#/Terms
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupTerms
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances:
    summary: API Instances
    description: A collection of API instances
    get:
      description: Gets API instances
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      responses:
        '200':
          description: success
          content:
            application/json:
              examples:
                ExternalInstances:
                  $ref: examples/instances.yaml#/ExternalInstances
              schema:
                type: array
                items:
                  type: object
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstances
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/{apiInstanceId}/relatedApiGroupInstances:
    summary: API Group Instances
    description: API Group instances that include an API instance
    get:
      description: Gets API group instances that include an API instance
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      - $ref: '#/components/parameters/APIInstanceId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                example: &id003
                - id: 266126
                  organizationId: 930f973d-e5a7-4e48-acfa-3b30de06f98d
                  groupId: 930f973d-e5a7-4e48-acfa-3b30de06f98d
                  assetId: social-media
                  version: 1.0.0
                  isPublic: true
                - id: 266127
                  organizationId: 930f973d-e5a7-4e48-acfa-3b30de06f98d
                  groupId: 930f973d-e5a7-4e48-acfa-3b30de06f98d
                  assetId: social-media
                  version: 2.0.0
                  isPublic: false
              example: *id003
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesByApiinstanceidRelatedapigroupinstances
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/{apiId}/tiers:
    summary: Instance Tiers
    description: A collection of the available SLA Tiers for a given API instance
    get:
      description: Gets a list of tiers
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      - $ref: '#/components/parameters/APIId'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: schemas/tiers.yaml#/Tiers
              examples:
                Tiers:
                  $ref: examples/tiers.yaml#/Tiers
      operationId: getAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesByApiidTiers
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/evented-apis/external:
    summary: External Instances
    description: Evented API External instances
    post:
      operationId: createAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesEventedApisExternal
      description: Creates a new external API instance for an evented API
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      requestBody:
        content:
          application/json:
            schema:
              $ref: schemas/instances.yaml#/CreateExternalInstance1
            examples:
              CreateExternalInstance:
                $ref: examples/instances.yaml#/CreateExternalInstance
        description: The external data to create.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: schemas/instances.yaml#/ExternalInstance1
              examples:
                ExternalInstance:
                  $ref: examples/instances.yaml#/ExternalInstance
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/evented-apis/external/{id}:
    summary: Instance Id
    description: A single instance for an evented API
    patch:
      operationId: patchAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesEventedApisExternalById
      description: Updates an existing external API instance
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      - $ref: '#/components/parameters/ExternalInstanceId'
      requestBody:
        content:
          application/json:
            examples:
              CreateExternalInstance:
                $ref: examples/instances.yaml#/CreateExternalInstance
            schema:
              type: object
        description: The external data to update.
      responses:
        '204':
          description: External instance updated
        '404':
          description: External instance not found
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/external:
    summary: External Instances
    description: External instances
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/VersionGroup'
    post:
      operationId: createAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesExternal
      description: Creates a new external API instance
      requestBody:
        content:
          application/json:
            schema:
              $ref: schemas/instances.yaml#/CreateExternalInstance
            examples:
              CreateExternalInstance:
                $ref: examples/instances.yaml#/CreateExternalInstance
        description: The external data to create.
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: schemas/instances.yaml#/ExternalInstance
              examples:
                ExternalInstance:
                  $ref: examples/instances.yaml#/ExternalInstance
    delete:
      description: Deletes all instance instances from Version Group
      responses:
        '204':
          description: deleted all external instances
      operationId: deleteAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesExternal
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/external/{id}:
    summary: Instance Id
    description: A single instance
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/VersionGroup'
    - $ref: '#/components/parameters/ExternalInstanceId'
    patch:
      operationId: patchAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesExternalById
      description: Updates an existing external API instance
      requestBody:
        content:
          application/json:
            examples:
              CreateExternalInstance:
                $ref: examples/instances.yaml#/CreateExternalInstance
            schema:
              type: object
        description: The external data to update.
      responses:
        '204':
          description: External instance updated
        '404':
          description: External instance not found
    delete:
      description: Deletes an existing external API instance
      responses:
        '204':
          description: External instance deleted
        '404':
          description: External instance not found
      operationId: deleteAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesExternalById
  /assets/{groupId}/{assetId}/versionGroups/{versionGroup}/instances/managed/{id}:
    summary: Instance Id
    description: A single managed instance
    patch:
      operationId: patchAssetsByGroupidByAssetidVersiongroupsByVersiongroupInstancesManagedById
      description: Updates an existing managed API instance
      parameters:
      - $ref: '#/components/parameters/GroupId'
      - $ref: '#/components/parameters/AssetId'
      - $ref: '#/components/parameters/VersionGroup'
      - $ref: '#/components/parameters/ManagedInstanceId'
      requestBody:
        content:
          application/json:
            examples:
              CreateExternalInstance:
                $ref: examples/instances.yaml#/CreateExternalInstance
            schema:
              type: object
        description: The managed data to update.
      responses:
        '204':
          description: Managed instance updated
        '404':
          description: Managed instance not found
  /assets/{groupId}/{assetId}/identities:
    summary: Identities
    description: Identities assigned to an asset with their role
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    get:
      description: A collection of identities assigned to an asset with their role
      parameters:
      - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                example: &id004
                - identityType: user
                  username: username
                  firstName: Scott
                  lastName: Lawson
                  email: email@gmail.com
                  id: 3db3585a-db33-4fe6-b8e7-b91ac953e482
                  role: admin
                  roleId: 03bf5aff-a0e2-4e1a-8377-b7e4f67750df
                  createdAt: 2020-08-10 20:02:11.955239
                  organization:
                    id: d4e2bceb-baae-484c-92f3-3cc272256c7f
                    name: Mulesoft Inc
                    domain: mulesoft-inc
                type: object
              example: *id004
      operationId: getAssetsByGroupidByAssetidIdentities
    put:
      operationId: updateAssetsByGroupidByAssetidIdentities
      description: Assigns identities to an asset
      parameters:
      - name: x-skip-notifications
        required: false
        in: header
        schema:
          description: Set a non-falsy value to skip notifications
          type: string
        description: The x skip notifications header value.
      requestBody:
        content:
          application/json:
            schema:
              example:
                added:
                - identityId: 4b8c4ccd-c8fd-49ff-aa97-cf434d9d4e97
                  organizationId: 5b3c4ccd-c8fd-49ff-aa97-cf434d9d4e90
                  identityType: user
                  role: admin
                deleted:
                - identityId: 4b8c4ccd-c8fd-49ff-aa97-cf434d9d4e97
                  organizationId: 5b3c4ccd-c8fd-49ff-aa97-cf434d9d4e90
                  identityType: team
                  role: contributor
              type: object
        description: The identities data to update.
      responses:
        '204':
          description: Identities assigned to the asset
  /assets/{groupId}/{assetId}/domain:
    summary: Domain
    description: Allowed domain for the asset
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    get:
      description: Gets domain
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                example: domain
              example: domain
      operationId: getAssetsByGroupidByAssetidDomain
  /assets/{groupId}/{assetId}/{version}:
    summary: Asset Version
    description: Asset version
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/Version'
    get:
      description: Get a particular asset by its id
      parameters:
      - $ref: '#/components/parameters/IncludeSnapshots'
      - $ref: '#/components/parameters/Status'
      - $ref: '#/components/parameters/Strict'
      responses:
        '200':
          description: Gets asset
          content:
            application/json:
              examples:
                Asset:
                  $ref: examples/assets.yaml#/AssetWithFiles
      operationId: getAssetsByGroupidByAssetidByVersion
    delete:
      description: Deletes an asset by its ID
      parameters:
      - $ref: '#/components/parameters/DeleteType'
      responses:
        '204':
          description: Asset deleted
        '409':
          description: There were conflicts while deleting
      operationId: deleteAssetsByGroupidByAssetidByVersion
  /assets/{groupId}/{assetId}/{version}/icon:
    summary: Icon
    description: Asset icon
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/Version'
    put:
      description: 'Uploads an icon as a binary file.

        - Body should be application/json. This is not specified in the raml as it conflicts with Osprey.

        '
      requestBody:
        content:
          '*/*':
            examples:
              Icon:
                $ref: examples/icon.yaml#/IconSVG
        description: The icon data to update.
      responses:
        '204':
          description: Icon has been uploaded
        '400':
          description: Invalid icon
        '404':
          description: Asset does not exist
      operationId: updateAssetsByGroupidByAssetidByVersionIcon
  /assets/{groupId}/{assetId}/{version}/asset:
    summary: Asset
    description: Asset
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/Version'
    get:
      description: Gets an asset
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              examples:
                Asset:
                  $ref: examples/assets.yaml#/AssetWithFiles
      operationId: getAssetsByGroupidByAssetidByVersionAsset
  /assets/{groupId}/{assetId}/{version}/rating:
    summary: Rating
    description: Rating of the asset
    parameters:
    - $ref: '#/components/parameters/GroupId'
    - $ref: '#/components/parameters/AssetId'
    - $ref: '#/components/parameters/Version'
    get:
      description: Gets the asset rating
      responses:
        '200':
          description: success
          content:
            application/json:
