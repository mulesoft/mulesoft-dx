Page:
  type: object
  properties:
    path:
      title: Path
      type: string
    name:
      title: Name
      type: string

Pages:
  type: array
  items:
    $ref: '#/Page'

PortalPages:
  type: object
  properties:
    draftStatus:
      title: DraftStatus
      type: string
      enum:
        - PUBLISHED
        - NOT_PUBLISHED
    pages:
      title: Pages
      $ref: '#/Pages'

PortalDiffs:
  type: array
  title: Diffs
  items:
    title: Diff
    type: object
    properties:
      changeType:
        title: Change Type
        type: string
      diff:
        title: Diff description
        type: string
      newMode:
        title: New Mode
        type: string
      newPath:
        title: New Path
        type: string
      oldMode:
        title: Old Mode
        type: string
      oldPath:
        title: Old Path
        type: string

CreatePage:
  type: object
  properties:
    pagePath:
      title: Page Path
      type: string
  required:
    - pagePath

