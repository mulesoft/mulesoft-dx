                - ERROR
                - WARN
                - INFO
                - DEBUG
                - TRACE
                - ALL
                type: string
    AuthenticationProxyConfiguration:
      description: '<p>To configure:</p> <ul> <li>mule.agent.ingest.application.metrics.internal.handler</li> <li>mule.agent.ingest.target.metrics.internal.handler</li> <li>mule.agent.tracking.handler.analytics</li> </ul> '
