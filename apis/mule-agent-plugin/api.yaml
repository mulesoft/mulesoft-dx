openapi: 3.0.0
info:
  title: ARM Mule Agent Plugin API
  description: Manage and monitor a locally running Mule runtime instance through the Mule Agent REST API.
  version: 1.0.0
servers:
- url: http://localhost:9999/mule
security:
- bearerAuth: []
- clientAuth: []
paths:
  /agent:
    get:
      description: Endpoint to validate the Mule Agent is listening.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                description: Represents the current information about the agent and the runtime instance to be returned when pinging the agent for its status.
                x-amf-examples:
                  agent_2.3.0:
                    muleStarted: true
                    muleVersion: 4.1.4
                    agentVersion: 2.3.0
                  agent_1.13.0:
                    muleStarted: true
                    muleVersion: 3.9.2
                    agentVersion: 1.13.0
              example: {}
      operationId: getAgent
    put:
      description: ' <p>Upgrades the Mule Agent plugin with the provided .jar file.</p> <p>Upgrading the Agent will only install the the jar passed in the request and won''t change any configuration</p> <p>Since v2.2.0 the configuration of Authentication Proxy and MCM endpoints was changed so in order to reconect the server further configuration would be needed</p>'
      requestBody:
        content:
          application/octet-stream:
            schema:
              description: The agent-setup-2.x.x-amc-final.jar file with the Mule Agent plugin to upgrade.
        x-amf-mediaType: application/octet-stream
        description: The agent data to update.
      responses:
        '202':
          description: Request accepted for processing.
        '400':
          description: The JSON is invalid.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                  errorType: errorType
                  errorMessage: Error Message
              example: *id001
        '404':
          description: The agent resource doesn't exists.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id002
                  errorType: errorType
                  errorMessage: Error Message
              example: *id002
        '500':
          description: The operation fails.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id003
                  errorType: errorType
                  errorMessage: Error Message
              example: *id003
      operationId: updateAgent
  /agent/configuration:
    get:
      description: "Returns the full configuration of the Mule Agent. \n"
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
