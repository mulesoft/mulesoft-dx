  /agent/{componentId}:
    get:
      description: "Returns a JSON representing the component's configuration. \n"
      parameters:
      - $ref: '#/components/parameters/XOrigin_componentId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                configurableFields:
                - id: string
                  type: string
                injectedHandlers:
                - name: string
                  path: string
                  type: string
                serviceHandlerTypes:
                - string
            application/text:
              schema:
                $ref: '#/components/schemas/type'
              example:
                configurableFields:
                - id: string
                  type: string
                injectedHandlers:
                - name: string
                  path: string
                  type: string
                serviceHandlerTypes:
                - string
        '403':
          description: Forbidden if the agent service or external handler is disabled.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id006
                  errorType: errorType
                  errorMessage: Error Message
              example: *id006
            application/text:
              schema:
                example: &id007
                  errorType: errorType
                  errorMessage: Error Message
              example: *id007
        '404':
          description: If the component does not exists
          x-amf-mediaType: application/text
          content:
            application/json:
              schema:
                x-amf-examples:
                  error_message:
                    errorType: class java.util.NoSuchElementException
                    errorMessage: Component mule.agent.runtime.configuration.servicep does not exist.
              example: {}
            application/text:
              schema:
                x-amf-examples:
                  error_message:
                    errorType: class java.util.NoSuchElementException
                    errorMessage: Component mule.agent.runtime.configuration.servicep does not exist.
              example: {}
      operationId: getAgentByComponentid
    patch:
      description: 'Changes the configuration of the component by overriding the values of the properties passed

        in the JSON.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_componentId_Path'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type'
        x-amf-mediaType: application/json
        description: The agent data to update.
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/text:
              schema:
                $ref: '#/components/schemas/type'
              example:
                configurableFields:
                - id: string
