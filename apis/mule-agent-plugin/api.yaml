          description: Forbidden if the agent service or external handler is disabled.
          x-amf-mediaType: application/json
          content:
            application/text:
              schema:
                example: &id008
                  errorType: errorType
                  errorMessage: Error Message
              example: *id008
            application/json:
              schema:
                example: &id009
                  errorType: errorType
                  errorMessage: Error Message
              example: *id009
        '404':
          description: If the component does not exists
          x-amf-mediaType: application/json
          x-amf-responsePayloads:
          - mediaType: application/text
            schema:
              x-amf-examples:
                error_message:
                  errorType: class java.util.NoSuchElementException
                  errorMessage: Component mule.agent.runtime.configuration.servicep does not exist.
          content:
            application/text:
              schema:
                example: &id010
                  errorType: errorType
                  errorMessage: Error Message
              example: *id010
            application/json:
              schema:
                example: &id011
                  errorType: errorType
                  errorMessage: Error Message
              example: *id011
        '500':
          description: The operation fails.
          x-amf-mediaType: application/json
          content:
            application/text:
              schema:
                example: &id012
                  errorType: errorType
                  errorMessage: Error Message
              example: *id012
            application/json:
              schema:
                example: &id013
