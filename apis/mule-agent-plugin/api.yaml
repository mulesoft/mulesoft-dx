      required:
      - name
      - value
      - category
      properties:
        name:
          type: string
        value:
          type: string
        category:
          type: string
    BufferConfiguration:
      description: '<p>To configure:</p> <ul> <li>primary.node.notification.internal.message.handler</li> <li>scheduling.notification.internal.message.handler</li> <li>mule.agent.tracking.handler.analytics</li> <li>mule.agent.tracking.handler.messageHistory</li> <li>configuration.notification.internal.message.handler</li> <li>tracking.notification.internal.message.handler</li> <li>flow.status.notification.internal.message.handler</li> <li>application.deployment.notification.internal.message.handler</li> <li>mule.agent.tracking.handler.log</li> <li>mule.agent.nagios.jmx.internal.handler</li> <li>mule.agent.gw.http.handler.splunk</li> <li>mule.agent.tracking.handler.splunk</li> <li>mule.agent.gw.http.handler.log</li> <li>action.status.internal.message.handler</li> <li>domain.deployment.notification.internal.message.handler</li> <li>mule.agent.ingest.target.metrics.internal.handler</li> <li>membership.change.notification.internal.message.handler</li> <li>mule.agent.ingest.application.metrics.internal.handler</li> </ul> '
      type: object
      additionalProperties: true
      required:
      - type
      - retryCount
      - flushFrequency
      - maximumCapacity
      - filePath
      - whenExhausted
      - flushThreadsNumber
      - discardMessagesOnFlushFailure
      properties:
        type:
          enum:
          - MEMORY
          - HYBRID
          - DISK
          type: string
        retryCount:
          type: integer
        flushFrequency:
          type: integer
        maximumCapacity:
          type: integer
        filePath:
          $ref: '#/components/schemas/default'
        whenExhausted:
          enum:
          - FAIL
          - FLUSH
          type: string
        flushThreadsNumber:
          type: integer
        discardMessagesOnFlushFailure:
          type: boolean
    ReplayLevel:
      description: The level of replay assigned to a flow or application represents which flows will be possible to do replay over. <ul> <li>NONE - Does not allow replay over the flows.</li> <li>SOURCED - Allows doing replay over the flows that have a message source.</li> <li>ALL - Allows doing replay over all the flows of the application.</li> </ul>
      enum:
      - NONE
      - SOURCED
      - ALL
      type: string
    SchedulerConfiguration:
      description: To configure mule.agent.scheduling.service component
      type: object
      additionalProperties: true
      required:
      - applicationName
      - schedulers
      properties:
        applicationName:
          type: string
        schedulers:
          type: array
          items:
            type: object
            additionalProperties: true
            required:
            - type
            - name
            - flowName
            - enabled
            properties:
              type:
                description: the type of the scheduler, That is either CronScheduler or FixedFrequencyScheduler.
                enum:
                - FixedFrequencyScheduler
                - CronScheduler
                type: string
              name:
                description: The name of the scheduler.
                type: string
              flowName:
                description: the flow that owns the scheduler.
                type: string
              enabled:
                description: The current status of the scheduler.
                type: boolean
    TrackingLevel:
      description: <p>The level of tracking assigned, represents the set of notifications about that application that will be received by the Event Tracking Service.</p> <ul> <li>NONE - No notification will be received</li> <li>BE - (Buesiness Events) AsyncMessageNotifications, PipelineMessageNotifications, ExceptionNotifications and EventNotifications will be received.</li> <li>TRACKING - EndpointMessageNotifications, ExceptionStrategyNotifications, and TransactionNotifications will be received as well as those received by the BE level.</li> <li>DEBUG - ComponentMessageNotifications and MessageProcessorNotification will be received as well as those received by the TRACKING level.</li> </ul>
      enum:
      - NONE
      - BE
      - TRACKING
      - DEBUG
      type: string
    ApplicationConfigurationArray:
      description: To configure mule.agent.application.service component
      type: array
      items:
        type: object
        additionalProperties: true
        required:
        - applicationName
        - flowConfigurations
        properties:
          applicationName:
            description: Name to identify the application in the Mule.
            type: string
          flowConfigurations:
            description: Map of properties to be applied to the Application.
            type: array
            items:
              type: object
              additionalProperties: true
              required:
              - flowStatus
              - flowName
              properties:
                flowStatus:
                  description: Possible statuses of a flow.
                  enum:
                  - STARTED
                  - STOPPED
                  type: string
                flowName:
                  type: string
    ApplicationPropertiesConfigurationArray:
      description: To configure mule.agent.application.properties.service component
      type: array
      items:
        type: object
        additionalProperties: true
        required:
        - applicationName
        - properties
        properties:
          applicationName:
            description: Name to identify the application in the Mule.
            type: string
          properties:
            description: Map of properties to be applied to the Application.
            type: object
            additionalProperties: true
    JMXBeanArray:
      description: To configure mule.agent.jmx.publisher.service component.
      type: array
      items:
        type: object
        additionalProperties: true
        required:
        - monitorMessage
        - beanQueryPattern
        - attribute
        properties:
          monitorMessage:
            description: Message to be attached to the monitor description.
            type: string
          beanQueryPattern:
            description: The pattern that is going to be used to search the bean in the javax.management.MBeanServer
            type: string
          attribute:
            description: The Bean attribute that has to be read. If it is a composed attribute users must add it as "attr1.attr2"
            type: string
    MulePropertyArray:
      description: To configure mule.agent.properties.service component.
      type: array
      items:
        type: object
        additionalProperties: true
        required:
        - name
        - override
        - value
        properties:
          name:
            type: string
          override:
            type: boolean
          value:
            type: string
    TrackedApplicationArray:
      description: To configure mule.agent.tracking.service component
      type: array
      items:
        type: object
        additionalProperties: true
        required:
        - applicationName
        - appName
        - replayLevel
        - trackingLevel
        - payloadExcluded
        - payloadInclusionForced
        - trackedFlows
        - useEventModel
        properties:
          applicationName:
            type: string
          forcePayloadInclusion:
            description: ' Whether to force the inclusion of the payload in the tracking event despite its mime-type. There are some cases that Mule may corrupt the payload when retrieving it as String if the if it''s not representable as a String. The payload is excluded depending on its mime-type to avoid those cases but it can be forced to be included anyways.'
            type: boolean
          appName:
            description: The name of the application
            type: string
          replayLevel:
            $ref: '#/components/schemas/type_2'
          trackingLevel:
            $ref: '#/components/schemas/type_3'
          payloadExcluded:
            description: The exclusion of payload for the application.
            type: boolean
          payloadInclusionForced:
            type: boolean
          trackedFlows:
            description: The tracking information of the flows of the application.
            x-amf-union:
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/TrackedFlow'
          useEventModel:
            description: ' Whether to the {org.mule.tooling.event.model.EventModel} should be used to represent the {org.mule.runtime.api.message.Message}. If not the payload as String would be populated instead.'
            type: boolean
