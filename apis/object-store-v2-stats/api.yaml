      - name: period
        required: true
        in: query
        schema:
          type: string
          enum:
          - 1hour
          - 1day
          - 1month
        description: The period query parameter.
      - name: isMaster
        description: 'If true, provide OS usage for master org along with all underlying sub orgs. If false provide OS usage for only org provided.

          '
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: List of request counts, one per period in the queried time frame.
