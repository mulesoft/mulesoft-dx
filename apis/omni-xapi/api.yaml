  /api/slack/oauth/callback:
    get:
      description: |-
        Handle Slack OAuth callback.

        Slack redirects here after user authorizes the app.

        Query params:
            state: State token (carrier UUID or custom state ID) - always present
            code: OAuth authorization code - present on success
            error: Error code if authorization failed - present on denial

        Redirects back to the frontend Notifications page with success/error status.
      operationId: handleOauthCallbackApiSlackOauthCallbackGet
      parameters:
        -
          description: State token for CSRF protection
          in: query
          name: state
          required: true
          schema:
            description: State token for CSRF protection
            title: State
            type: string
        -
          description: OAuth authorization code from Slack
          in: query
          name: code
          required: false
          schema:
            anyOf:
              -
                type: string
              -
                type: "null"
            description: OAuth authorization code from Slack
            title: Code
        -
          description: Error code if user denied authorization
          in: query
          name: error
          required: false
          schema:
            anyOf:
              -
                type: string
              -
                type: "null"
            description: Error code if user denied authorization
            title: Error
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Handle Oauth Callback
      tags:
        - Slack OAuth
  /api/slack/oauth/start:
    post:
      description: |-
        Start Slack OAuth flow for an organization.

        Extracts organization ID from the authenticated user's session.
        Creates a state token for CSRF protection and returns the Slack authorization URL.

        Usage:
            POST /api/slack/oauth/start
            Headers:
                Authorization: Bearer <token>

        Returns:
            {
                "oauth_url": "https://slack.com/oauth/v2/authorize?...",
                "state_id": "uuid-..."
            }

        Frontend should redirect user to oauth_url.
        No request body needed - org_id extracted from auth token.
      operationId: startOauthFlowApiSlackOauthStartPost
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  -
                    $ref: "#/components/schemas/SlackOAuthStartResponse"
                example:
                  oauth_url: Oauth Url
                  state_id: State Id
          description: Successful Response
      summary: Start Oauth Flow
      tags:
        - Slack OAuth
