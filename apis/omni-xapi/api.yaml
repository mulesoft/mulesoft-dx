components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication for API access.
    clientAuth:
      type: http
      scheme: bearer
      description: Client credentials authentication token.
  schemas:
    ApplyApigeePolicyRequest:
      description: Request to apply a policy template to an Apigee API proxy revision.
      properties:
        api_name:
          title: Api Name
          type: string
        configuration_data:
          additionalProperties: true
          default:
            {}
          title: Configuration Data
          type: object
        direction:
          default: inbound
          title: Direction
          type: string
        endpoint_name:
          default: default
          title: Endpoint Name
          type: string
        organization:
          title: Organization
          type: string
        revision:
          title: Revision
          type: string
        template_id:
          title: Template Id
          type: string
      required:
        - organization
        - api_name
        - revision
        - template_id
      title: ApplyApigeePolicyRequest
      type: object
    ApplyPluginRequest:
      description: Request to apply a Kong plugin to a gateway service.
      properties:
        config:
          additionalProperties: true
          title: Config
          type: object
        enabled:
          default: true
          title: Enabled
          type: boolean
        gateway_id:
          title: Gateway Id
          type: string
        plugin_name:
          title: Plugin Name
          type: string
        protocols:
          anyOf:
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Protocols
        service_id:
          anyOf:
            -
              type: string
            -
              type: "null"
          title: Service Id
      required:
        - gateway_id
        - plugin_name
        - config
      title: ApplyPluginRequest
      type: object
    AssetSearchAggregatesRequest:
      description: Flags controlling which aggregate facets to include in search results.
      properties:
        activeVersionAssetCount:
          default: false
          title: Activeversionassetcount
          type: boolean
        byApiCategory:
          default: false
          title: Byapicategory
          type: boolean
        byProvider:
          default: false
          title: Byprovider
          type: boolean
        byStatus:
          default: false
          title: Bystatus
          type: boolean
        byType:
          default: false
          title: Bytype
          type: boolean
        totalHits:
          default: false
          title: Totalhits
          type: boolean
        uniqueAssets:
          default: false
          title: Uniqueassets
          type: boolean
      title: AssetSearchAggregatesRequest
      type: object
    AssetSearchFilters:
      description: Optional filters to narrow an Exchange asset search.
      properties:
        apiCategoryIn:
          anyOf:
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Apicategoryin
        hasActiveInstance:
          anyOf:
            -
              type: boolean
            -
              type: "null"
          title: Hasactiveinstance
        hasActiveVersion:
          anyOf:
            -
              type: boolean
            -
              type: "null"
          title: Hasactiveversion
        hasInstances:
          anyOf:
            -
              type: boolean
            -
              type: "null"
          title: Hasinstances
        providerIn:
          anyOf:
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Providerin
        statusIn:
          anyOf:
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Statusin
      title: AssetSearchFilters
      type: object
    AssetSearchRequest:
      description: Request to search Exchange assets by type, query, filters, and aggregates.
      properties:
        aggregates:
          anyOf:
            -
              $ref: "#/components/schemas/AssetSearchAggregatesRequest"
            -
              type: "null"
        assetTypes:
          anyOf:
            -
              type: string
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Assettypes
        enrich:
          default: false
          title: Enrich
          type: boolean
        filters:
          anyOf:
            -
              $ref: "#/components/schemas/AssetSearchFilters"
            -
              type: "null"
        includeAffordances:
          anyOf:
            -
              type: boolean
            -
              type: "null"
          title: Includeaffordances
        organizationId:
          anyOf:
            -
              type: string
            -
              items:
                type: string
              type: array
          title: Organizationid
        providers:
          anyOf:
            -
              items:
                type: string
              type: array
            -
              type: "null"
          title: Providers
        q:
          anyOf:
            -
              type: string
            -
              type: "null"
          title: Q
        size:
          default: 500
          title: Size
          type: integer
      required:
        - organizationId
      title: AssetSearchRequest
      type: object
    Body_uploadZipToRegistryApiRegistryUploadPost:
      properties:
        apiVersion:
          default: v1
          title: Apiversion
          type: string
        dryRun:
          default: false
          title: Dryrun
          type: boolean
        file:
          format: binary
          title: File
          type: string
        organizationId:
          title: Organizationid
          type: string
        resourceId:
          default: ""
          title: Resourceid
          type: string
      required:
        - file
        - organizationId
      title: Body_uploadZipToRegistryApiRegistryUploadPost
      type: object
    ConnectApigeeGatewayRequest:
      description: Request to register an Apigee API proxy as a connected gateway.
      properties:
        api_name:
          title: Api Name
          type: string
        organization:
          title: Organization
          type: string
      required:
        - organization
        - api_name
      title: ConnectApigeeGatewayRequest
      type: object
    ConnectGatewayRequest:
      description: Request to connect or register a standalone gateway by its ID.
      properties:
        gateway_id:
          title: Gateway Id
          type: string
      required:
        - gateway_id
      title: ConnectGatewayRequest
      type: object
    ConnectKongRequest:
      description: Request to register a Kong control plane as a connected gateway.
      properties:
        auth_token:
          title: Auth Token
          type: string
        region:
          default: us
          title: Region
          type: string
      required:
        - auth_token
      title: ConnectKongRequest
      type: object
    CreateExternalInstanceRequest:
      description: Request to create an external (unmanaged) instance for an Exchange asset.
      properties:
        assetId:
          title: Assetid
          type: string
        endpointUri:
          title: Endpointuri
          type: string
        isPublic:
          default: true
          title: Ispublic
          type: boolean
        name:
          title: Name
          type: string
        organizationId:
          title: Organizationid
          type: string
        versionGroup:
          title: Versiongroup
          type: string
      required:
        - organizationId
        - assetId
        - versionGroup
        - name
        - endpointUri
      title: CreateExternalInstanceRequest
      type: object
    DeleteAssetRequest:
      description: Request to delete an asset version from Anypoint Exchange.
      properties:
        allowGavReusable:
          default: false
          title: Allowgavreusable
          type: boolean
        assetId:
          title: Assetid
          type: string
        groupId:
          title: Groupid
          type: string
        version:
          title: Version
          type: string
      required:
        - groupId
        - assetId
        - version
      title: DeleteAssetRequest
      type: object
    DeleteExternalInstanceRequest:
      description: Request to delete an external (unmanaged) instance from an Exchange asset.
      properties:
        assetId:
          title: Assetid
          type: string
        instanceId:
          title: Instanceid
          type: string
        organizationId:
          title: Organizationid
          type: string
        versionGroup:
          title: Versiongroup
          type: string
      required:
        - organizationId
        - assetId
        - versionGroup
        - instanceId
      title: DeleteExternalInstanceRequest
      type: object
    GovernanceAgenticRequest:
      description: Payload for governance agentic actions (explain, review, maturity).
      properties:
        orgId:
          title: Orgid
          type: string
        payload:
          additionalProperties: true
          title: Payload
          type: object
      required:
        - orgId
        - payload
      title: GovernanceAgenticRequest
      type: object
    GovernanceInsightsJobRequest:
      description: Request to start a governance insights analysis job.
      properties:
        orgId:
          title: Orgid
          type: string
      required:
        - orgId
      title: GovernanceInsightsJobRequest
      type: object
    HTTPValidationError:
      description: Wrapper returned when request validation fails (HTTP 422).
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ListProxiesRequest:
      description: Request to list API proxies in an Apigee organization.
      properties:
        organization:
          title: Organization
          type: string
      required:
        - organization
      title: ListProxiesRequest
      type: object
    MonitoringOmniCardRequest:
      description: Request to generate an agentic insight card summarizing monitoring data.
      properties:
        environment:
          default: sandbox
          enum:
            - production
            - sandbox
            - development
          title: Environment
          type: string
        orgId:
          anyOf:
            -
              type: string
            -
              type: "null"
          title: Orgid
        prompt:
          title: Prompt
          type: string
        timeRange:
          default: 7d
          enum:
            - 1h
            - 6h
            - 24h
            - 7d
            - 30d
          title: Timerange
          type: string
      required:
        - prompt
      title: MonitoringOmniCardRequest
      type: object
    SlackOAuthStartResponse:
      description: Response with OAuth authorization URL.
      example:
        oauth_url: Oauth Url
        state_id: State Id
      properties:
        oauth_url:
          description: Slack authorization URL to redirect user to
          title: Oauth Url
          type: string
        state_id:
          description: State ID for CSRF protection
          title: State Id
          type: string
      required:
        - oauth_url
        - state_id
      title: SlackOAuthStartResponse
      type: object
    TestConnectionRequest:
      description: Credentials payload to test connectivity to an Apigee organization.
      properties:
        service_account_json:
          title: Service Account Json
          type: string
      required:
        - service_account_json
      title: TestConnectionRequest
      type: object
    TestKongConnectionRequest:
      description: Credentials payload to test connectivity to a Kong control plane.
      properties:
        auth_token:
          title: Auth Token
          type: string
        region:
          default: us
          title: Region
          type: string
      required:
        - auth_token
      title: TestKongConnectionRequest
      type: object
    TestMcpConnectionRequest:
      description: Request to test connectivity to a remote MCP server URL.
      properties:
        headers:
          anyOf:
            -
              additionalProperties:
                type: string
              type: object
            -
              type: "null"
          title: Headers
        organizationId:
          title: Organizationid
          type: string
        timeoutMs:
          default: 10000
          title: Timeoutms
          type: integer
        url:
          title: Url
          type: string
      required:
        - organizationId
        - url
      title: TestMcpConnectionRequest
      type: object
    ValidationError:
      description: Individual field-level validation error detail.
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
              -
                type: string
              -
                type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
info:
  contact:
    name: MuleSoft Omni Team
    url: https://github.com/mulesoft/mulesoft-omni-app
  description: Backend API for MuleSoft Omni — the unified Anypoint management and agent interface.
  title: MuleSoft Omni Backend API
  version: 0.1.0
openapi: 3.1.0
servers:
  - url: https://omni.mulesoft.com/
    description: The production MuleSoft Omni API server
security:
- bearerAuth: []
- clientAuth: []
paths:
  /.well-known/oauth-protected-resource:
    get:
      description: RFC 9728 Protected Resource Metadata — advertises the Anypoint authorization server.
      operationId: oauthProtectedResourceWellKnownOauthProtectedResourceGet
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Oauth Protected Resource
      tags:
        - Well-Known
  /api/agent/call-tool:
    post:
      description: Invoke an MCP tool by name and return its result.
      operationId: callMcpToolApiAgentCallToolPost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Call Mcp Tool
      tags:
        - Agent
  /api/agent/chat:
    post:
      description: Start or continue a streaming agent chat conversation.
      operationId: chatApiAgentChatPost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Chat
      tags:
        - Agent
  /api/agent/chat/plain:
    post:
      description: Send a plain (non-streaming) agent chat message.
      operationId: chatPlainApiAgentChatPlainPost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Chat Plain
      tags:
        - Agent
  /api/agent/chat/resume:
    post:
      description: Resume a paused agent chat conversation with tool confirmation.
      operationId: resumeChatApiAgentChatResumePost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Resume Chat
      tags:
        - Agent
  /api/agent/ui-app:
    get:
      description: Serve a UI application resource by its ui:// URI.
      operationId: serveUiAppApiAgentUiAppGet
      parameters:
        -
          description: The ui:// resource URI
          in: query
          name: uri
          required: true
          schema:
            description: The ui:// resource URI
            title: Uri
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Serve Ui App
      tags:
        - Agent
  /api/api-instances/client-providers:
    get:
      description: List client identity providers for an environment.
      operationId: getClientProvidersApiApiInstancesClientProvidersGet
      parameters:
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Target environment ID
          in: query
          name: environmentId
          required: true
          schema:
            description: Target environment ID
            title: Environmentid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Client Providers
      tags:
        - API Instances
  /api/api-instances/create:
    post:
      description: Create a new API instance in API Manager.
      operationId: createApiInstanceEndpointApiApiInstancesCreatePost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Create Api Instance Endpoint
      tags:
        - API Instances
  /api/api-instances/delete:
    delete:
      description: Delete an API instance from API Manager.
      operationId: deleteApiInstanceEndpointApiApiInstancesDeleteDelete
      parameters:
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Environment containing the instance
          in: query
          name: environmentId
          required: true
          schema:
            description: Environment containing the instance
            title: Environmentid
            type: string
        -
          description: API instance ID to delete
          in: query
          name: apiInstanceId
          required: true
          schema:
            description: API instance ID to delete
            title: Apiinstanceid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Api Instance Endpoint
      tags:
        - API Instances
  /api/api-instances/exchange-search:
    post:
      description: Search Exchange assets by term and type for instance creation.
      operationId: exchangeSearchApiApiInstancesExchangeSearchPost
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Exchange Search
      tags:
        - API Instances
  /api/api-instances/gateway-targets:
    get:
      description: List managed gateway targets for an environment.
      operationId: getGatewayTargetsApiApiInstancesGatewayTargetsGet
      parameters:
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Target environment ID
          in: query
          name: environmentId
          required: true
          schema:
            description: Target environment ID
            title: Environmentid
            type: string
        -
          description: Zero-based page index
          in: query
          name: pageNumber
          required: false
          schema:
            default: 0
            description: Zero-based page index
            title: Pagenumber
            type: integer
        -
          description: Number of targets per page
          in: query
          name: pageSize
          required: false
          schema:
            default: 20
            description: Number of targets per page
            title: Pagesize
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Gateway Targets
      tags:
        - API Instances
  /api/api-instances/governance-report:
    get:
      description: Retrieve the governance conformance report for an Exchange asset version.
      operationId: governanceReportEndpointApiApiInstancesGovernanceReportGet
      parameters:
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Exchange group ID (organization ID)
          in: query
          name: groupId
          required: true
          schema:
            description: Exchange group ID (organization ID)
            title: Groupid
            type: string
        -
          description: Exchange asset identifier
          in: query
          name: assetId
          required: true
          schema:
            description: Exchange asset identifier
            title: Assetid
            type: string
        -
          description: Semantic version of the asset
          in: query
          name: version
          required: true
          schema:
            description: Semantic version of the asset
            title: Version
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Governance Report Endpoint
      tags:
        - API Instances
  /api/api-instances/validate-base-path:
    get:
      description: Validate that an API base path is available on a gateway target.
      operationId: validateBasePathEndpointApiApiInstancesValidateBasePathGet
      parameters:
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Target environment ID
          in: query
          name: environmentId
          required: true
          schema:
            description: Target environment ID
            title: Environmentid
            type: string
        -
          description: Gateway target ID to validate against
          in: query
          name: targetId
          required: true
          schema:
            description: Gateway target ID to validate against
            title: Targetid
            type: string
        -
          description: Listener port on the gateway target
          in: query
          name: port
          required: false
          schema:
            default: 8081
            description: Listener port on the gateway target
            title: Port
            type: integer
        -
          description: Base path to validate for uniqueness
          in: query
          name: path
          required: true
          schema:
            description: Base path to validate for uniqueness
            title: Path
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Validate Base Path Endpoint
      tags:
        - API Instances
  /api/apigee/connected-gateways:
    get:
      description: Return all Apigee gateways that have been registered in this session.
      operationId: getApigeeConnectedGatewaysApiApigeeConnectedGatewaysGet
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: Get Apigee Connected Gateways
      tags:
        - Apigee
  /api/apigee/gateways:
    post:
      description: List API proxies (gateways) in the given Apigee organization.
      operationId: listApigeeGatewaysApiApigeeGatewaysPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListProxiesRequest"
        description: Request to list API proxies in an Apigee organization.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Apigee Gateways
      tags:
        - Apigee
  /api/apigee/gateways/connect:
    post:
      description: Verify an Apigee proxy exists and register it as a connected gateway.
      operationId: connectApigeeGatewayApiApigeeGatewaysConnectPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectApigeeGatewayRequest"
        description: Request to register an Apigee API proxy as a connected gateway.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Connect Apigee Gateway
      tags:
        - Apigee
  /api/apigee/organizations:
    post:
      description: Validate a GCP service-account JSON key and return the Apigee organizations it can access.
      operationId: testApigeeConnectionApiApigeeOrganizationsPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestConnectionRequest"
        description: Credentials payload to test connectivity to an Apigee organization.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Test Apigee Connection
      tags:
        - Apigee
  /api/apigee/policies/apply:
    post:
      description: Inject a policy into an Apigee proxy revision bundle, import it, and optionally deploy.
      operationId: applyApigeePolicyApiApigeePoliciesApplyPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyApigeePolicyRequest"
        description: Request to apply a policy template to an Apigee API proxy revision.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Apply Apigee Policy
      tags:
        - Apigee
  /api/apigee/policy-templates:
    get:
      description: Return the catalog of bundled Apigee policy templates.
      operationId: listApigeePolicyTemplatesApiApigeePolicyTemplatesGet
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
      summary: List Apigee Policy Templates
