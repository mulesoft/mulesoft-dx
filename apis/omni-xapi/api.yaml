  /api/monitoring/alerts/{alert_id}:
    delete:
      description: |-
        Delete an alert.

        Routes to the correct upstream API based on ``source`` and configuration:
        - When USE_MDAS_FOR_ALERTS=true -> ``DELETE /mdas/v1/organizations/{orgId}/alerts/{alertId}``
        - When USE_MDAS_FOR_ALERTS=false:
          - **anypoint-monitoring** ->
            ``DELETE /monitoring/api/v2/organizations/{orgId}/alerts/{alertId}``
        - **API Manager** ->
          ``DELETE /monitoring/api/alerts/api/v2/organizations/{orgId}/environments/{envId}/alerts/{alertId}``
          (requires ``environmentId``)
          - **runtime-manager** ->
            ``DELETE /armui/api/v2/alerts/{endpoint}/{alertId}``
            where *endpoint* is resolved from ``resourceType``.

        ``ANYPOINT_MONITORING_UPSTREAM_DISABLED`` blocks only ``source=anypoint-monitoring``;
        API Manager deletes targeting the API Manager source are unaffected.
      operationId: deleteAlertApiMonitoringAlertsAlertIdDelete
      parameters:
        -
          description: Alert identifier to delete
          in: path
          name: alert_id
          required: true
          schema:
            description: Alert identifier to delete
            title: Alert Id
            type: string
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: "Alert source: runtime-manager | anypoint-monitoring | API Manager"
          in: query
          name: source
          required: true
          schema:
            description: "Alert source: runtime-manager | anypoint-monitoring | API Manager"
            title: Source
            type: string
        -
          description: Resource type the alert monitors
          in: query
          name: resourceType
          required: false
          schema:
            default: hybrid-application
            description: Resource type the alert monitors
            title: Resourcetype
            type: string
        -
          description: Environment ID (required for API Manager alerts)
          in: query
          name: environmentId
          required: false
          schema:
            default: ""
            description: Environment ID (required for API Manager alerts)
            title: Environmentid
            type: string
        -
          description: Bearer token from the caller's Anypoint session. The endpoint forwards this credential to upstream Anypoint services (Monitoring, API Manager, Runtime Manager); the value is not stored server-side.
          in: header
          name: authorization
          required: false
          schema:
            description: Bearer token from the caller's Anypoint session. The endpoint forwards this credential to upstream Anypoint services (Monitoring, API Manager, Runtime Manager); the value is not stored server-side.
            title: Authorization
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                example:
                  {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Alert
      tags:
        - Monitoring
    patch:
      description: |-
        Update an existing alert in Anypoint Platform or MDAS.

        - **runtime-manager** -> ``PATCH /armui/api/v2/alerts/{endpoint}/{alertId}``
        - **API Manager** -> ``PUT`` API Manager monitoring alerts API for the environment
          (requires ``metricType``; same payload shape as the API Manager create route).
        - **MDAS** (``USE_MDAS_FOR_ALERTS``) -> ``PATCH`` ``/v1/organizations/{orgId}/alerts/{alertId}``
          (API Manager updates require the API Manager source and ``metricType``;
          monitoring updates require ``source=anypoint-monitoring`` and ``metricType``).
      operationId: updateAlertApiMonitoringAlertsAlertIdPatch
      parameters:
        -
          description: Alert identifier to update
          in: path
          name: alert_id
          required: true
          schema:
            description: Alert identifier to update
            title: Alert Id
            type: string
        -
          description: Anypoint organization ID
          in: query
          name: organizationId
          required: true
          schema:
            description: Anypoint organization ID
            title: Organizationid
            type: string
        -
          description: Environment containing the alert
          in: query
          name: environmentId
          required: true
          schema:
            description: Environment containing the alert
            title: Environmentid
            type: string
        -
          description: Resource type the alert monitors
          in: query
          name: resourceType
          required: true
          schema:
            description: Resource type the alert monitors
            title: Resourcetype
            type: string
        -
          description: "Alert source: runtime-manager | API Manager | anypoint-monitoring"
          in: query
          name: source
          required: false
          schema:
            default: runtime-manager
            description: "Alert source: runtime-manager | API Manager | anypoint-monitoring"
            title: Source
            type: string
        -
          description: Metric type for API Manager or monitoring alerts
          in: query
          name: metricType
          required: false
          schema:
            anyOf:
              -
                type: string
              -
                type: "null"
            description: Metric type for API Manager or monitoring alerts
            title: Metrictype
        -
          description: Deployment target type (CLOUDHUB, RTF)
          in: query
          name: deploymentType
          required: false
          schema:
            default: CLOUDHUB
            description: Deployment target type (CLOUDHUB, RTF)
            title: Deploymenttype
            type: string
        -
          description: Bearer token from the caller's Anypoint session. The endpoint forwards this credential to upstream Anypoint services (Monitoring, API Manager, Runtime Manager); the value is not stored server-side.
          in: header
          name: authorization
          required: false
          schema:
            description: Bearer token from the caller's Anypoint session. The endpoint forwards this credential to upstream Anypoint services (Monitoring, API Manager, Runtime Manager); the value is not stored server-side.
            title: Authorization
            type: string
      responses:
