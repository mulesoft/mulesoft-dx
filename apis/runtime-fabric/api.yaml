openapi: 3.0.0
info:
  title: Runtime Fabric Management API
  version: 1.0.0
  description: Manage Runtime Fabric clusters, agents, associations, ingress configurations, and deployment targets.
servers:
- url: https://anypoint.mulesoft.com/runtimefabric/api
- url: https://eu1.anypoint.mulesoft.com/runtimefabric/api
- url: https://{region}.platform.mulesoft.com/runtimefabric/api
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
security:
- bearerAuth: []
- clientAuth: []
paths:
