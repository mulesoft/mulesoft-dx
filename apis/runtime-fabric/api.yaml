          description: 'Enable Logstash format compatibility. This option takes a boolean value: True/False, On/Off'
          type: string
        Logstash_Prefix:
          description: 'When Logstash_Format is enabled, the Index name is composed using a prefix and the date, e.g: If Logstash_Prefix is equals to ''mydata'' your index will become ''mydata-YYYY.MM.DD''. The last string appended belongs to the date when the data is being generated.'
          type: string
        Logstash_DateFormat:
          description: Time format (based on strftime) to generate the second part of the Index name.
          type: string
        Time_Key:
          description: When Logstash_Format is enabled, each record will get a new timestamp field. The Time_Key property defines the name of that field.
          type: string
        Time_Key_Format:
          description: When Logstash_Format is enabled, this property defines the format of the timestamp.
          type: string
        Include_Tag_Key:
          description: When enabled, it append the Tag name to the record.
          type: string
        Tag_Key:
          description: When Include_Tag_Key is enabled, this property defines the key name for the tag.
          type: string
        Generate_ID:
          description: When enabled, generate _id for outgoing records. This prevents duplicate records when retrying ES.
          type: string
        Replace_Dots:
          description: When enabled, replace field name dots with underscore, required by Elasticsearch 2.0-2.3.
          type: string
        Trace_Output:
          description: When enabled print the elasticsearch API calls to stdout (for diag only)
          type: string
        Trace_Error:
          description: When enabled print the elasticsearch API calls to stdout when elasticsearch returns an error
          type: string
        Current_Time_Index:
          description: Use current time for index generation instead of message record
          type: string
        Logstash_Prefix_Key:
          description: Prefix keys with this string
          type: string
        CA_file_content:
          type: string
