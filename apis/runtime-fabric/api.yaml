  parameters:
    XOrigin_organizationId_Path:
      name: organizationId
      description: The organization id where the Runtime Fabric is registered.
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
    XOrigin_fabricId_Path:
      name: fabricId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:runtime-fabric
        operation: getOrganizationsByOrganizationidFabrics
        description: GET `/organizations/{organizationId}/fabrics` in this API; use `[].id` values as `fabricId`.
        values: $[*].id
        labels: $[*].name
      description: The fabric ID to identify the target resource.
    XOrigin_fabricOrganizationId_Path:
      name: organizationId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
          - $.subOrganizationIds[*]  
      description: The organization ID to identify the target resource.
    XOrigin_groupId_Path:
      name: groupId
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:runtime-fabric
        operation: getOrganizationsByOrganizationidGroups
        description: GET `/organizations/{organizationId}/groups` in this API; use `[].id` values as `groupId`.
        values: $[*].id
        labels: $[*].name
      description: The group ID to identify the target resource.
