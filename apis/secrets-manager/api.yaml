    crlDistributorConfig:
      description: CRL distributor configuration.
      x-amf-examples:
        crl-post-request:
          name: crm-app
          distributorCertificate:
            path: certificates/fdf8eb18-31e2-42cb-b4fd-6d37c9ce9637
          caCertificate:
            path: certificates/fdf8eb18-31e2-42cb-b4fd-6d37c9ce9647
          frequency: 480
          completeCrlIssuerUrl: www.acme.com
          deltaCrlIssuerUrl: www.acme.com
        crl-put-request:
          name: crm-app
          distributorCertificate:
            path: certificates/fdf8eb18-31e2-42cb-b4fd-6d37c9ce9637
          caCertificate:
            path: certificates/fdf8eb18-31e2-42cb-b4fd-6d37c9ce9637
          frequency: 480
          completeCrlIssuerUrl: www.acme.com
          deltaCrlIssuerUrl: www.acme.com
      type: object
      required:
      - completeCrlIssuerUrl
      - frequency
      - name
      - distributorCertificate
      - caCertificate
      properties:
        expirationDate:
          description: Date on which this secret should expire. If not set, by default, it will be set to one year from the date on which this secret is created/updated. Once the secret expires, a grant can not be requested for it.
          type: string
          format: date
        completeCrlIssuerUrl:
          description: URL where complete CRL file should be retrieved
          type: string
          maxLength: 2048
        frequency:
          description: How frequently should the distributor site be checked for new crl files(in minutes)
          type: integer
          minimum: 2
          maximum: 1000
        name:
          $ref: '#/components/schemas/Name'
        distributorCertificate:
          description: Refers to a secret of type certificate. This certificate is used to check integrity of retrieved CRL files. If not defined the retrieved CRL file will be used without signature verification step being performed.
          type: object
          required:
          - path
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
        deltaCrlIssuerUrl:
          type: string
          maxLength: 2048
        caCertificate:
          description: 'Refers to a secret of type certificate. Select the CA certificate associated with the

            retrieved CRL file. If selected, the retrieved CRL file may contain revoked and/or held

            certificates issued by this CA. The CA subject name is obtained as part of the CRL file

            that is retrieved. However, the CRL distributor that issued and signed the CRL file may

            not be the issuing CA. If this CA certificate is encountered during chain-of-trust processing

            then a CRL file for this CA must have been successfully retrieved, validated and still in affect

            (not expired) or the chain-of trust processing fails depending on how the ''Require CRL for all CAs''

            flag setting configured as described below.


            - If the TLS Context secret has the ''Require CRL for all CAs'' flag set to false, then the CA certificate should be selected. If not selected then prior to successful retrieval and processing of the CRL file there exists a window of time when a revoked CA certificate could be considered valid in chain-of-trust processing.

            - Else if its set to true, then its not necessary to select the CA

            certificate.

            '
          type: object
          required:
          - path
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
    crlDistributorConfig_14:
      description: Base type for all secret responses
      x-amf-examples:
        single-item:
          caCertificate:
            path: certificates/45847df3-7f6d-47c1-819a-ade001f9ef25
            modifiedAt: 2024-07-12 18:00:54
          completeCrlIssuerUrl: www.acme.com
          deltaCrlIssuerUrl: www.acme.com
          distributorCertificate:
            path: certificates/45847df3-7f6d-47c1-819a-ade001f9ef25
            modifiedAt: 2024-07-12 18:00:54
          frequency: 480
          meta:
            id: 18de981a-93cb-45eb-93f9-34461dd86ce7
            path: crlDistributorConfigs/18de981a-93cb-45eb-93f9-34461dd86ce7
            modifiedAt: 2024-07-12 18:00:54
          name: crm-app
          expirationDate: 2018-07-04
      type: object
      required:
      - completeCrlIssuerUrl
      - frequency
      - expirationDate
      - meta
      - name
      - distributorCertificate
      - caCertificate
      properties:
        completeCrlIssuerUrl:
          description: URL from where complete CRL file is retrieved
          type: string
        frequency:
          description: How frequently should the distributor site be checked for new crl files(in minutes)
          type: integer
          minimum: 2
          maximum: 1000
        expirationDate:
          type: string
          format: date
        meta:
          $ref: '#/components/schemas/Meta'
        name:
          $ref: '#/components/schemas/Name'
        distributorCertificate:
          description: Refers to secret of type certificate
          type: object
          required:
          - path
          - modifiedAt
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
            modifiedAt:
              description: timestamp of when the secret was last modified
              type: string
        deltaCrlIssuerUrl:
          description: URL from where the changes in CRL file can be retrieved
          type: string
        caCertificate:
          description: Refers to secret of type certificate
          type: object
          required:
          - path
          - modifiedAt
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
            modifiedAt:
              description: timestamp of when the secret was last modified
              type: string
