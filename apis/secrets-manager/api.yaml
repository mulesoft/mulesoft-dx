    MutualAuthentication:
      description: Configuration for client authentication
      type: object
      required:
      - certCheckingStrength
      properties:
        certificatePolicyChecking:
          description: Controls certificate policy processing as defined in RFC 3280, 5280. A certificate can contain zero or more policies. A policy is represented as an object identifier (OID). In an end entity certificate, this policy information indicate the policy under which the certificate has been issued and the purposes for which the certificate may be used. In a CA certificate, this policy information limits the set of policies for certification paths that include this certificate. Applications with specific policy requirements are expected to have a list of those policies that they will accept and to compare the policy OIDs in the certificate to that list. If this extension is critical, the path validation software MUST be able to interpret this extension (including the optional qualifier), or MUST reject the certificate
          default: false
          type: boolean
        verificationDepth:
          description: maximum allowed chain length for the certificates
          default: 1
          type: integer
          minimum: 0
          maximum: 9
        authenticationOverrides:
          description: Override failing authentication when mutual authentication is being performed
          type: object
          properties:
            certificateUnresolved:
              description: Allow unresolved certificates
              default: false
              type: boolean
            certificateHasExpired:
              description: Allow processing of certificates that are expired
              default: false
              type: boolean
            certificateUntrusted:
              description: Allow untrusted certificates
              default: false
              type: boolean
            certificateBadFormat:
              description: Allow processing of certificates with bad format
              default: false
              type: boolean
            invalidPurpose:
              description: Allow certificates with invalid purpose
              default: false
              type: boolean
            allowSelfSigned:
              description: Allow self signed certificates
              default: false
              type: boolean
            invalidCa:
              description: Allow invalid certificate authority certificates
              default: false
              type: boolean
            other:
              description: Override any miscellaneous error condition encountered
              default: false
              type: boolean
            certificateNotYetValid:
              description: Allow processing of certificates that are not yet valid
              default: false
              type: boolean
            certificateBadSignature:
              description: Allow processing of certificates with bad signature
              default: false
              type: boolean
        crlDistributorConfig:
          description: Reference to a secret of type crlDistributorConfig. Must be set if revocationCheckingMethod is set to 'CRL'.
          type: object
          required:
          - path
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
        certificatePinning:
          $ref: '#/components/schemas/CertificatePinning'
        performDomainChecking:
          description: Whether or not to perform domain checking
          default: false
          type: boolean
        revocationChecking:
          description: Indicates if certificate revocation checking should be enabled or not
          default: false
          type: boolean
        certificatePolicies:
          description: List of Object identifier (OID). OIDs are intended to be globally unique. They are formed by taking a unique numeric string (e.g. 1.3.5.7.9.24.68) and adding additional digits in a unique fashion (e.g. 1.3.5.7.9.24.68.1, 1.3.5.7.9.24.68.2, 1.3.5.7.9.24.68.1.1, etc.) An institution will acquire an arc (eg 1.3.5.7.9.24.68) and then extend the arc (called subarcs) as indicated above to create additional OID’s and arcs. There is no limit to the length of an OID, and virtually no computational burden to having a long OID.
          type: array
          minItems: 1
          items:
            type: string
            pattern: ^[0-9\\.]*$
        requireCrlForAllCa:
          description: Indicates if a valid CRL file must be in effect for every immediate and root Certificate Authority (CA) in the chain-of-trust
          default: false
          type: boolean
        sendTruststore:
          description: Should the truststore i.e. trusted certificate authorities be sent to far-end during mutual authentication
          default: false
          type: boolean
        requireInitialExplicitPolicy:
          description: Indicates if the path must be valid for at least one of the certificate policies in the user-initial-policy-set.
          default: false
          type: boolean
        certCheckingStrength:
          description: allows application to control if strict or lax certificate checking will be performed during chain-of-trust processing
          enum:
          - Strict
          - Lax
          type: string
        revocationCheckingMethod:
          description: Protocol used for certificate revocation checking. Must be set if revocationChecking is set to 'true'.
          enum:
          - CRL
          type: string
