  /{organizationId}/environments/{environmentId}/secretGroups/{secretGroupId}/lock:
    description: '[Deprecated] From this release and on, the lock mechanism on secret groups is deprecated. For compatibility purpose, the endpoint will still exist, but you can think it is a no-op endpoint.'
    put:
      description: '[Deprecated] For compatibility purpose, it always returns successful response.'
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_secretGroupId_Path'
      responses:
        '204':
          description: Response to indicate operation completed successfully.
          headers:
            X-SG-Locked-By-Same-User:
              description: Presence of this header with value 'true', implies that the user making this api call already held the lock on this secret group.
              schema:
                type: boolean
      operationId: updateByOrganizationidEnvironmentsByEnvironmentidSecretgroupsBySecretgroupidLock
    delete:
      description: '[Deprecated] For compatibility purpose, it always returns successful response.'
      parameters:
      - name: action
        description: 'To indicate how the lock is being released, either as operation ''finish'' or ''cancel''.

          - finish = Indicates that the secret group editing is complete, and all draft changes (including additions) made since acquiring the lock, are to be committed.

          - cancel = Indicates that the lock needs to be released and all of the draft changes (including additions) made since acquiring the lock should be discarded.


          Only the user who acquired the lock can use value ''finish''. Any user, including the user who acquired the lock, can use the value ''cancel''.

          The amount of time required for this operation to complete increases, as the the number of secrets that were operated on after acquirirng the lock increases.

          '
        required: true
        in: query
        schema:
          type: string
          enum:
          - finish
          - cancel
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      - $ref: '#/components/parameters/XOrigin_secretGroupId_Path'
      responses:
        '204':
          description: Response to indicate operation completed successfully.
      operationId: deleteByOrganizationidEnvironmentsByEnvironmentidSecretgroupsBySecretgroupidLock
