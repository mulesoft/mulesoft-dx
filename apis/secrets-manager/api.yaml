      type: array
      items:
        enum:
        - h2
        - http/1.1
        type: string
    InboundSettingsFlexGw:
      description: Properties that are applicable only when the TLS context is used to secure inbound traffic.
      type: object
      required:
      - enableClientCertValidation
      properties:
        enableClientCertValidation:
          description: 'flag that indicates whether the client certificate validation must be enforced. '
          default: false
          type: boolean
    CertificateDetails:
      description: Details of certificate.
      type: object
      required:
      - issuer
      - subject
      - version
      - serialNumber
      - signatureAlgorithm
      - publicKeyAlgorithm
      - validity
      - certificateType
      properties:
        issuer:
          description: Details about the entity that issued the certificate.
          type: object
          required:
          - commonName
          properties:
            commonName:
              type: string
            organizationUnit:
              type: string
            organizationName:
              type: string
            localityName:
              type: string
            state:
              type: string
            countryName:
              type: string
        subject:
          description: Details about the entity to which the certificate is issued.
          type: object
          required:
          - commonName
          properties:
            commonName:
              type: string
            organizationUnit:
              type: string
            organizationName:
              type: string
            localityName:
              type: string
            state:
              type: string
            countryName:
              type: string
        subjectAlternativeName:
          description: Collection of subject alternative names from the SubjectAltName x509 extension
          type: array
          items:
            type: string
        version:
          type: string
        serialNumber:
          description: Serial number assigned by the CA to this certificate, in hex format
          type: string
        signatureAlgorithm:
          description: Name of the signature algorithm
          type: string
        publicKeyAlgorithm:
          description: The standard algorithm name for the public key of this certificate
          type: string
        basicConstraints:
          description: This identifies if the subject of the certificate is a CA
          type: object
          required:
          - certificateAuthority
          properties:
            certificateAuthority:
              description: If set to true, indicates that this is a CA certificate.
              type: boolean
        validity:
          description: Details about validity period of this certificate
          type: object
          required:
          - notBefore
          - notAfter
          properties:
            notBefore:
              type: string
              format: date-time-only
            notAfter:
              type: string
              format: date-time-only
        keyUsage:
          description: A list of values defining the purpose of the public key i.e. the key usage extensions from this certificate
          type: array
          maxItems: 9
          minItems: 1
          items:
            enum:
            - Digital Signature
            - Non Repudiation
            - Key Encipherment
            - Data Encipherment
            - Key Agreement
            - Key CertSign
            - CRL Sign
            - Encipher Only
            - Decipher Only
            type: string
        extendedKeyUsage:
          description: A list of values providing details about the extended key usage extensions from this certificate.
          type: array
          maxItems: 9
          minItems: 1
          items:
            enum:
            - TLS Web server authentication
            - TLS Web client authentication
            - Code signing
            - E-mail protection
            - Timestamping
            - OCSPstamping
            - IP security end system
            - IP security tunnel termination
            - IP security user
            type: string
        certificateType:
          description: The type of this certificate
          type: string
    CertificateEntry:
      type: object
      properties:
        alias:
          description: Alias associated with the certificate entry
          type: string
        certificate:
          $ref: '#/components/schemas/CertificateDetails'
    CertificatePinning:
      type: object
      required:
      - performCertificatePinning
      properties:
        performCertificatePinning:
          type: boolean
        certificatePinset:
          description: Refers to a secret of type certificatePinset. Must be set if performCertificatePinning is set to 'true'.
          type: object
          required:
          - path
          properties:
            path:
              description: Relative path of the secret to be referenced.
              type: string
  parameters:
    XOrigin_organizationId_Path:
      name: organizationId
      description: The organization id
      required: true
      in: path
      schema:
        type: string
      x-origin:
      - api: urn:api:access-management
        operation: listMe
        name: rootOrg
        description: GET `/me`; use `user.organization.id` as the caller's primary Business Group GUID.
        values: $.user.organization.id
        labels: $.user.organization.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: currentOrganization
        description: GET `/organizations/{organizationId}`; use `id` as the Business Group GUID for the current organization.
        values: $.id
        labels: $.name
      - api: urn:api:access-management
        operation: getOrganizations
        name: subOrganizations
        description: 'Each element of **subOrganizationIds** in the same response is a child Business Group GUID; use as **organizationId** when APIs are scoped to that subgroup.'
        values:
          - $.id
          - $.subOrganizationIds[*]
        labels:
          - $.name
