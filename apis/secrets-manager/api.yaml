openapi: 3.0.0
info:
  title: Secrets Manager API
  version: 1.0.0
  description: Manage keystores, truststores, certificates, TLS contexts, and shared secrets across environments in Anypoint Secrets Manager.
servers:
- url: https://anypoint.mulesoft.com/secrets-manager/api/{version}/organizations
  variables:
    version:
      default: unknown
      description: API version identifier.
- url: https://eu1.anypoint.mulesoft.com/secrets-manager/api/{version}/organizations
  variables:
    version:
      default: unknown
      description: API version identifier.
- url: https://{region}.platform.mulesoft.com/secrets-manager/api/{version}/organizations
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
externalDocs:
  url: http://
  description: "Here's the flow for managing the lifecycle of secrets :\n 1. Create a secret group.\n 2. Acquire lock on the secret group.\n 3. Create and/or update secrets as you would like.\n 4. Once done with creations/updates, release the lock."
  x-amf-title: Flow to create/update secrets
x-amf-userDocumentation:
- url: http://
  content: '1. Maximum number of secret groups that can be created per (org + env) pair : 25

    2. Maximum number of secrets that can be created in a secret group : 350

    3. Maximum number of clone operations allowed concurrently within an organization : 1

    4. Maximum number of clone operations allowed concurrently : 5

    '
  title: Limits on resources and operations
security:
- bearerAuth: []
- clientAuth: []
paths:
  /{organizationId}:
    delete:
      description: Deletes the organization
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '204':
          description: Successful. Returns zero length body.
      operationId: deleteByOrganizationid
  /{organizationId}/environments/{environmentId}:
    delete:
      description: Deletes the environment
      parameters:
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '204':
          description: Successful. Returns zero length body.
      operationId: deleteByOrganizationidEnvironmentsByEnvironmentid
  /{organizationId}/environments/{environmentId}/operations:
    description: To check the status of running operations
    get:
      parameters:
      - name: type
        required: false
        in: query
        schema:
          type: string
          enum:
          - clone
        description: The type query parameter.
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '200':
          description: Give information if a new request can be triggered or not for specific operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operationsResponse'
              example: &id001
              - type: clone
                canInitiateARequest: true
        '400':
          description: Bad request. The request was malformed or contains invalid parameters.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-message'
              example:
                message: string
                errors:
                - code: PT-1001
                  message: string
                  field: string
      operationId: getByOrganizationidEnvironmentsByEnvironmentidOperations
      description: Retrieves a operations.
  /{organizationId}/environments/{environmentId}/secretGroups:
    description: Secret group is a logical grouping of secrets. Secrets belonging to a group can refer to other secrets from that group only.
    get:
      description: Get a list of secretGroups.
      parameters:
      - name: downloadable
        description: Filter and fetch list of secret groups based on value of 'downloadable' flag.
        required: false
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      - $ref: '#/components/parameters/XOrigin_environmentId_Path'
      responses:
        '200':
          description: Successful operation.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                x-amf-examples:
                  all-secret-group-types:
                  - name: crm-app-sg
                    downloadable: false
                    meta:
                      id: 9319c917-5811-41fa-bd73-1bf13253334a
                      createdAt: 2018-07-04 21:00:00
                      modifiedAt: 2018-07-04 22:00:00
                      modifiedBy: acme-admin
                      locked: true
                      lockedBy: acme-admin
                      currentState: Clear
                type: array
                items:
                  $ref: '#/components/schemas/secretGroup'
              example:
              - id: string
                type: string
        '415':
          description: Unsupported media type.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type'
              example:
                message: string
