                type: object
                required:
                - message
                properties:
                  errors:
                    description: 'Error list used to describe the set of conflicts and failed validations. Required when

                      HTTP error code is not enough for describing the failure case.

                      '
                    type: array
                    items:
                      type: object
                      required:
                      - code
                      - message
                      properties:
                        code:
                          description: "Custom error code, following are the category wise error codes:\n\nPath parameter validation error codes:\n- PT-1001 : Invalid path parameter value\n\nHeader parameter validation error codes:\n- HD-1001 : Invalid header parameter value\n\nQuery parameter validation error codes:\n- QR-1001 : Invalid query parameter value\n\nRequest body validation error codes:\n- RB-1001 : JSON parsing failure\n- RB-1002 : Name already in use \n- RB-1003 : Invalid field value\n- RB-1004 : Missing field OR field with empty value\n- RB-1005 : Referenced secret not found\n- RB-1006 : Conditional validation failure\n- RB-1007 : Certificate expired\n- RB-1008 : Limit exceeded\n\nOther validation error codes:\n- OE-1001 : Secret expired\n- OE-1003 : Shared secret of type VDPContext present\n"
                          enum:
                          - PT-1001
                          - HD-1001
                          - QR-1001
                          - RB-1001
                          - RB-1002
                          - RB-1003
                          - RB-1004
                          - RB-1005
                          - RB-1006
                          - RB-1007
                          - RB-1008
                          - OE-1001
                          - OE-1003
                          type: string
                        message:
                          description: 'Human readable error description for this particular issue with the request.

                            '
                          type: string
                        field:
                          description: 'The name of the erroneous field from request.

                            '
                          type: string
                  message:
