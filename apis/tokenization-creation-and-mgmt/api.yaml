info:
  title: Tokenization Management API
  version: 1.0.0
  description: Manage tokenization services, formats, and deployments for data tokenization within Anypoint Security.
servers:
- url: https://anypoint.mulesoft.com/tokenization/api/{version}/organizations/{organizationId}
  variables:
    version:
      default: unknown
      description: API version identifier.
    organizationId:
      default: unknown
      description: The organization ID for the Anypoint Platform account.
- url: https://eu1.anypoint.mulesoft.com/tokenization/api/{version}/organizations/{organizationId}
  variables:
    version:
      default: unknown
      description: API version identifier.
    organizationId:
      default: unknown
      description: The organization ID for the Anypoint Platform account.
- url: https://{region}.platform.mulesoft.com/tokenization/api/{version}/organizations/{organizationId}
  variables:
    region:
      default: ca1
      description: Region identifier for the service endpoint.
    version:
      default: unknown
      description: API version identifier.
    organizationId:
      default: unknown
      description: The organization ID for the Anypoint Platform account.
externalDocs:
