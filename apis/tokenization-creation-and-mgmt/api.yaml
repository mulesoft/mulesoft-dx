  /environments/{envId}/services:
    description: "Service is used to config tokenization funcionality and manage it's runtime life cycle. A service can have one of the following status:\n* CREATING - A new tokenization service is being created, update of a service is not possible when in this stage\n* FAILED - creation of VDP table failed. The user is free to retry creation\n* READY - The service is either ready for deployment or is already deployed(refer to deploymentInfo property in raml              for more information)\n* UPDATING - An update of an existing tokenization service which was previously in READY or UPDATE_FAILED: stage is in            progress, update of service is not possible when in this stage.\n* UPDATE_FAILED: The update of service failed, the user can retry to update the service now.\n* REKEYING: rekey of VDP table operation in progess.\n* REKEY_FAILED: rekey of VDP table operation has failed, the user can retry to operation now. \nNOTE: If a unexpected failure occurs, the service can be stuck in CREATING or UPDATING or REKEYING stage. If this happens, the api                will run a scheduled task and mark the status as FAILED or UPDATE_FAILED respectively after the service has been in that state for a long time(roughly between an two to four hours)\n"
    post:
      description: 'Create a new service.

        '
      parameters:
      - $ref: '#/components/parameters/XOrigin_envId_Path'
      requestBody:
        content:
          application/json:
            schema:
