              type: string
            tags:
              type: array
              items:
                $ref: '#/components/schemas/ExchangeTags'
    DeploymentStatus:
      description: 'Deployment Status is not a free text, it is calculated based on the status of the

        deployment on each node.

        1) APPLIED: All the replicas achieve the final status with desired Version.

        2) APPLYING: One of the replicas is not in the final status or desired version.

        3) FAILED: One of the replicas failed to appy the desired version.

        '
      enum:
      - APPLYING
      - APPLIED
      - FAILED
      type: string
    NodeResponse:
      type: object
