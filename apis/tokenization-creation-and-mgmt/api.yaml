    Spec:
      description: 'Definition of a deployment configuration

        '
      type: object
      additionalProperties: true
      required:
      - runtimeVersion
      - createdAt
      properties:
        replicas:
          description: 'Number of replicas of the deployment. The replica number define the number of times

            a deployment must be replicated in a particular Targets node. This is not related to

            the number of Nodes of a Target. If a Target has two nodes and the replica number is two

            then four replicas total of the same deployment will be running.

            '
          default: 1
          type: integer
          minimum: 1
        desiredStatus:
          description: 'The desired status of the deployment replicas that will identified as the deployment to be applied.

            This is a free text that will depend on the deployment type. The allowed string has to be registered in

            atlas. If not defined then APPLIED is taken as default.

            '
          default: APPLIED
          type: string
        runtimeVersion:
          description: 'The version of the runtime where the deployment has to be performed.

            '
          type: string
        configuration:
          description: 'Deployment configuration. This is the configuration that is specific to the deployment no matter which is

            the deployment target. A field called `assets` should be present here, containing a map from refId to Asset.

            '
          type: object
          additionalProperties: true
        environment:
          description: 'The deployment will be performed in one particualr target provided by a Target provider. The environment

            configuration is the configuration required by a deployment that is specific to a target provider. For example,

            the service bindings in a PCF deployment.

            '
          type: object
          additionalProperties: true
        createdAt:
          type: integer
