        description: GET `/organizations/{organizationId}/environments`; use each `data[].id` value as an environment identifier.
        values: $.data[*].id
        labels: $.data[*].name
      description: The env ID to identify the target resource.
    XOrigin_deploymentId_Path:
      name: deploymentId
