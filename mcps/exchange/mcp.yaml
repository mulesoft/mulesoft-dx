capabilities:
  tools:
    listChanged: false
transport:
  kind: streamableHttp
  path: /mcp
tools:
  - name: createAsset
    description: |
      Creates a new asset in Anypoint Exchange.

      For the simplest case (custom asset), only `name` is required.
      The asset type determines which additional properties are needed.
    inputSchema:
      type: object
      properties:
        organizationId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:access-management
              operation: listMe
              values: $.user.memberOfOrganizations[*].id
              labels: $.user.memberOfOrganizations[*].name
              description: Get organization ID from current user profile
        payload:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Display name of the asset in Exchange
              example: Customer API
            description:
              type: string
              description: Description of the asset
              example: REST API for managing customer data
            type:
              type: string
              description: >
                Asset type. Determines additional required properties:

                - custom: No extra properties needed (default)

                - http-api: Requires properties.assetLink and
                properties.apiVersion

                - rest-api/raml/oas: Requires file upload + properties.mainFile
                + properties.apiVersion
              enum:
                - custom
                - rest-api
                - http-api
                - soap-api
                - raml
                - oas
                - raml-fragment
              example: custom
            properties.apiVersion:
              type: string
              description: 'Product version (required for API types like http-api, rest-api)'
              example: v1
            properties.assetLink:
              type: string
              description: URL endpoint (required for http-api type)
              example: 'https://api.example.com/v1'
            properties.mainFile:
              type: string
              description: Main file name (required when uploading spec files)
              example: api.raml
            keywords:
              type: string
              description: Comma-separated keywords for searchability
              example: 'customers, crm'
        assetId:
          examples:
            - customer-api
          type: string
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
        version:
          examples:
            - 1.0.0
          type: string
      required:
        - organizationId
        - groupId
        - assetId
        - version
        - payload
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: searchAssets
    description: |
      Search for assets in Anypoint Exchange using the ANG search service.
      The query string is forwarded directly to the ANG search engine.
    inputSchema:
      type: object
      properties:
        _size:
          default: 20
          examples:
            - 20
          type: integer
        q:
          examples:
            - customer api
          type: string
        x-search-id:
          type: string
        x-search-after:
          type: string
        x-ang-explain:
          type: boolean
      required: []
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: getAsset
    description: |
      Retrieves detailed information about an asset including all its versions,
      metadata, categories, and other properties.
    inputSchema:
      type: object
      properties:
        assetId:
          examples:
            - customer-api
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].assetId
              labels: $[*].name
              description: Search Exchange assets by keyword
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].groupId
              labels: $[*].name
              description: Search Exchange assets by keyword
        includeSnapshots:
          default: false
          type: boolean
      required:
        - groupId
        - assetId
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: deleteAsset
    description: >
      Deletes an entire asset including all its versions.

      Use soft-delete (default) to mark as deleted or hard-delete for permanent
      removal.
    inputSchema:
      type: object
      properties:
        assetId:
          examples:
            - customer-api
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].assetId
              labels: $[*].name
              description: Search Exchange assets by keyword
        X-Delete-Type:
          type: string
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].groupId
              labels: $[*].name
              description: Search Exchange assets by keyword
      required:
        - groupId
        - assetId
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: deleteAssetVersion
    description: >
      Deletes a specific version of an asset.

      Use soft-delete to mark as deleted (recoverable) or hard-delete to
      permanently remove.
    inputSchema:
      type: object
      properties:
        assetId:
          examples:
            - customer-api
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].assetId
              labels: $[*].name
              description: Search Exchange assets by keyword
        X-Delete-Type:
          type: string
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].groupId
              labels: $[*].name
              description: Search Exchange assets by keyword
        version:
          examples:
            - 1.0.0
          type: string
      required:
        - groupId
        - assetId
        - version
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: getAssetReviews
    description: Retrieves all reviews for a specific version of an asset
    inputSchema:
      type: object
      properties:
        assetId:
          examples:
            - customer-api
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].assetId
              labels: $[*].name
              description: Search Exchange assets by keyword
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].groupId
              labels: $[*].name
              description: Search Exchange assets by keyword
        includeComments:
          default: false
          type: boolean
        version:
          examples:
            - 1.0.0
          type: string
      required:
        - groupId
        - assetId
        - version
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: updateAssetTags
    description: |
      Updates the tags for a specific version of an asset.
      Send an array of tag objects in the payload field.
    inputSchema:
      type: object
      properties:
        payload:
          type: array
          description: Array of tag objects
          items:
            type: object
            properties:
              key:
                type: string
                description: 'Tag category (e.g., Apps, Department)'
              value:
                type: string
                description: Tag value
          example:
            value:
              - key: Apps
                value: Twitter
              - key: IT
                value: Enterprise
        assetId:
          examples:
            - customer-api
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].assetId
              labels: $[*].name
              description: Search Exchange assets by keyword
        groupId:
          examples:
            - d4e2bceb-baae-484c-92f3-3cc272256c7f
          type: string
          x-origin:
            - api: urn:api:exchange-experience
              operation: getAssetsSearch
              values: $[*].groupId
              labels: $[*].name
              description: Search Exchange assets by keyword
        version:
          examples:
            - 1.0.0
          type: string
      required:
        - groupId
        - assetId
        - version
        - payload
      additionalProperties: false
      $defs: {}
      definitions: {}
  - name: getUserProfile
    description: |
      Retrieves the profile information of the currently authenticated user.
      This includes user details, organization membership, and permissions.
    inputSchema:
      type: object
      properties: {}
      required: []
      additionalProperties: false
      $defs: {}
      definitions: {}
prompts: []
resources: []
resourceTemplates: []
