      services. Returns lightweight rows with conformance status, concern-area
      breakdowns, error/warning/info counts, and violated rulesets for each
      matched service. Supports filtering by conformance status, concern area,
      ruleset, provider, service type, severity thresholds, and text query.
      Returns aggregate totals alongside paged results. Canonical conformance
      values: compliant, non-compliant, pending. Concern area IDs include:
      security-privacy, consumption-economic-governance,
      structural-conformity-lifecycle. Canonical provider values: mulesoft,
      kong, apigee, aws, azure. Example:
      fetch_governance_services(organization_id=<organization_id>,
      conformance_status_in=[<status>]). Example:
      fetch_governance_services(organization_id=<organization_id>,
      provider_in=[<provider>], limit=<n>). For detailed drill-down into one
      service, use fetch_governance_service_report instead. IMPORTANT: The
      totals object already contains aggregate counts for all matched services
      (statusTotals, concernTotals, providerTotals, messageTotals).
      providerTotals breaks down services per provider with
      compliant/non-compliant/pending counts. Do NOT paginate through all pages
      to count services yourself — use the totals. Synthesize your answer from
      the first page of results plus the totals. Only call again with different
      filters if the first result set doesn't match the user's question.
      Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        service_ids:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Service Ids
        conformance_status_in:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Conformance Status In
        concern_area_ids:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Concern Area Ids
        ruleset_ids_in:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Ruleset Ids In
        provider_in:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Provider In
        service_type_in:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Service Type In
        min_errors:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Min Errors
        min_warnings:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Min Warnings
        min_infos:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Min Infos
        q:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Q
        include_rulesets:
          default: true
          title: Include Rulesets
          type: boolean
        include_rule_messages:
          default: false
          title: Include Rule Messages
          type: boolean
        offset:
          default: 0
          title: Offset
          type: integer
        limit:
          default: 20
          title: Limit
          type: integer
      required:
        - organization_id
      title: fetch_governance_servicesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_governance_service_report
    title: Fetch Governance Service Report
    description: >-
      Use this tool to get detailed governance conformance data for a single
      service. Returns the service summary, per-ruleset details with
      violation/warning counts, rule-level messages, and instance-level policy
      conformance when available. Use this after fetch_governance_services to
      drill into one service, or when the user asks about a specific service's
      governance status. Example:
      fetch_governance_service_report(organization_id=<organization_id>,
      service_id=<service_id>). Example:
      fetch_governance_service_report(organization_id=<organization_id>,
      service_id=<service_id>, api_version=<version>,
      include_rule_messages=true). Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        service_id:
          title: Service Id
          type: string
        version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Version
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        include_rule_messages:
          default: true
          title: Include Rule Messages
          type: boolean
      required:
        - organization_id
        - service_id
      title: fetch_governance_service_reportArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_monitoring_overview
    title: Fetch Monitoring Overview
    description: >-
      Use this tool to get an org-wide monitoring health snapshot: total
      requests, error rate, average latency, availability, reliability, and
      compact trend charts. Returns KPI summary plus time-series data for
      request volume, error rate, average latency, and error volume over the
      selected time range and environment. Supports time_range values: 1h, 6h,
      24h, 7d, 30d. Supports environment values: production, sandbox,
      development. Supports provider filter: currently only 'mulesoft' returns
      monitoring data. Other providers (kong, apigee, aws, azure) will return
      empty results. Canonical provider values: mulesoft, kong, apigee, aws,
      azure. Example:
      fetch_monitoring_overview(organization_id=<organization_id>,
      time_range=<time_range>, environment=<environment>). Example:
      fetch_monitoring_overview(organization_id=<organization_id>,
      time_range=<time_range>, environment=<environment>, provider=<provider>).
      For instance-level monitoring drill-down, use fetch_monitoring_instance
      instead. Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        time_range:
          default: 7d
          title: Time Range
          type: string
        environment:
          default: sandbox
          title: Environment
          type: string
        provider:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Provider
        include_charts:
          default: true
          title: Include Charts
          type: boolean
      required:
        - organization_id
      title: fetch_monitoring_overviewArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_monitoring_instance
    title: Fetch Monitoring Instance
    description: >-
      Use this tool to get monitoring data for a single API instance:
      time-series charts (requests, error rate, latency, policy violations), top
      endpoints by traffic, and top clients by traffic. Requires
      organization_id, asset_id, and ideally instance_id. If instance_id is
      omitted, the first available instance is selected. Supports time_range
      values: 1h, 6h, 24h, 7d, 30d. Supports environment values: production,
      sandbox, development. Only MuleSoft-managed instances have monitoring
      data. Example:
      fetch_monitoring_instance(organization_id=<organization_id>,
      asset_id=<asset_id>, instance_id=<instance_id>, time_range=<time_range>,
      environment=<environment>). Example:
      fetch_monitoring_instance(organization_id=<organization_id>,
      asset_id=<asset_id>). For org-wide health overview, use
      fetch_monitoring_overview instead. Requires prior authentication via
      login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        instance_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Instance Id
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        time_range:
          default: 7d
          title: Time Range
          type: string
        environment:
          default: sandbox
          title: Environment
          type: string
      required:
        - organization_id
        - asset_id
      title: fetch_monitoring_instanceArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_cost_overview
    title: Fetch Cost Overview
    description: >-
      Use this tool to get org-wide token usage KPIs for MCP servers: total
      tokens, saved tokens (from optimization policies), average response time,
      total tool calls, server count, and instance count. Optionally includes
      token usage timeseries. Supports time_range values: 1h, 6h, 24h, 7d, 30d.
      Use include_timeseries=true for chart data (increases response size).
      Example: fetch_cost_overview(organization_id=<org_id>, time_range='30d').
      For per-instance breakdown, use fetch_cost_instances instead. Requires
      prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        time_range:
          default: 30d
          title: Time Range
          type: string
        include_timeseries:
          default: false
          title: Include Timeseries
          type: boolean
      required:
        - organization_id
      title: fetch_cost_overviewArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_cost_instances
    title: Fetch Cost Instances
    description: >-
      Use this tool to get per-instance token usage with optimization coverage.
      Each instance includes totalTokens, tokenDelta (tokens saved),
      avgResponseTimeMs, appliedPolicies, optimizationCoverage (0-1), and
      missingOptimizationPolicies. Use filter_unoptimized=true to find instances
      that need optimization. Supports time_range values: 1h, 6h, 24h, 7d, 30d.
      Use top_n to limit results (default 10, max 50). Use sort_by to change
      ordering (totalTokens, tokenDelta, avgResponseTimeMs, totalCalls). To
      optimize an instance, use the missingOptimizationPolicies list with
      prepare_policy_creation(asset_id=<assetId>,
      policy_name_hint=<missing_policy>). Example:
      fetch_cost_instances(organization_id=<org_id>, time_range='30d',
      filter_unoptimized=true). Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        time_range:
          default: 30d
          title: Time Range
          type: string
        top_n:
          default: 10
          title: Top N
          type: integer
        sort_by:
          default: totalTokens
          title: Sort By
          type: string
        filter_unoptimized:
          default: false
          title: Filter Unoptimized
          type: boolean
      required:
        - organization_id
      title: fetch_cost_instancesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_cost_instance_timeseries
    title: Fetch Cost Instance Timeseries
    description: >-
      Use this tool to get token usage and response time timeseries for a single
      MCP server instance. Returns time-bucketed data points with totalTokens,
      tokenDelta, and avgResponseTimeMs per bucket. Supports time_range values:
      1h, 6h, 24h, 7d, 30d. Example:
      fetch_cost_instance_timeseries(organization_id=<org_id>,
      instance_id=<instance_id>, time_range='7d'). For org-wide overview, use
      fetch_cost_overview instead. Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        instance_id:
          title: Instance Id
          type: string
        time_range:
          default: 30d
          title: Time Range
          type: string
      required:
        - organization_id
        - instance_id
      title: fetch_cost_instance_timeseriesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
