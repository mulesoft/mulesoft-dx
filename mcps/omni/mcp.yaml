  - name: fetch_services
    title: Fetch Services
    description: >-
      Use this tool when you need concrete service rows (for example asset
      IDs/names, detail selection, or navigation affordances). Prefer this tool
      over fetch_service_facets when the user asks 'which assets' or requests
      item-level results. Fetches lightweight services for exactly one required
      business_group_id. Supports either text query (q) OR typed
      filtering/aggregates; when q is provided, do not send filters or
      aggregates. Canonical typed values are api classifiers (rest-api,
      http-api, graphql, soap-api, grpc-api, evented-api) plus agent and mcp.
      The tool normalizes common aliases/plurals (for example api/apis, rest,
      openapi, asyncapi, agents, mcp-servers) to canonical values before
      filtering. Returns structured payload with services, assets (alias),
      total, and optional aggregates. Service rows include a provider field.
      Canonical provider values: mulesoft, kong, apigee, aws, azure. If you only
      need counts/buckets (no row hydration), use fetch_service_facets instead.
      Example (typed rows):
      fetch_services(business_group_id=<business_group_id>,
      asset_types=[<asset_type>, ...], size=<n>). Example (text search):
      fetch_services(business_group_id=<business_group_id>, q=<search_query>,
      size=<n>). Service rows include affordances and links for downstream
      navigation/actions. IMPORTANT: Do NOT paginate through all results by
      calling this tool multiple times with different offsets. Use the first
      page of results to synthesize your answer. Only call again with different
      filters if the first result set is clearly irrelevant to the user's
      question. Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        business_group_id:
          title: Business Group Id
          type: string
        q:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Q
        asset_types:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Asset Types
        size:
          default: 20
          title: Size
          type: integer
        filters:
          anyOf:
            - additionalProperties: true
              type: object
            - type: string
            - type: 'null'
          default: null
          title: Filters
        aggregates:
          anyOf:
            - additionalProperties: true
              type: object
            - type: string
            - items:
                type: string
              type: array
            - type: 'null'
          default: null
          title: Aggregates
        include_affordances:
          default: true
          title: Include Affordances
          type: boolean
      required:
        - business_group_id
      title: fetch_servicesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: fetch_service_facets
    title: Fetch Service Facets
    description: >-
      Use this tool when you need aggregate counts/buckets for summaries,
      dashboards, or filter panels, not full service-row hydration. Prefer this
      tool over fetch_services when the user asks 'how many', 'breakdown by
      type/status/provider', or other distribution insights. Fetches facet
      aggregates for exactly one required business_group_id. Supports either
      text query (q) OR typed filtering/aggregates; when q is provided, do not
      send filters or aggregates. Canonical typed values are api classifiers
      (rest-api, http-api, graphql, soap-api, grpc-api, evented-api) plus agent
      and mcp, and common aliases are normalized before filtering. Canonical
      provider values: mulesoft, kong, apigee, aws, azure. Example (typed
      facets): fetch_service_facets(business_group_id=<business_group_id>,
      asset_types=[<asset_type>, ...], aggregates={'totalHits': True, 'byType':
      True, 'byProvider': True}). Example (query facets):
      fetch_service_facets(business_group_id=<business_group_id>,
      q=<search_query>). Do not send aggregates as shorthand strings like
      'type,provider'. Returns structured payload with aggregates, total, and
      query context metadata. If the user then asks for specific assets, follow
      with fetch_services. Requires prior authentication via login.
    inputSchema:
      type: object
      properties:
        business_group_id:
          title: Business Group Id
          type: string
        q:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Q
        asset_types:
          anyOf:
            - items:
                type: string
              type: array
            - type: string
            - type: 'null'
          default: null
          title: Asset Types
        size:
          default: 20
          title: Size
          type: integer
        filters:
          anyOf:
            - additionalProperties: true
              type: object
            - type: string
            - type: 'null'
          default: null
          title: Filters
        aggregates:
          anyOf:
            - additionalProperties: true
              type: object
            - type: string
            - items:
                type: string
              type: array
            - type: 'null'
          default: null
          title: Aggregates
      required:
        - business_group_id
      title: fetch_service_facetsArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: search_repository_knowledge
    title: Search Repository Knowledge
    description: >-
      Use this tool for repository-grounded conceptual questions. It searches a
