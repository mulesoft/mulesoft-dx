capabilities:
  resources:
    subscribe: false
    listChanged: false
  prompts:
    listChanged: false
  tools:
    listChanged: false
  experimental: {}
transport:
  kind: streamableHttp
  path: /mcp/
tools:
  - name: login
    title: Login to Omni Platform
    description: >-
      Authenticate with Omni Platform. MUST be called before any other tool.
      Call WITHOUT arguments to display the interactive login panel where the
      user enters their credentials. Do NOT ask the user for username/password
      in the chat.
    inputSchema:
      type: object
      properties:
        username:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Username
        password:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Password
      title: loginArguments
    annotations:
      readOnlyHint: true
      idempotentHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://auth/login-v2.html'
      ui/resourceUri: 'ui://auth/login-v2.html'
  - name: logout
    title: Logout from Omni Platform
    description: Clear the stored authentication token.
    inputSchema:
      type: object
      properties: {}
      title: logoutArguments
    annotations:
      readOnlyHint: false
      idempotentHint: true
  - name: list_business_groups
    title: List Business Groups
    description: >-
      List available business groups, optionally filtering by name. Requires
      prior authentication via the login tool.
    inputSchema:
      type: object
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Name
      title: list_business_groupsArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://business-groups/app.html'
      ui/resourceUri: 'ui://business-groups/app.html'
  - name: get_business_group
    title: Get Business Group
    description: >-
      Get full metadata for a business group by its ID. Requires prior
      authentication via the login tool.
    inputSchema:
      type: object
      properties:
        group_id:
          title: Group Id
          type: string
      required:
        - group_id
      title: get_business_groupArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://business-groups/app.html'
      ui/resourceUri: 'ui://business-groups/app.html'
  - name: select_active_business_group
    title: Select Active Business Group
    description: >-
      Get the current active business group context and optionally set a new
      active business group by passing business_group_id. Use this for app-level
      context updates without launching the business group selector UI. Requires
      prior authentication via the login tool.
    inputSchema:
      type: object
      properties:
        business_group_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Business Group Id
        name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Name
      title: select_active_business_groupArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
  - name: list_apis
    title: List APIs
    description: >-
      List APIs from the Omni Platform catalog for a given organization.
      Presents an interactive UI for browsing, filtering, and selecting APIs.
      Requires prior authentication via the login tool.
    inputSchema:
      type: object
      properties:
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
        api_category:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Category
        name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Name
        provider:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Provider
      title: list_apisArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-catalog/app.html'
      ui/resourceUri: 'ui://api-catalog/app.html'
  - name: prepare_policy_creation
    title: Prepare Policy Creation
    description: >-
      Load policy options for one asset instance. Returns only policies that are
      not already applied. Accepts api_instance_id (numeric) or asset_id
      (Exchange asset ID) — when asset_id is provided the numeric instance ID is
      resolved automatically. Pass policy_name_hint to filter the list to
      policies matching a name — use this when the user names a specific policy.
      After the user selects a policy from the selector UI, call
      get_policy_template_form with the same organization_id, environment_id,
      api_instance_id, plus the selected
      template_id/asset_id/group_id/asset_version/direction to open the policy
      form UI.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        environment_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Environment Id
        api_instance_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Instance Id
        asset_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Id
        policy_name_hint:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Policy Name Hint
      required:
        - organization_id
      title: prepare_policy_creationArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://asset-instance/policy-selector.html'
      ui/resourceUri: 'ui://asset-instance/policy-selector.html'
  - name: get_policy_template_form
    title: Get Policy Template Form
    description: >-
      Load one policy template detail, including configuration schema, to
      dynamically render the creation form. Use this immediately after the user
      selects a policy in prepare_policy_creation.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        environment_id:
          title: Environment Id
          type: string
        api_instance_id:
          title: Api Instance Id
          type: string
        asset_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Id
        template_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Template Id
        group_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Group Id
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        direction:
          default: inbound
          enum:
            - inbound
            - outbound
          title: Direction
          type: string
      required:
        - organization_id
        - environment_id
        - api_instance_id
      title: get_policy_template_formArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://asset-instance/policy-form.html'
      ui/resourceUri: 'ui://asset-instance/policy-form.html'
  - name: apply_policy_to_instance
    title: Apply Policy To Asset Instance
    description: >-
      Apply the selected policy to the target asset instance using the provided
      configuration data.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        environment_id:
          title: Environment Id
          type: string
        api_instance_id:
          title: Api Instance Id
          type: string
        configuration_data:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Configuration Data
        policy_template_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Policy Template Id
        group_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Group Id
        asset_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Id
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        disabled:
          anyOf:
            - type: boolean
            - type: 'null'
          default: null
          title: Disabled
        order:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Order
        pointcut_data:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Pointcut Data
      required:
        - organization_id
        - environment_id
        - api_instance_id
      title: apply_policy_to_instanceArguments
    _meta:
      ui:
        resourceUri: 'ui://asset-instance/policy-form.html'
      ui/resourceUri: 'ui://asset-instance/policy-form.html'
  - name: check_policy_conformance
    title: Check Policy Conformance
    description: >-
      Convert the selected policy application payload to JSON-LD and print it in
      backend logs.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        environment_id:
          title: Environment Id
          type: string
        api_instance_id:
          title: Api Instance Id
          type: string
        configuration_data:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Configuration Data
        policy_template_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Policy Template Id
        group_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Group Id
        asset_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Id
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        disabled:
          anyOf:
            - type: boolean
            - type: 'null'
          default: null
          title: Disabled
        order:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Order
        pointcut_data:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Pointcut Data
      required:
        - organization_id
        - environment_id
        - api_instance_id
      title: check_policy_conformanceArguments
    _meta:
      ui:
        resourceUri: 'ui://asset-instance/policy-form.html'
      ui/resourceUri: 'ui://asset-instance/policy-form.html'
  - name: view_api_version_details
    title: View API Version Details
    description: >-
      Show read-only details for one API version, including instances, metadata,
      and lifecycle fields. Requires prior authentication via login tool.
    inputSchema:
      type: object
      properties:
        version:
          additionalProperties: true
          title: Version
          type: object
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
        asset_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Id
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
      required:
        - version
      title: view_api_version_detailsArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-version/details.html'
      ui/resourceUri: 'ui://api-version/details.html'
  - name: view_api_version_governance_report
    title: View API Version Governance Report
    description: >-
      Show governance ruleset report summary and findings for one API version.
      Requires prior authentication via login tool.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        group_id:
          title: Group Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        version:
          title: Version
          type: string
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        api_name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Name
      required:
        - organization_id
        - group_id
        - asset_id
        - version
      title: view_api_version_governance_reportArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-version/governance-report.html'
      ui/resourceUri: 'ui://api-version/governance-report.html'
  - name: view_api_instance_details
    title: View API Instance Details
    description: >-
      Show details for one API instance with a web-aligned header. Accepts
      either an instance object or identifiers to resolve it.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        instance_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Instance Id
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        instance:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Instance
      required:
        - organization_id
        - asset_id
      title: view_api_instance_detailsArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-instance/details.html'
      ui/resourceUri: 'ui://api-instance/details.html'
  - name: view_api_instance_policies
    title: View API Instance Policies
    description: >-
      Show the applied policies for one API instance with the same grouping UI
      as the web app.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        instance_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Instance Id
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        instance:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Instance
      required:
        - organization_id
        - asset_id
      title: view_api_instance_policiesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-instance/policies.html'
      ui/resourceUri: 'ui://api-instance/policies.html'
  - name: view_api_instance_monitoring
    title: View API Instance Monitoring
    description: >-
      Show instance monitoring charts, traffic, and clients for one API
      instance.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        instance_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Instance Id
        api_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Api Version
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
        instance:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Instance
        time_range:
          default: 7d
          title: Time Range
          type: string
      required:
        - organization_id
        - asset_id
      title: view_api_instance_monitoringArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-instance/monitoring.html'
      ui/resourceUri: 'ui://api-instance/monitoring.html'
  - name: view_api_version_instances
    title: View API Version Instances
    description: >-
      Show available instances for one API version and allow selecting instances
      to send back to the host. Requires prior authentication via login tool.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
        api_version:
          title: Api Version
          type: string
        asset_version:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Asset Version
      required:
        - organization_id
        - asset_id
        - api_version
      title: view_api_version_instancesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-version/instances.html'
      ui/resourceUri: 'ui://api-version/instances.html'
  - name: select_api_version
    title: Select API Version
    description: >-
      Show an interactive version selector for an API and notify the host when
      the user picks a version. Requires prior authentication via login tool.
    inputSchema:
      type: object
      properties:
        organization_id:
          title: Organization Id
          type: string
        asset_id:
          title: Asset Id
          type: string
      required:
        - organization_id
        - asset_id
      title: select_api_versionArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://api-version/selector.html'
      ui/resourceUri: 'ui://api-version/selector.html'
  - name: list_governance_strategies
    title: List Governance Strategies
    description: >-
      List governance strategies for an organization. Shows the same searchable
      and filterable table style as the main web app.
    inputSchema:
      type: object
      properties:
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
        strategy_type:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Strategy Type
      title: list_governance_strategiesArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance-strategies/list.html'
      ui/resourceUri: 'ui://governance-strategies/list.html'
  - name: delete_governance_strategy
    title: Delete Governance Strategy
    description: Delete one governance strategy by strategy id.
    inputSchema:
      type: object
      properties:
        strategy_id:
          title: Strategy Id
          type: string
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      required:
        - strategy_id
      title: delete_governance_strategyArguments
    annotations:
      readOnlyHint: false
      idempotentHint: false
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance-strategies/list.html'
      ui/resourceUri: 'ui://governance-strategies/list.html'
  - name: prepare_guardrail_creation
    title: Prepare Guardrail Creation
    description: >-
      Open the guardrail creation wizard with scope options and guardrail rule
      catalog data, using the same scope, selection, and naming flow as the web
      app.
    inputSchema:
      type: object
      properties:
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      title: prepare_guardrail_creationArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance/guardrail-creation.html'
      ui/resourceUri: 'ui://governance/guardrail-creation.html'
  - name: create_guardrail
    title: Create Guardrail
    description: Create a new guardrail strategy from wizard inputs.
    inputSchema:
      type: object
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Name
        scope_filter:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Scope Filter
        description:
          default: ''
          title: Description
          type: string
        rules:
          anyOf:
            - items:
                additionalProperties: true
                type: object
              type: array
            - type: 'null'
          default: null
          title: Rules
        rulesets:
          anyOf:
            - items:
                additionalProperties: true
                type: object
              type: array
            - type: 'null'
          default: null
          title: Rulesets
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
        strategy_type:
          default: guardrails
          title: Strategy Type
          type: string
        strategy_status:
          default: active
          title: Strategy Status
          type: string
        governance_target_type:
          default: service-assets
          title: Governance Target Type
          type: string
        scope_condition_mode:
          default: all-services
          title: Scope Condition Mode
          type: string
        scope_conditions:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          default: null
          title: Scope Conditions
        schedule_config:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          default: null
          title: Schedule Config
        position:
          anyOf:
            - type: integer
            - type: 'null'
          default: null
          title: Position
      title: create_guardrailArguments
    annotations:
      readOnlyHint: false
      idempotentHint: false
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance/guardrail-creation.html'
      ui/resourceUri: 'ui://governance/guardrail-creation.html'
  - name: check_guardrail_scope_targets
    title: Check Guardrail Scope Targets
    description: Preview APIs matched by a guardrail scope filter.
    inputSchema:
      type: object
      properties:
        scope_filter:
          title: Scope Filter
          type: string
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      required:
        - scope_filter
      title: check_guardrail_scope_targetsArguments
    annotations:
      readOnlyHint: true
      idempotentHint: true
      openWorldHint: true
  - name: fetch_guardrail_ruleset
    title: Fetch Guardrail Ruleset
    description: Fetch a guardrail ruleset payload by sourceRulesetKey.
    inputSchema:
      type: object
      properties:
        source_ruleset_key:
          title: Source Ruleset Key
          type: string
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      required:
        - source_ruleset_key
      title: fetch_guardrail_rulesetArguments
    annotations:
      readOnlyHint: true
      idempotentHint: true
      openWorldHint: true
  - name: prepare_automated_policy_creation
    title: Prepare Automated Policy Creation
    description: >-
      Open the automated-policy creation wizard with scope options and policy
      templates.
    inputSchema:
      type: object
      properties:
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      title: prepare_automated_policy_creationArguments
    annotations:
      readOnlyHint: true
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance/automated-policy-creation.html'
      ui/resourceUri: 'ui://governance/automated-policy-creation.html'
  - name: create_automated_policy_strategy
    title: Create Automated Policy Strategy
    description: Create a new automated-policy governance strategy from wizard inputs.
    inputSchema:
      type: object
      properties:
        tool_kwargs:
          title: Tool Kwargs
      required:
        - tool_kwargs
      title: create_automated_policy_strategyArguments
    annotations:
      readOnlyHint: false
      idempotentHint: false
      openWorldHint: true
    _meta:
      ui:
        resourceUri: 'ui://governance/automated-policy-creation.html'
      ui/resourceUri: 'ui://governance/automated-policy-creation.html'
  - name: fetch_automated_policy_template
    title: Fetch Automated Policy Template
    description: Fetch one policy template by templateId for configuration details.
    inputSchema:
      type: object
      properties:
        template_id:
          title: Template Id
          type: string
        organization_id:
          anyOf:
            - type: string
            - type: 'null'
          default: null
          title: Organization Id
      required:
        - template_id
      title: fetch_automated_policy_templateArguments
    annotations:
      readOnlyHint: true
      idempotentHint: true
      openWorldHint: true
