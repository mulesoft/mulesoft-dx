<section class="stats">
    <div class="stat">
        <span class="stat-dot stat-green" aria-hidden="true"></span>
        <span class="stat-value">{{ stats.api_count }} APIs</span>
    </div>
    <div class="stat">
        <span class="stat-dot stat-blue" aria-hidden="true"></span>
        <span class="stat-value">{{ stats.endpoint_count }} Endpoints</span>
    </div>
    <div class="stat">
        <span class="stat-dot stat-purple" aria-hidden="true"></span>
        <span class="stat-value">OpenAPI 3.0</span>
    </div>
    <div class="stat">
        <span class="stat-dot stat-orange" aria-hidden="true"></span>
        <span class="stat-value">{{ stats.skill_count }} Skills</span>
    </div>
</section>
